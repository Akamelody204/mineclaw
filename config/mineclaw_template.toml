[server]
host = "127.0.0.1"
port = 18789

[llm]
provider = "openai"
api_key = "${OPENAI_API_KEY}"
base_url = "https://api.openai.com/v1"
model = "gpt-4o"
max_tokens = 2048
temperature = 0.7

# 文件系统工具配置（本地工具始终启用）
[filesystem]
# 最大读取字节数（默认 16KB）
max_read_bytes = 16384
# 允许访问的目录列表（空表示允许所有）
allowed_directories = [
    # "/path/to/workspace",
]

# Checkpoint 配置
[checkpoint]
# 是否启用 checkpoint（默认 true）
enabled = true

# 上下文管理器配置
[context_manager]
# 最大上下文 token 数（默认 100000）
max_tokens = 100000
# 触发裁剪的阈值（默认 0.6，即 60%）
threshold = 0.6
# 裁剪后注入的提示词
trim_hint = "注意：之前的对话上下文已被 CMA 裁剪以保持注意力专注"

# 数据存储配置
[data]
# 数据存储根目录
# 默认值: "data"
path = "data"

