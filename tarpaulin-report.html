ror {\r\n            message: message.into(),\r\n        }\r\n    }\r\n\r\n    /// 序列化为 JSON 字符串\r\n    pub fn to_json(\u0026self) -\u003e Result\u003cString, serde_json::Error\u003e {\r\n        serde_json::to_string(self)\r\n    }\r\n}\r\n\r\n#[cfg(test)]\r\nmod tests {\r\n    use super::*;\r\n    use serde_json::json;\r\n\r\n    #[test]\r\n    fn test_session_started_serialization() {\r\n        let event = SseEvent::session_started(\"test-session-id\");\r\n        let json = event.to_json().unwrap();\r\n        let parsed: Value = serde_json::from_str(\u0026json).unwrap();\r\n\r\n        assert_eq!(parsed[\"type\"], \"session_started\");\r\n        assert_eq!(parsed[\"session_id\"], \"test-session-id\");\r\n    }\r\n\r\n    #[test]\r\n    fn test_assistant_message_serialization() {\r\n        let event = SseEvent::assistant_message(\"Hello, world!\");\r\n        let json = event.to_json().unwrap();\r\n        let parsed: Value = serde_json::from_str(\u0026json).unwrap();\r\n\r\n        assert_eq!(parsed[\"type\"], \"assistant_message\");\r\n        assert_eq!(parsed[\"content\"], \"Hello, world!\");\r\n    }\r\n\r\n    #[test]\r\n    fn test_tool_call_serialization() {\r\n        let args = json!({ \"a\": 1, \"b\": 2 });\r\n        let event = SseEvent::tool_call(\"add\", args.clone());\r\n        let json = event.to_json().unwrap();\r\n        let parsed: Value = serde_json::from_str(\u0026json).unwrap();\r\n\r\n        assert_eq!(parsed[\"type\"], \"tool_call\");\r\n        assert_eq!(parsed[\"tool\"], \"add\");\r\n        assert_eq!(parsed[\"arguments\"], args);\r\n    }\r\n\r\n    #[test]\r\n    fn test_tool_result_serialization() {\r\n        let event = SseEvent::tool_result(\"3\", false);\r\n        let json = event.to_json().unwrap();\r\n        let parsed: Value = serde_json::from_str(\u0026json).unwrap();\r\n\r\n        assert_eq!(parsed[\"type\"], \"tool_result\");\r\n        assert_eq!(parsed[\"content\"], \"3\");\r\n        assert_eq!(parsed[\"is_error\"], false);\r\n    }\r\n\r\n    #[test]\r\n    fn test_completed_serialization() {\r\n        let event = SseEvent::completed();\r\n        let json = event.to_json().unwrap();\r\n        let parsed: Value = serde_json::from_str(\u0026json).unwrap();\r\n\r\n        assert_eq!(parsed[\"type\"], \"completed\");\r\n    }\r\n\r\n    #[test]\r\n    fn test_error_serialization() {\r\n        let event = SseEvent::error(\"Something went wrong\");\r\n        let json = event.to_json().unwrap();\r\n        let parsed: Value = serde_json::from_str(\u0026json).unwrap();\r\n\r\n        assert_eq!(parsed[\"type\"], \"error\");\r\n        assert_eq!(parsed[\"message\"], \"Something went wrong\");\r\n    }\r\n}\r\n","traces":[{"line":28,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":30,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":35,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":37,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":42,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":44,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":50,"address":[],"length":0,"stats":{"Line":72057594037927938}},{"line":52,"address":[],"length":0,"stats":{"Line":144115188075855876}},{"line":58,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":59,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":63,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":65,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":70,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":71,"address":[],"length":0,"stats":{"Line":864691128455135232}}],"covered":14,"coverable":14},{"path":["D:","\\","mineclaw","src","state.rs"],"content":"use std::sync::Arc;\r\nuse tokio::sync::Mutex;\r\n\r\nuse crate::checkpoint::CheckpointManager;\r\nuse crate::config::Config;\r\nuse crate::llm::LlmProvider;\r\nuse crate::mcp::{McpServerManager, ToolExecutor};\r\nuse crate::models::SessionRepository;\r\nuse crate::tool_coordinator::ToolCoordinator;\r\nuse crate::tools::LocalToolRegistry;\r\nuse agentfs::AgentFS;\r\n\r\n#[derive(Clone)]\r\npub struct AppState {\r\n    pub session_repo: SessionRepository,\r\n    pub llm_provider: Arc\u003cdyn LlmProvider\u003e,\r\n    pub mcp_server_manager: Arc\u003cMutex\u003cMcpServerManager\u003e\u003e,\r\n    pub tool_executor: ToolExecutor,\r\n    pub tool_coordinator: Arc\u003cToolCoordinator\u003e,\r\n    pub local_tool_registry: Arc\u003cLocalToolRegistry\u003e,\r\n    pub config: Arc\u003cConfig\u003e,\r\n    pub agent_fs: Arc\u003cAgentFS\u003e,\r\n    pub checkpoint_manager: Arc\u003cCheckpointManager\u003e,\r\n}\r\n\r\nimpl AppState {\r\n    #[allow(clippy::too_many_arguments)]\r\n    pub fn new(\r\n        session_repo: SessionRepository,\r\n        llm_provider: Arc\u003cdyn LlmProvider\u003e,\r\n        mcp_server_manager: Arc\u003cMutex\u003cMcpServerManager\u003e\u003e,\r\n        tool_executor: ToolExecutor,\r\n        tool_coordinator: ToolCoordinator,\r\n        local_tool_registry: Arc\u003cLocalToolRegistry\u003e,\r\n        config: Arc\u003cConfig\u003e,\r\n        agent_fs: Arc\u003cAgentFS\u003e,\r\n        checkpoint_manager: Arc\u003cCheckpointManager\u003e,\r\n    ) -\u003e Self {\r\n        Self {\r\n            session_repo,\r\n            llm_provider,\r\n            mcp_server_manager,\r\n            tool_executor,\r\n            tool_coordinator: Arc::new(tool_coordinator),\r\n            local_tool_registry,\r\n            config,\r\n            agent_fs,\r\n            checkpoint_manager,\r\n        }\r\n    }\r\n}\r\n","traces":[{"line":28,"address":[],"length":0,"stats":{"Line":0}},{"line":44,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":2},{"path":["D:","\\","mineclaw","src","tool_coordinator.rs"],"content":"//! 工具调用协调器\r\n//!\r\n//! 负责协调 LLM 和 MCP 工具之间的交互，实现工具调用循环。\r\n\r\nuse crate::checkpoint::CheckpointManager;\r\nuse crate::error::{Error, Result};\r\nuse crate::llm::{ChatMessage, ChatTool, LlmProvider};\r\nuse crate::mcp::{ExecutionResult, McpServerManager, ToolExecutor};\r\nuse crate::models::{Message, MessageRole, Session, Tool, ToolCall, ToolResult};\r\nuse crate::tools::{LocalToolRegistry, ToolContext};\r\nuse async_trait::async_trait;\r\nuse serde_json::Value;\r\nuse std::sync::Arc;\r\nuse tokio::sync::Mutex;\r\nuse tracing::{debug, info, warn};\r\n\r\n// ==================== ToolCoordinatorCallback ====================\r\n\r\n/// 工具协调器回调 trait\r\n///\r\n/// 用于在工具调用循环的各个阶段接收事件通知。\r\n#[async_trait]\r\npub trait ToolCoordinatorCallback: Send + Sync {\r\n    /// 当助手发送消息时触发\r\n    async fn on_assistant_message(\u0026self, content: \u0026str);\r\n\r\n    /// 当工具调用时触发\r\n    async fn on_tool_call(\u0026self, tool: \u0026str, arguments: \u0026Value);\r\n\r\n    /// 当工具返回结果时触发\r\n    async fn on_tool_result(\u0026self, content: \u0026str, is_error: bool);\r\n\r\n    /// 当整个流程完成时触发\r\n    async fn on_completed(\u0026self, final_response: \u0026str);\r\n\r\n    /// 当发生错误时触发\r\n    async fn on_error(\u0026self, message: \u0026str);\r\n}\r\n\r\n/// 空回调实现（默认行为）\r\npub struct NoopCallback;\r\n\r\n#[async_trait]\r\nimpl ToolCoordinatorCallback for NoopCallback {\r\n    async fn on_assistant_message(\u0026self, _content: \u0026str) {}\r\n    async fn on_tool_call(\u0026self, _tool: \u0026str, _arguments: \u0026Value) {}\r\n    async fn on_tool_result(\u0026self, _content: \u0026str, _is_error: bool) {}\r\n    async fn on_completed(\u0026self, _final_response: \u0026str) {}\r\n    async fn on_error(\u0026self, _message: \u0026str) {}\r\n}\r\n\r\n// ==================== ToolCoordinator ====================\r\n\r\n/// 工具调用协调器\r\npub struct ToolCoordinator {\r\n    llm_provider: Arc\u003cdyn LlmProvider\u003e,\r\n    mcp_server_manager: Arc\u003cMutex\u003cMcpServerManager\u003e\u003e,\r\n    tool_executor: ToolExecutor,\r\n    local_tool_registry: Arc\u003cLocalToolRegistry\u003e,\r\n    config: Arc\u003ccrate::config::Config\u003e,\r\n    checkpoint_manager: Option\u003cArc\u003cCheckpointManager\u003e\u003e,\r\n    /// 最大工具调用轮数\r\n    max_iterations: usize,\r\n}\r\n\r\nimpl ToolCoordinator {\r\n    /// 创建一个新的工具调用协调器\r\n    pub fn new(\r\n        llm_provider: Arc\u003cdyn LlmProvider\u003e,\r\n        mcp_server_manager: Arc\u003cMutex\u003cMcpServerManager\u003e\u003e,\r\n        tool_executor: ToolExecutor,\r\n        local_tool_registry: Arc\u003cLocalToolRegistry\u003e,\r\n        config: Arc\u003ccrate::config::Config\u003e,\r\n    ) -\u003e Self {\r\n        Self {\r\n            llm_provider,\r\n            mcp_server_manager,\r\n            tool_executor,\r\n            local_tool_registry,\r\n            config,\r\n            checkpoint_manager: None,\r\n            max_iterations: 10,\r\n        }\r\n    }\r\n\r\n    /// 设置 CheckpointManager\r\n    pub fn with_checkpoint_manager(mut self, checkpoint_manager: Arc\u003cCheckpointManager\u003e) -\u003e Self {\r\n        self.checkpoint_manager = Some(checkpoint_manager);\r\n        self\r\n    }\r\n\r\n    /// 设置最大工具调用轮数\r\n    pub fn with_max_iterations(mut self, max_iterations: usize) -\u003e Self {\r\n        self.max_iterations = max_iterations;\r\n        self\r\n    }\r\n\r\n    /// 运行工具调用协调循环（无回调版本）\r\n    ///\r\n    /// # 参数\r\n    /// - `session`: 会话对象\r\n    ///\r\n    /// # 返回\r\n    /// - 最终文本响应\r\n    /// - 所有中间消息（包括工具调用和结果）\r\n    pub async fn run(\u0026self, session: Session) -\u003e Result\u003c(String, Vec\u003cMessage\u003e)\u003e {\r\n        self.run_with_callback(session, NoopCallback).await\r\n    }\r\n\r\n    /// 运行工具调用协调循环（带回调版本）\r\n    ///\r\n    /// # 参数\r\n    /// - `session`: 会话对象\r\n    /// - `callback`: 回调实现，用于接收事件通知\r\n    ///\r\n    /// # 返回\r\n    /// - 最终文本响应\r\n    /// - 所有中间消息（包括工具调用和结果）\r\n    pub async fn run_with_callback\u003cC\u003e(\r\n        \u0026self,\r\n        session: Session,\r\n        callback: C,\r\n    ) -\u003e Result\u003c(String, Vec\u003cMessage\u003e)\u003e\r\n    where\r\n        C: ToolCoordinatorCallback,\r\n    {\r\n        info!(\r\n            \"Starting tool coordinator, message_count={}\",\r\n            session.messages.len()\r\n        );\r\n\r\n        let mut intermediate_messages = Vec::new();\r\n        let mut iteration = 0;\r\n\r\n        while iteration \u003c self.max_iterations {\r\n            iteration += 1;\r\n            debug!(\"Tool coordinator iteration {}\", iteration);\r\n\r\n            // 1. 获取可用工具\r\n            let tools = self.get_available_tools().await;\r\n            debug!(\"Available tools: {}\", tools.len());\r\n\r\n            // 2. 转换消息为 LLM 格式\r\n            let chat_messages: Vec\u003cChatMessage\u003e = session\r\n                .messages\r\n                .iter()\r\n                .chain(intermediate_messages.iter())\r\n                .map(ChatMessage::from_message)\r\n                .collect();\r\n\r\n            // 3. 转换工具为 LLM 格式\r\n            let chat_tools: Vec\u003cChatTool\u003e = tools\r\n                .iter()\r\n                .map(|(_, tool)| ChatMessage::tool_to_chat_tool(tool))\r\n                .collect();\r\n\r\n            // 4. 调用 LLM\r\n            let llm_response = self\r\n                .llm_provider\r\n                .chat_with_tools(chat_messages, chat_tools)\r\n                .await?;\r\n\r\n            // 5. 处理响应\r\n            // 如果有工具调用\r\n            if !llm_response.tool_calls.is_empty() {\r\n                info!(\"LLM returned {} tool calls\", llm_response.tool_calls.len());\r\n\r\n                // 方案：只创建 ToolCall 消息，文本放在 ToolCall 消息的 content 中\r\n                // 这样避免了消息重复，也保持了数据完整性\r\n                let mut tool_call_message =\r\n                    self.create_tool_call_message(\u0026session.messages, \u0026llm_response.tool_calls);\r\n\r\n                // 如果有文本，添加到 ToolCall 消息中并触发回调\r\n                if let Some(text) = \u0026llm_response.text\r\n                    \u0026\u0026 !text.is_empty()\r\n                {\r\n                    tool_call_message.content = text.clone();\r\n                    callback.on_assistant_message(text).await;\r\n                }\r\n\r\n                intermediate_messages.push(tool_call_message);\r\n\r\n                // 执行工具调用\r\n                for tool_call in llm_response.tool_calls {\r\n                    // 触发工具调用回调\r\n                    callback\r\n                        .on_tool_call(\u0026tool_call.name, \u0026tool_call.arguments)\r\n                        .await;\r\n\r\n                    let result = self.execute_tool(tool_call.clone(), \u0026session).await?;\r\n\r\n                    // 触发工具结果回调\r\n                    callback\r\n                        .on_tool_result(\u0026result.text_content, result.is_error)\r\n                        .await;\r\n\r\n                    // 创建工具结果消息\r\n                    let tool_result_message =\r\n                        self.create_tool_result_message(\u0026session.messages, \u0026tool_call, \u0026result);\r\n                    intermediate_messages.push(tool_result_message);\r\n                }\r\n            } else {\r\n                // 没有工具调用，结束循环\r\n                info!(\r\n                    \"LLM returned only text response, ending after {} iterations\",\r\n                    iteration\r\n                );\r\n                let final_text = llm_response\r\n                    .text\r\n                    .ok_or_else(|| Error::Llm(\"LLM returned empty response\".into()))?;\r\n\r\n                // 添加最终的文本消息\r\n                let assistant_message =\r\n                    self.create_assistant_message(\u0026session.messages, final_text.clone());\r\n                intermediate_messages.push(assistant_message);\r\n\r\n                // 触发助手消息回调和完成回调\r\n                callback.on_assistant_message(\u0026final_text).await;\r\n                callback.on_completed(\"\").await;\r\n\r\n                return Ok((final_text, intermediate_messages));\r\n            }\r\n        }\r\n\r\n        warn!(\"Max iterations ({}) reached\", self.max_iterations);\r\n        let error_msg = format!(\"Max tool call iterations ({}) reached\", self.max_iterations);\r\n        callback.on_error(\u0026error_msg).await;\r\n        Err(Error::Mcp(error_msg))\r\n    }\r\n\r\n    /// 获取可用工具列表\r\n    async fn get_available_tools(\u0026self) -\u003e Vec\u003c(String, Tool)\u003e {\r\n        let mut tools = Vec::new();\r\n\r\n        // 添加 MCP 工具\r\n        let manager = self.mcp_server_manager.lock().await;\r\n        tools.extend(manager.all_tools());\r\n\r\n        // 添加本地工具\r\n        let local_tools = self.local_tool_registry.list_tools();\r\n        for tool in local_tools {\r\n            tools.push((tool.name.clone(), tool));\r\n        }\r\n\r\n        tools\r\n    }\r\n\r\n    /// 执行单个工具调用\r\n    async fn execute_tool(\r\n        \u0026self,\r\n        tool_call: ToolCall,\r\n        session: \u0026Session,\r\n    ) -\u003e Result\u003cExecutionResult\u003e {\r\n        info!(tool_name = %tool_call.name, \"Executing tool\");\r\n\r\n        // 首先检查是否是本地工具\r\n        if self.local_tool_registry.has_tool(\u0026tool_call.name) {\r\n            debug!(tool_name = %tool_call.name, \"Executing as local tool\");\r\n\r\n            // 创建工具上下文\r\n            let mut context = ToolContext::new(session.clone(), Arc::clone(\u0026self.config));\r\n\r\n            // 添加 CheckpointManager 如果可用\r\n            if let Some(cm) = \u0026self.checkpoint_manager {\r\n                context = context.with_checkpoint_manager(cm.clone());\r\n            }\r\n\r\n            // 执行本地工具\r\n            let result = self\r\n                .local_tool_registry\r\n                .call_tool(\u0026tool_call.name, tool_call.arguments.clone(), context)\r\n                .await;\r\n\r\n            // 转换为 ExecutionResult\r\n            match result {\r\n                Ok(value) =\u003e {\r\n                    let text_content = serde_json::to_string(\u0026value).unwrap_or_default();\r\n                    Ok(ExecutionResult {\r\n                        tool_name: tool_call.name,\r\n                        is_error: false,\r\n                        text_content,\r\n                        raw_content: vec![],\r\n                    })\r\n                }\r\n                Err(e) =\u003e Ok(ExecutionResult {\r\n                    tool_name: tool_call.name,\r\n                    is_error: true,\r\n                    text_content: e.to_string(),\r\n                    raw_content: vec![],\r\n                }),\r\n            }\r\n        } else {\r\n            // 否则作为 MCP 工具执行\r\n            debug!(tool_name = %tool_call.name, \"Executing as MCP tool\");\r\n\r\n            let mut manager = self.mcp_server_manager.lock().await;\r\n            self.tool_executor\r\n                .execute(\u0026mut manager, \u0026tool_call.name, tool_call.arguments.clone())\r\n                .await\r\n        }\r\n    }\r\n\r\n    /// 创建助手文本消息\r\n    fn create_assistant_message(\u0026self, original_messages: \u0026[Message], content: String) -\u003e Message {\r\n        let session_id = original_messages\r\n            .first()\r\n            .map(|m| m.session_id)\r\n            .unwrap_or_else(uuid::Uuid::new_v4);\r\n\r\n        Message::new(session_id, MessageRole::Assistant, content)\r\n    }\r\n\r\n    /// 创建工具调用消息\r\n    fn create_tool_call_message(\r\n        \u0026self,\r\n        original_messages: \u0026[Message],\r\n        tool_calls: \u0026[ToolCall],\r\n    ) -\u003e Message {\r\n        let session_id = original_messages\r\n            .first()\r\n            .map(|m| m.session_id)\r\n            .unwrap_or_else(uuid::Uuid::new_v4);\r\n\r\n        // ToolCall 消息的 content 可以为空，\r\n        // 因为主要信息在 tool_calls 字段中\r\n        Message::new(session_id, MessageRole::ToolCall, \"\".to_string())\r\n            .with_tool_calls(tool_calls.to_vec())\r\n    }\r\n\r\n    /// 创建工具结果消息\r\n    fn create_tool_result_message(\r\n        \u0026self,\r\n        original_messages: \u0026[Message],\r\n        tool_call: \u0026ToolCall,\r\n        result: \u0026ExecutionResult,\r\n    ) -\u003e Message {\r\n        let session_id = original_messages\r\n            .first()\r\n            .map(|m| m.session_id)\r\n            .unwrap_or_else(uuid::Uuid::new_v4);\r\n\r\n        let tool_result = ToolResult {\r\n            tool_call_id: tool_call.id.clone(),\r\n            content: result.text_content.clone(),\r\n            is_error: result.is_error,\r\n        };\r\n\r\n        // 注意：ToolResult 消息的 content 字段需要设置为工具结果内容\r\n        Message::new(\r\n            session_id,\r\n            MessageRole::ToolResult,\r\n            result.text_content.clone(),\r\n        )\r\n        .with_tool_result(tool_result)\r\n    }\r\n}\r\n","traces":[{"line":45,"address":[],"length":0,"stats":{"Line":0}},{"line":46,"address":[],"length":0,"stats":{"Line":0}},{"line":47,"address":[],"length":0,"stats":{"Line":0}},{"line":48,"address":[],"length":0,"stats":{"Line":0}},{"line":49,"address":[],"length":0,"stats":{"Line":0}},{"line":68,"address":[],"length":0,"stats":{"Line":0}},{"line":87,"address":[],"length":0,"stats":{"Line":0}},{"line":88,"address":[],"length":0,"stats":{"Line":0}},{"line":89,"address":[],"length":0,"stats":{"Line":0}},{"line":93,"address":[],"length":0,"stats":{"Line":0}},{"line":94,"address":[],"length":0,"stats":{"Line":0}},{"line":95,"address":[],"length":0,"stats":{"Line":0}},{"line":106,"address":[],"length":0,"stats":{"Line":0}},{"line":107,"address":[],"length":0,"stats":{"Line":0}},{"line":119,"address":[],"length":0,"stats":{"Line":0}},{"line":127,"address":[],"length":0,"stats":{"Line":0}},{"line":128,"address":[],"length":0,"stats":{"Line":0}},{"line":129,"address":[],"length":0,"stats":{"Line":0}},{"line":132,"address":[],"length":0,"stats":{"Line":0}},{"line":133,"address":[],"length":0,"stats":{"Line":0}},{"line":135,"address":[],"length":0,"stats":{"Line":0}},{"line  let (full_path, check_dir) = if path.exists() {\r\n        let canonical = std::fs::canonicalize(path)?;\r\n        let check = if canonical.is_dir() {\r\n            canonical.clone()\r\n        } else {\r\n            canonical.parent().unwrap_or(\u0026canonical).to_path_buf()\r\n        };\r\n        (canonical, check)\r\n    } else {\r\n        let parent = path.parent().unwrap_or_else(|| Path::new(\".\"));\r\n        let parent_canonical = if parent.as_os_str().is_empty() {\r\n            std::env::current_dir()?\r\n        } else {\r\n            std::fs::canonicalize(parent)?\r\n        };\r\n        let full = parent_canonical.join(path.file_name().unwrap_or_default());\r\n        (full, parent_canonical)\r\n    };\r\n\r\n    if !allowed_directories.is_empty() {\r\n        let allowed = allowed_directories.iter().any(|allowed| {\r\n            if let Ok(canonical_allowed) = std::fs::canonicalize(Path::new(allowed)) {\r\n                check_dir.starts_with(canonical_allowed)\r\n            } else {\r\n                false\r\n            }\r\n        });\r\n\r\n        if !allowed {\r\n            return Err(Error::PathNotAllowed(\r\n                full_path.to_string_lossy().to_string(),\r\n            ));\r\n        }\r\n    }\r\n\r\n    Ok(full_path)\r\n}\r\n\r\n/// 获取文件系统配置\r\nfn get_filesystem_config(context: \u0026ToolContext) -\u003e FilesystemConfig {\r\n    context.config.filesystem.clone()\r\n}\r\n\r\n// ==================== Checkpoint 辅助函数 ====================\r\n\r\n/// 在文件操作前自动创建 checkpoint\r\nasync fn maybe_create_checkpoint(\r\n    context: \u0026ToolContext,\r\n    affected_files: Vec\u003cString\u003e,\r\n    description: Option\u003cString\u003e,\r\n) -\u003e Result\u003c()\u003e {\r\n    // 检查是否有 checkpoint manager\r\n    let Some(checkpoint_manager) = \u0026context.checkpoint_manager else {\r\n        debug!(\"Checkpoint manager not available, skipping checkpoint creation\");\r\n        return Ok(());\r\n    };\r\n\r\n    // 检查 checkpoint 是否启用\r\n    if !checkpoint_manager.config().enabled {\r\n        debug!(\"Checkpoint is disabled in config\");\r\n        return Ok(());\r\n    }\r\n\r\n    // 只有在有受影响文件时才创建 checkpoint\r\n    if affected_files.is_empty() {\r\n        debug!(\"No affected files, skipping checkpoint\");\r\n        return Ok(());\r\n    }\r\n\r\n    debug!(\r\n        \"Creating automatic checkpoint for files: {:?}\",\r\n        affected_files\r\n    );\r\n\r\n    // 创建 checkpoint\r\n    checkpoint_manager\r\n        .create_checkpoint(\r\n            \u0026context.session,\r\n            description,\r\n            CheckpointType::Auto,\r\n            Some(affected_files),\r\n        )\r\n        .await?;\r\n\r\n    Ok(())\r\n}\r\n\r\n// ==================== Tool Parameters and Results ====================\r\n\r\n#[derive(Debug, Deserialize)]\r\npub struct ReadFileParams {\r\n    pub path: String,\r\n}\r\n\r\n#[derive(Debug, Serialize)]\r\npub struct ReadFileResult {\r\n    pub content: String,\r\n    pub truncated: bool,\r\n    pub total_bytes: usize,\r\n}\r\n\r\n#[derive(Debug, Deserialize)]\r\npub struct WriteFileParams {\r\n    pub path: String,\r\n    pub content: String,\r\n}\r\n\r\n#[derive(Debug, Serialize)]\r\npub struct WriteFileResult {\r\n    pub success: bool,\r\n    pub bytes_written: usize,\r\n}\r\n\r\n#[derive(Debug, Deserialize)]\r\npub struct ListDirectoryParams {\r\n    pub path: String,\r\n    #[serde(default)]\r\n    pub recursive: Option\u003cbool\u003e,\r\n}\r\n\r\n#[derive(Debug, Serialize)]\r\npub struct DirectoryEntry {\r\n    pub name: String,\r\n    pub path: String,\r\n    pub is_dir: bool,\r\n}\r\n\r\n#[derive(Debug, Serialize)]\r\npub struct ListDirectoryResult {\r\n    pub entries: Vec\u003cDirectoryEntry\u003e,\r\n}\r\n\r\n#[derive(Debug, Deserialize)]\r\npub struct DeleteFileParams {\r\n    pub path: String,\r\n}\r\n\r\n#[derive(Debug, Serialize)]\r\npub struct DeleteFileResult {\r\n    pub success: bool,\r\n}\r\n\r\n#[derive(Debug, Deserialize)]\r\npub struct SearchFileParams {\r\n    pub path: String,\r\n    pub pattern: String,\r\n    #[serde(default)]\r\n    pub case_sensitive: Option\u003cbool\u003e,\r\n}\r\n\r\n#[derive(Debug, Serialize)]\r\npub struct SearchMatch {\r\n    pub line_number: usize,\r\n    pub content: String,\r\n}\r\n\r\n#[derive(Debug, Serialize)]\r\npub struct SearchFileResult {\r\n    pub matches: Vec\u003cSearchMatch\u003e,\r\n}\r\n\r\n#[derive(Debug, Deserialize)]\r\npub struct MoveFileParams {\r\n    pub source: String,\r\n    pub destination: String,\r\n}\r\n\r\n#[derive(Debug, Serialize)]\r\npub struct MoveFileResult {\r\n    pub success: bool,\r\n}\r\n\r\n#[derive(Debug, Deserialize)]\r\npub struct MoveDirectoryParams {\r\n    pub source: String,\r\n    pub destination: String,\r\n}\r\n\r\n#[derive(Debug, Serialize)]\r\npub struct MoveDirectoryResult {\r\n    pub success: bool,\r\n}\r\n\r\n#[derive(Debug, Deserialize)]\r\npub struct DeleteDirectoryParams {\r\n    pub path: String,\r\n    #[serde(default)]\r\n    pub recursive: Option\u003cbool\u003e,\r\n}\r\n\r\n#[derive(Debug, Serialize)]\r\npub struct DeleteDirectoryResult {\r\n    pub success: bool,\r\n}\r\n\r\n#[derive(Debug, Deserialize)]\r\npub struct CreateDirectoryParams {\r\n    pub path: String,\r\n    #[serde(default)]\r\n    pub parents: Option\u003cbool\u003e,\r\n}\r\n\r\n#[derive(Debug, Serialize)]\r\npub struct CreateDirectoryResult {\r\n    pub success: bool,\r\n}\r\n\r\n#[derive(Debug, Deserialize)]\r\npub struct SearchAndReplaceParams {\r\n    pub path: String,\r\n    pub diff: String,\r\n    #[serde(default)]\r\n    pub global: Option\u003cbool\u003e,\r\n}\r\n\r\n#[derive(Debug, Serialize)]\r\npub struct SearchAndReplaceResult {\r\n    pub success: bool,\r\n    pub replacements: usize,\r\n}\r\n\r\n#[derive(Debug, Deserialize)]\r\npub struct ReplaceAllKeywordsParams {\r\n    pub path: String,\r\n    pub search: String,\r\n    pub replace: String,\r\n    #[serde(default)]\r\n    pub case_sensitive: Option\u003cbool\u003e,\r\n    #[serde(default)]\r\n    pub use_regex: Option\u003cbool\u003e,\r\n}\r\n\r\n#[derive(Debug, Serialize)]\r\npub struct ReplaceAllKeywordsResult {\r\n    pub success: bool,\r\n    pub replacements: usize,\r\n}\r\n\r\n// ==================== Individual Tools ====================\r\n\r\nstruct ReadFileTool;\r\n\r\n#[async_trait]\r\nimpl LocalTool for ReadFileTool {\r\n    fn name(\u0026self) -\u003e \u0026str {\r\n        \"read_file\"\r\n    }\r\n\r\n    fn description(\u0026self) -\u003e \u0026str {\r\n        \"Read the complete contents of a file\"\r\n    }\r\n\r\n    fn input_schema(\u0026self) -\u003e Value {\r\n        serde_json::json!({\r\n            \"type\": \"object\",\r\n            \"properties\": {\r\n                \"path\": {\r\n                    \"type\": \"string\",\r\n                    \"description\": \"Path to the file to read\"\r\n                }\r\n            },\r\n            \"required\": [\"path\"]\r\n        })\r\n    }\r\n\r\n    async fn call(\u0026self, arguments: Value, context: ToolContext) -\u003e Result\u003cValue\u003e {\r\n        let params: ReadFileParams = serde_json::from_value(arguments)?;\r\n        let config = get_filesystem_config(\u0026context);\r\n\r\n        let path = normalize_and_validate_path(\u0026params.path, \u0026config.allowed_directories)?;\r\n\r\n        let metadata = std::fs::metadata(\u0026path)?;\r\n        let total_bytes = metadata.len() as usize;\r\n\r\n        let content = if total_bytes \u003e config.max_read_bytes {\r\n            warn!(\r\n                path = %path.display(),\r\n                file_size = total_bytes,\r\n                max_size = config.max_read_bytes,\r\n                \"File too large, truncating\"\r\n            );\r\n            let mut file = std::fs::File::open(\u0026path)?;\r\n            let mut buffer = vec![0u8; config.max_read_bytes];\r\n            use std::io::Read;\r\n            let bytes_read = file.read(\u0026mut buffer)?;\r\n            String::from_utf8_lossy(\u0026buffer[..bytes_read]).to_string()\r\n        } else {\r\n            std::fs::read_to_string(\u0026path)?\r\n        };\r\n\r\n        let truncated = total_bytes \u003e config.max_read_bytes;\r\n\r\n        let result = ReadFileResult {\r\n            content,\r\n            truncated,\r\n            total_bytes,\r\n        };\r\n\r\n        Ok(serde_json::to_value(result)?)\r\n    }\r\n}\r\n\r\nstruct WriteFileTool;\r\n\r\n#[async_trait]\r\nimpl LocalTool for WriteFileTool {\r\n    fn name(\u0026self) -\u003e \u0026str {\r\n        \"write_file\"\r\n    }\r\n\r\n    fn description(\u0026self) -\u003e \u0026str {\r\n        \"Create a new file or completely overwrite an existing file\"\r\n    }\r\n\r\n    fn input_schema(\u0026self) -\u003e Value {\r\n        serde_json::json!({\r\n            \"type\": \"object\",\r\n            \"properties\": {\r\n                \"path\": {\r\n                    \"type\": \"string\",\r\n                    \"description\": \"Path to the file to write\"\r\n                },\r\n                \"content\": {\r\n                    \"type\": \"string\",\r\n                    \"description\": \"Content to write to the file\"\r\n                }\r\n            },\r\n            \"required\": [\"path\", \"content\"]\r\n        })\r\n    }\r\n\r\n    async fn call(\u0026self, arguments: Value, context: ToolContext) -\u003e Result\u003cValue\u003e {\r\n        let params: WriteFileParams = serde_json::from_value(arguments)?;\r\n        let config = get_filesystem_config(\u0026context);\r\n\r\n        let path = normalize_and_validate_path(\u0026params.path, \u0026config.allowed_directories)?;\r\n\r\n        // 为该文件操作创建自动 checkpoint\r\n        let _ = maybe_create_checkpoint(\r\n            \u0026context,\r\n            vec![path.to_string_lossy().to_string()],\r\n            Some(format!(\r\n                \"Auto checkpoint before writing to: {}\",\r\n                params.path\r\n            )),\r\n        )\r\n        .await;\r\n\r\n        if let Some(parent) = path.parent()\r\n            \u0026\u0026 !parent.exists()\r\n        {\r\n            std::fs::create_dir_all(parent)?;\r\n        }\r\n\r\n        std::fs::write(\u0026path, \u0026params.content)?;\r\n\r\n        let result = WriteFileResult {\r\n            success: true,\r\n            bytes_written: params.content.len(),\r\n        };\r\n\r\n        Ok(serde_json::to_value(result)?)\r\n    }\r\n}\r\n\r\nstruct ListDirectoryTool;\r\n\r\n#[async_trait]\r\nimpl LocalTool for ListDirectoryTool {\r\n    fn name(\u0026self) -\u003e \u0026str {\r\n        \"list_directory\"\r\n    }\r\n\r\n    fn description(\u0026self) -\u003e \u0026str {\r\n        \"List the contents of a directory\"\r\n    }\r\n\r\n    fn input_schema(\u0026self) -\u003e Value {\r\n        serde_json::json!({\r\n            \"type\": \"object\",\r\n            \"properties\": {\r\n                \"path\": {\r\n                    \"type\": \"string\",\r\n                    \"description\": \"Path to the directory to list\"\r\n                },\r\n                \"recursive\": {\r\n                    \"type\": \"boolean\",\r\n                    \"description\": \"Whether to list recursively\",\r\n                    \"default\": false\r\n                }\r\n            },\r\n            \"required\": [\"path\"]\r\n        })\r\n    }\r\n\r\n    async fn call(\u0026self, arguments: Value, context: ToolContext) -\u003e Result\u003cValue\u003e {\r\n        let params: ListDirectoryParams = serde_json::from_value(arguments)?;\r\n        let config = get_filesystem_config(\u0026context);\r\n\r\n        let abs_dir_path = normalize_and_validate_path(\u0026params.path, \u0026config.allowed_directories)?;\r\n\r\n        let mut entries = Vec::new();\r\n\r\n        if params.recursive.unwrap_or(false) {\r\n            for entry in walkdir::WalkDir::new(\u0026abs_dir_path) {\r\n                let entry = entry?;\r\n                if entry.path() == abs_dir_path {\r\n                    continue;\r\n                }\r\n                let file_type = entry.file_type();\r\n\r\n                let abs_path = entry.path();\r\n                // 计算相对于 abs_dir_path 的路径\r\n                let rel_to_abs_dir = abs_path.strip_prefix(\u0026abs_dir_path).unwrap_or(abs_path);\r\n                // 拼接用户原始路径\r\n                let final_path = Path::new(\u0026params.path).join(rel_to_abs_dir);\r\n\r\n                entries.push(DirectoryEntry {\r\n                    name: entry.file_name().to_string_lossy().to_string(),\r\n                    path: final_path.to_string_lossy().to_string(),\r\n                    is_dir: file_type.is_dir(),\r\n                });\r\n            }\r\n        } else {\r\n            for entry in std::fs::read_dir(\u0026abs_dir_path)? {\r\n                let entry = entry?;\r\n                let file_type = entry.file_type()?;\r\n                let file_name = entry.file_name();\r\n\r\n                // 拼接用户原始路径\r\n                let final_path = Path::new(\u0026params.path).join(\u0026file_name);\r\n\r\n                entries.push(DirectoryEntry {\r\n                    name: file_name.to_string_lossy().to_string(),\r\n                    path: final_path.to_string_lossy().to_string(),\r\n                    is_dir: file_type.is_dir(),\r\n                });\r\n            }\r\n        }\r\n\r\n        let result = ListDirectoryResult { entries };\r\n\r\n        Ok(serde_json::to_value(result)?)\r\n    }\r\n}\r\n\r\nstruct DeleteFileTool;\r\n\r\n#[async_trait]\r\nimpl LocalTool for DeleteFileTool {\r\n    fn name(\u0026self) -\u003e \u0026str {\r\n        \"delete_file\"\r\n    }\r\n\r\n    fn description(\u0026self) -\u003e \u0026str {\r\n        \"Delete a file\"\r\n    }\r\n\r\n    fn input_schema(\u0026self) -\u003e Value {\r\n        serde_json::json!({\r\n            \"type\": \"object\",\r\n            \"properties\": {\r\n                \"path\": {\r\n                    \"type\": \"string\",\r\n                    \"description\": \"Path to the file to delete\"\r\n                }\r\n            },\r\n            \"required\": [\"path\"]\r\n        })\r\n    }\r\n\r\n    async fn call(\u0026self, arguments: Value, context: ToolContext) -\u003e Result\u003cValue\u003e {\r\n        let params: DeleteFileParams = serde_json::from_value(arguments)?;\r\n        let config = get_filesystem_config(\u0026context);\r\n\r\n        let path = normalize_and_validate_path(\u0026params.path, \u0026config.allowed_directories)?;\r\n\r\n        // 在修改前创建 checkpoint\r\n        let _ = maybe_create_checkpoint(\r\n            \u0026context,\r\n            vec![params.path.clone()],\r\n            Some(format!(\"Before deleting file: {}\", params.path)),\r\n        )\r\n        .await;\r\n\r\n        std::fs::remove_file(\u0026path)?;\r\n\r\n        let result = DeleteFileResult { success: true };\r\n\r\n        Ok(serde_json::to_value(result)?)\r\n    }\r\n}\r\n\r\nstruct SearchFileTool;\r\n\r\n#[async_trait]\r\nimpl LocalTool for SearchFileTool {\r\n    fn name(\u0026self) -\u003e \u0026str {\r\n        \"search_file\"\r\n    }\r\n\r\n    fn description(\u0026self) -\u003e \u0026str {\r\n        \"Search for a pattern in a file\"\r\n    }\r\n\r\n    fn input_schema(\u0026self) -\u003e Value {\r\n        serde_json::json!({\r\n            \"type\": \"object\",\r\n            \"properties\": {\r\n                \"path\": {\r\n                    \"type\": \"string\",\r\n                    \"description\": \"Path to the file to search\"\r\n                },\r\n                \"pattern\": {\r\n                    \"type\": \"string\",\r\n                    \"description\": \"Regex pattern to search for\"\r\n                },\r\n                \"case_sensitive\": {\r\n                    \"type\": \"boolean\",\r\n                    \"description\": \"Whether the search is case-sensitive\",\r\n                    \"default\": true\r\n                }\r\n            },\r\n            \"required\": [\"path\", \"pattern\"]\r\n        })\r\n    }\r\n\r\n    async fn call(\u0026self, arguments: Value, context: ToolContext) -\u003e Result\u003cValue\u003e {\r\n        let params: SearchFileParams = serde_json::from_value(arguments)?;\r\n        let config = get_filesystem_config(\u0026context);\r\n\r\n        let path = normalize_and_validate_path(\u0026params.path, \u0026config.allowed_directories)?;\r\n\r\n        let content = std::fs::read_to_string(\u0026path)?;\r\n\r\n        let pattern = if params.case_sensitive.unwrap_or(true) {\r\n            regex::Regex::new(\u0026params.pattern)?\r\n        } else {\r\n            regex::Regex::new(\u0026format!(\"(?i){}\", params.pattern))?\r\n        };\r\n\r\n        let mut matches = Vec::new();\r\n\r\n        for (line_number, line) in content.lines().enumerate() {\r\n            if pattern.is_match(line) {\r\n                matches.push(SearchMatch {\r\n                    line_number: line_number + 1,\r\n                    content: line.to_string(),\r\n                });\r\n            }\r\n        }\r\n\r\n        let result = SearchFileResult { matches };\r\n\r\n        Ok(serde_json::to_value(result)?)\r\n    }\r\n}\r\n\r\nstruct MoveFileTool;\r\n\r\n#[async_trait]\r\nimpl LocalTool for MoveFileTool {\r\n    fn name(\u0026self) -\u003e \u0026str {\r\n        \"move_file\"\r\n    }\r\n\r\n    fn description(\u0026self) -\u003e \u0026str {\r\n        \"Move or rename a file\"\r\n    }\r\n\r\n    fn input_schema(\u0026self) -\u003e Value {\r\n        serde_json::json!({\r\n            \"type\": \"object\",\r\n            \"properties\": {\r\n                \"source\": {\r\n                    \"type\": \"string\",\r\n                    \"description\": \"Source file path\"\r\n                },\r\n                \"destination\": {\r\n                    \"type\": \"string\",\r\n                    \"description\": \"Destination file path\"\r\n                }\r\n            },\r\n            \"required\": [\"source\", \"destination\"]\r\n        })\r\n    }\r\n\r\n    async fn call(\u0026self, arguments: Value, context: ToolContext) -\u003e Result\u003cValue\u003e {\r\n        let params: MoveFileParams = serde_json::from_value(arguments)?;\r\n        let config = get_filesystem_config(\u0026context);\r\n\r\n        let source = normalize_and_validate_path(\u0026params.source, \u0026config.allowed_directories)?;\r\n        let destination =\r\n            normalize_and_validate_path(\u0026params.destination, \u0026config.allowed_directories)?;\r\n\r\n        // 在修改前创建 checkpoint\r\n        let _ = maybe_create_checkpoint(\r\n            \u0026context,\r\n            vec![params.source.clone(), params.destination.clone()],\r\n            Some(format!(\r\n                \"Before moving file: {} -\u003e {}\",\r\n                params.source, params.destination\r\n            )),\r\n        )\r\n        .await;\r\n\r\n        if let Some(parent) = destination.parent()\r\n            \u0026\u0026 !parent.exists()\r\n        {\r\n            std::fs::create_dir_all(parent)?;\r\n        }\r\n\r\n        std::fs::rename(\u0026source, \u0026destination)?;\r\n\r\n        let result = MoveFileResult { success: true };\r\n\r\n        Ok(serde_json::to_value(result)?)\r\n    }\r\n}\r\n\r\nstruct MoveDirectoryTool;\r\n\r\n#[async_trait]\r\nimpl LocalTool for MoveDirectoryTool {\r\n    fn name(\u0026self) -\u003e \u0026str {\r\n        \"move_directory\"\r\n    }\r\n\r\n    fn description(\u0026self) -\u003e \u0026str {\r\n        \"Move or rename a directory\"\r\n    }\r\n\r\n    fn input_schema(\u0026self) -\u003e Value {\r\n        serde_json::json!({\r\n            \"type\": \"object\",\r\n            \"properties\": {\r\n                \"source\": {\r\n                    \"type\": \"string\",\r\n                    \"description\": \"Source directory path\"\r\n                },\r\n                \"dest            \"parents\": {\r\n                    \"type\": \"boolean\",\r\n                    \"description\": \"Whether to create parent directories\",\r\n                    \"default\": false\r\n                }\r\n            },\r\n            \"required\": [\"path\"]\r\n        })\r\n    }\r\n\r\n    async fn call(\u0026self, arguments: Value, context: ToolContext) -\u003e Result\u003cValue\u003e {\r\n        let params: CreateDirectoryParams = serde_json::from_value(arguments)?;\r\n        let config = get_filesystem_config(\u0026context);\r\n\r\n        let path = normalize_and_validate_path(\u0026params.path, \u0026config.allowed_directories)?;\r\n\r\n        if params.parents.unwrap_or(false) {\r\n            std::fs::create_dir_all(\u0026path)?;\r\n        } else {\r\n            std::fs::create_dir(\u0026path)?;\r\n        }\r\n\r\n        let result = CreateDirectoryResult { success: true };\r\n\r\n        Ok(serde_json::to_value(result)?)\r\n    }\r\n}\r\n\r\nstruct SearchAndReplaceTool;\r\n\r\n/// 从 diff 文本中提取 SEARCH/REPLACE 块\r\npub fn parse_search_replace_blocks_from_diff(diff: \u0026str) -\u003e Vec\u003c(String, String)\u003e {\r\n    let mut blocks = Vec::new();\r\n    let mut lines = diff.lines().peekable();\r\n\r\n    while let Some(line) = lines.next() {\r\n        if line.trim() == \"------- SEARCH\" {\r\n            let mut search_content = Vec::new();\r\n            let mut replace_content = Vec::new();\r\n\r\n            // 读取 SEARCH 部分直到 =======\r\n            for line in lines.by_ref() {\r\n                if line.trim() == \"=======\" {\r\n                    break;\r\n                }\r\n                search_content.push(line);\r\n            }\r\n\r\n            // 读取 REPLACE 部分直到 +++++++ REPLACE\r\n            for line in lines.by_ref() {\r\n                if line.trim() == \"+++++++ REPLACE\" {\r\n                    break;\r\n                }\r\n                replace_content.push(line);\r\n            }\r\n\r\n            // 移除开头和末尾的空行\r\n            while search_content.first().is_some_and(|l| l.trim().is_empty()) {\r\n                search_content.remove(0);\r\n            }\r\n            while search_content.last().is_some_and(|l| l.trim().is_empty()) {\r\n                search_content.pop();\r\n            }\r\n            while replace_content.first().is_some_and(|l| l.trim().is_empty()) {\r\n                replace_content.remove(0);\r\n            }\r\n            while replace_content.last().is_some_and(|l| l.trim().is_empty()) {\r\n                replace_content.pop();\r\n            }\r\n\r\n            let search_str = search_content.join(\"\\n\");\r\n            let replace_str = replace_content.join(\"\\n\");\r\n\r\n            if !search_str.is_empty() {\r\n                blocks.push((search_str, replace_str));\r\n            }\r\n        }\r\n    }\r\n\r\n    blocks\r\n}\r\n\r\n#[async_trait]\r\nimpl LocalTool for SearchAndReplaceTool {\r\n    fn name(\u0026self) -\u003e \u0026str {\r\n        \"search_and_replace\"\r\n    }\r\n\r\n    fn description(\u0026self) -\u003e \u0026str {\r\n        \"Search and replace text in a file using SEARCH/REPLACE block format only.\"\r\n    }\r\n\r\n    fn input_schema(\u0026self) -\u003e Value {\r\n        serde_json::json!({\r\n            \"type\": \"object\",\r\n            \"properties\": {\r\n                \"path\": {\r\n                    \"type\": \"string\",\r\n                    \"description\": \"Path to the file\"\r\n                },\r\n                \"diff\": {\r\n                    \"type\": \"string\",\r\n                    \"description\": \"SEARCH/REPLACE block(s) with format: ------- SEARCH\\\\nold content\\\\n=======\\\\nnew content\\\\n+++++++ REPLACE\"\r\n                },\r\n                \"global\": {\r\n                    \"type\": \"boolean\",\r\n                    \"description\": \"Whether to replace all occurrences within each block\",\r\n                    \"default\": true\r\n                }\r\n            },\r\n            \"required\": [\"path\", \"diff\"]\r\n        })\r\n    }\r\n\r\n    async fn call(\u0026self, arguments: Value, context: ToolContext) -\u003e Result\u003cValue\u003e {\r\n        let params: SearchAndReplaceParams = serde_json::from_value(arguments)?;\r\n        let config = get_filesystem_config(\u0026context);\r\n\r\n        let path = normalize_and_validate_path(\u0026params.path, \u0026config.allowed_directories)?;\r\n\r\n        // 在修改前创建 checkpoint\r\n        let _ = maybe_create_checkpoint(\r\n            \u0026context,\r\n            vec![params.path.clone()],\r\n            Some(format!(\r\n                \"Before search and replace in file: {}\",\r\n                params.path\r\n            )),\r\n        )\r\n        .await;\r\n\r\n        // 检查是否是有效的 SEARCH/REPLACE 块格式\r\n        let search_has_blocks = params.diff.contains(\"------- SEARCH\")\r\n            \u0026\u0026 params.diff.contains(\"=======\")\r\n            \u0026\u0026 params.diff.contains(\"+++++++ REPLACE\");\r\n\r\n        if !search_has_blocks {\r\n            return Err(Error::LocalToolExecution {\r\n                tool: \"search_and_replace\".to_string(),\r\n                message: \"search_and_replace requires SEARCH/REPLACE block format. Use: ------- SEARCH\\\\nold\\\\n=======\\\\nnew\\\\n+++++++ REPLACE\".to_string()\r\n            });\r\n        }\r\n\r\n        let mut content = std::fs::read_to_string(\u0026path)?;\r\n        let mut total_replacements = 0;\r\n\r\n        let blocks = parse_search_replace_blocks_from_diff(\u0026params.diff);\r\n        let global = params.global.unwrap_or(true);\r\n\r\n        for (search_str, replace_str) in blocks {\r\n            if search_str.is_empty() {\r\n                continue;\r\n            }\r\n\r\n            if global {\r\n                let count = content.matches(\u0026search_str).count();\r\n                content = content.replace(\u0026search_str, \u0026replace_str);\r\n                total_replacements += count;\r\n            } else if let Some(index) = content.find(\u0026search_str) {\r\n                content.replace_range(index..index + search_str.len(), \u0026replace_str);\r\n                total_replacements += 1;\r\n            }\r\n        }\r\n\r\n        std::fs::write(\u0026path, \u0026content)?;\r\n\r\n        let result = SearchAndReplaceResult {\r\n            success: true,\r\n            replacements: total_replacements,\r\n        };\r\n\r\n        Ok(serde_json::to_value(result)?)\r\n    }\r\n}\r\n\r\nstruct ReplaceAllKeywordsTool;\r\n\r\n#[async_trait]\r\nimpl LocalTool for ReplaceAllKeywordsTool {\r\n    fn name(\u0026self) -\u003e \u0026str {\r\n        \"replace_all_keywords\"\r\n    }\r\n\r\n    fn description(\u0026self) -\u003e \u0026str {\r\n        \"Find and replace all occurrences of a keyword in a file\"\r\n    }\r\n\r\n    fn input_schema(\u0026self) -\u003e Value {\r\n        serde_json::json!({\r\n            \"type\": \"object\",\r\n            \"properties\": {\r\n                \"path\": {\r\n                    \"type\": \"string\",\r\n                    \"description\": \"Path to the file\"\r\n                },\r\n                \"search\": {\r\n                    \"type\": \"string\",\r\n                    \"description\": \"Keyword or regex pattern to search for\"\r\n                },\r\n                \"replace\": {\r\n                    \"type\": \"string\",\r\n                    \"description\": \"Replacement text\"\r\n                },\r\n                \"case_sensitive\": {\r\n                    \"type\": \"boolean\",\r\n                    \"description\": \"Whether the search is case-sensitive\",\r\n                    \"default\": true\r\n                },\r\n                \"use_regex\": {\r\n                    \"type\": \"boolean\",\r\n                    \"description\": \"Whether to use regex for matching\",\r\n                    \"default\": false\r\n                }\r\n            },\r\n            \"required\": [\"path\", \"search\", \"replace\"]\r\n        })\r\n    }\r\n\r\n    async fn call(\u0026self, arguments: Value, context: ToolContext) -\u003e Result\u003cValue\u003e {\r\n        let params: ReplaceAllKeywordsParams = serde_json::from_value(arguments)?;\r\n        let config = get_filesystem_config(\u0026context);\r\n\r\n        let path = normalize_and_validate_path(\u0026params.path, \u0026config.allowed_directories)?;\r\n\r\n        // 在修改前创建 checkpoint\r\n        let _ = maybe_create_checkpoint(\r\n            \u0026context,\r\n            vec![params.path.clone()],\r\n            Some(format!(\r\n                \"Before replacing all keywords in file: {}\",\r\n                params.path\r\n            )),\r\n        )\r\n        .await;\r\n        let mut content = std::fs::read_to_string(\u0026path)?;\r\n        let case_sensitive = params.case_sensitive.unwrap_or(true);\r\n        let use_regex = params.use_regex.unwrap_or(false);\r\n\r\n        let replacements = if use_regex {\r\n            let pattern = if case_sensitive {\r\n                regex::Regex::new(\u0026params.search)?\r\n            } else {\r\n                regex::Regex::new(\u0026format!(\"(?i){}\", params.search))?\r\n            };\r\n            let count = pattern.find_iter(\u0026content).count();\r\n            content = pattern.replace_all(\u0026content, \u0026params.replace).to_string();\r\n            count\r\n        } else if case_sensitive {\r\n            let count = content.matches(\u0026params.search).count();\r\n            content = content.replace(\u0026params.search, \u0026params.replace);\r\n            count\r\n        } else {\r\n            let mut result = String::new();\r\n            let mut last_end = 0;\r\n            let search_lower = params.search.to_lowercase();\r\n            let content_lower = content.to_lowercase();\r\n            let mut count = 0;\r\n\r\n            while let Some(start) = content_lower[last_end..].find(\u0026search_lower) {\r\n                let real_start = last_end + start;\r\n                let real_end = real_start + params.search.len();\r\n                result.push_str(\u0026content[last_end..real_start]);\r\n                result.push_str(\u0026params.replace);\r\n                last_end = real_end;\r\n                count += 1;\r\n            }\r\n            result.push_str(\u0026content[last_end..]);\r\n            content = result;\r\n            count\r\n        };\r\n\r\n        std::fs::write(\u0026path, \u0026content)?;\r\n\r\n        let result = ReplaceAllKeywordsResult {\r\n            success: true,\r\n            replacements,\r\n        };\r\n\r\n        Ok(serde_json::to_value(result)?)\r\n    }\r\n}\r\n\r\n// ==================== FilesystemTool ====================\r\n\r\n/// 文件系统工具集合\r\npub struct FilesystemTool;\r\n\r\nimpl FilesystemTool {\r\n    /// 注册所有文件系统工具到注册表\r\n    pub fn register_all(registry: \u0026mut super::registry::LocalToolRegistry) {\r\n        registry.register(Arc::new(ReadFileTool));\r\n        registry.register(Arc::new(WriteFileTool));\r\n        registry.register(Arc::new(ListDirectoryTool));\r\n        registry.register(Arc::new(DeleteFileTool));\r\n        registry.register(Arc::new(SearchFileTool));\r\n        registry.register(Arc::new(MoveFileTool));\r\n        registry.register(Arc::new(MoveDirectoryTool));\r\n        registry.register(Arc::new(DeleteDirectoryTool));\r\n        registry.register(Arc::new(CreateDirectoryTool));\r\n        registry.register(Arc::new(SearchAndReplaceTool));\r\n        registry.register(Arc::new(ReplaceAllKeywordsTool));\r\n    }\r\n}\r\n","traces":[{"line":19,"address":[],"length":0,"stats":{"Line":3458764513820540928}},{"line":20,"address":[],"length":0,"stats":{"Line":10376293541461622784}},{"line":22,"address":[],"length":0,"stats":{"Line":6917529027641081854}},{"line":23,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":26,"address l\u003e) {\r\n        let name = tool.name().to_string();\r\n        debug!(tool_name = %name, \"Registering local tool\");\r\n        self.tools.insert(name, tool);\r\n    }\r\n\r\n    /// 获取所有工具列表\r\n    pub fn list_tools(\u0026self) -\u003e Vec\u003cTool\u003e {\r\n        self.tools\r\n            .values()\r\n            .map(|t| Tool {\r\n                name: t.name().to_string(),\r\n                description: t.description().to_string(),\r\n                input_schema: t.input_schema(),\r\n            })\r\n            .collect()\r\n    }\r\n\r\n    /// 检查工具是否存在\r\n    pub fn has_tool(\u0026self, tool_name: \u0026str) -\u003e bool {\r\n        self.tools.contains_key(tool_name)\r\n    }\r\n\r\n    /// 获取工具定义\r\n    pub fn get_tool(\u0026self, tool_name: \u0026str) -\u003e Option\u003cTool\u003e {\r\n        self.tools.get(tool_name).map(|t| Tool {\r\n            name: t.name().to_string(),\r\n            description: t.description().to_string(),\r\n            input_schema: t.input_schema(),\r\n        })\r\n    }\r\n\r\n    /// 调用工具\r\n    pub async fn call_tool(\r\n        \u0026self,\r\n        tool_name: \u0026str,\r\n        arguments: Value,\r\n        context: ToolContext,\r\n    ) -\u003e Result\u003cValue\u003e {\r\n        let tool = self\r\n            .tools\r\n            .get(tool_name)\r\n            .ok_or_else(|| Error::LocalToolNotFound(tool_name.to_string()))?;\r\n\r\n        tool.call(arguments, context)\r\n            .await\r\n            .map_err(|e| Error::LocalToolExecution {\r\n                tool: tool_name.to_string(),\r\n                message: e.to_string(),\r\n            })\r\n    }\r\n\r\n    /// 清空注册表\r\n    pub fn clear(\u0026mut self) {\r\n        self.tools.clear();\r\n    }\r\n}\r\n\r\nimpl Default for LocalToolRegistry {\r\n    fn default() -\u003e Self {\r\n        Self::new()\r\n    }\r\n}\r\n\r\n#[cfg(test)]\r\nmod tests {\r\n    use super::*;\r\n    use crate::config::Config;\r\n    use crate::models::Session;\r\n    use async_trait::async_trait;\r\n    use serde_json::json;\r\n\r\n    struct TestTool;\r\n\r\n    #[async_trait]\r\n    impl LocalTool for TestTool {\r\n        fn name(\u0026self) -\u003e \u0026str {\r\n            \"test_tool\"\r\n        }\r\n\r\n        fn description(\u0026self) -\u003e \u0026str {\r\n            \"A test tool\"\r\n        }\r\n\r\n        fn input_schema(\u0026self) -\u003e Value {\r\n            json!({\r\n                \"type\": \"object\",\r\n                \"properties\": {\r\n                    \"input\": { \"type\": \"string\" }\r\n                }\r\n            })\r\n        }\r\n\r\n        async fn call(\u0026self, arguments: Value, _context: ToolContext) -\u003e Result\u003cValue\u003e {\r\n            let input = arguments[\"input\"].as_str().unwrap_or(\"\");\r\n            Ok(json!({ \"output\": format!(\"Hello, {}!\", input) }))\r\n        }\r\n    }\r\n\r\n    #[tokio::test]\r\n    async fn test_registry_new() {\r\n        let registry = LocalToolRegistry::new();\r\n        assert!(registry.tools.is_empty());\r\n    }\r\n\r\n    #[tokio::test]\r\n    async fn test_register_tool() {\r\n        let mut registry = LocalToolRegistry::new();\r\n        registry.register(Arc::new(TestTool));\r\n\r\n        assert!(registry.has_tool(\"test_tool\"));\r\n    }\r\n\r\n    #[tokio::test]\r\n    async fn test_list_tools() {\r\n        let mut registry = LocalToolRegistry::new();\r\n        registry.register(Arc::new(TestTool));\r\n\r\n        let tools = registry.list_tools();\r\n        assert_eq!(tools.len(), 1);\r\n        assert_eq!(tools[0].name, \"test_tool\");\r\n    }\r\n\r\n    #[tokio::test]\r\n    async fn test_call_tool() {\r\n        let mut registry = LocalToolRegistry::new();\r\n        registry.register(Arc::new(TestTool));\r\n\r\n        let context = ToolContext::new(Session::new(), Arc::new(Config::default()));\r\n\r\n        let result = registry\r\n            .call_tool(\"test_tool\", json!({\"input\": \"World\"}), context)\r\n            .await\r\n            .unwrap();\r\n\r\n        assert_eq!(result[\"output\"], \"Hello, World!\");\r\n    }\r\n\r\n    #[tokio::test]\r\n    async fn test_call_nonexistent_tool() {\r\n        let registry = LocalToolRegistry::new();\r\n\r\n        let context = ToolContext::new(Session::new(), Arc::new(Config::default()));\r\n\r\n        let result = registry.call_tool(\"nonexistent\", json!({}), context).await;\r\n\r\n        assert!(matches!(result, Err(Error::LocalToolNotFound(_))));\r\n    }\r\n}\r\n","traces":[{"line":22,"address":[],"length":0,"stats":{"Line":5836665117072162816}},{"line":24,"address":[],"length":0,"stats":{"Line":5836665117072162816}},{"line":29,"address":[],"length":0,"stats":{"Line":3098476543630901248}},{"line":30,"address":[],"length":0,"stats":{"Line":9295429630892703744}},{"line":31,"address":[],"length":0,"stats":{"Line":3098476543630901248}},{"line":32,"address":[],"length":0,"stats":{"Line":12393906174523604992}},{"line":36,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":37,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":39,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":40,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":41,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":42,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":48,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":49,"address":[],"length":0,"stats":{"Line":648518346341351424}},{"line":53,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":54,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":55,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":56,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":57,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":62,"address":[],"length":0,"stats":{"Line":7349874591868649472}  ====================\r\n\r\nstruct RunCommandTool;\r\n\r\nimpl RunCommandTool {\r\n    pub fn new() -\u003e Self {\r\n        Self\r\n    }\r\n\r\n    /// 检查命令是否在黑名单中\r\n    fn is_command_blacklisted(\u0026self, command: \u0026str, context: \u0026ToolContext) -\u003e bool {\r\n        // 硬编码的黑名单\r\n        let hardcoded_blacklist = [\"rm -rf /\", \"mkfs\", \"dd if=\", \":(){ :|:\u0026 };:\"];\r\n\r\n        // 检查硬编码黑名单\r\n        if hardcoded_blacklist\r\n            .iter()\r\n            .any(|pattern| command.contains(pattern))\r\n        {\r\n            return true;\r\n        }\r\n\r\n        // 检查配置中的黑名单\r\n        if context\r\n            .config\r\n            .local_tools\r\n            .terminal\r\n            .command_blacklist\r\n            .iter()\r\n            .any(|pattern| command.contains(pattern))\r\n        {\r\n            return true;\r\n        }\r\n\r\n        false\r\n    }\r\n\r\n    /// 检查工作目录是否被允许\r\n    fn is_working_dir_allowed(\u0026self, cwd: \u0026str, context: \u0026ToolContext) -\u003e bool {\r\n        // 如果没有配置允许的工作目录，则允许所有目录\r\n        if context\r\n            .config\r\n            .local_tools\r\n            .terminal\r\n            .allowed_workspaces\r\n            .is_empty()\r\n        {\r\n            return true;\r\n        }\r\n\r\n        // 检查工作目录是否在允许的列表中\r\n        context\r\n            .config\r\n            .local_tools\r\n            .terminal\r\n            .allowed_workspaces\r\n            .iter()\r\n            .any(|allowed_dir| cwd.starts_with(allowed_dir))\r\n    }\r\n\r\n    /// 应用输出过滤规则\r\n    fn apply_output_filters(\u0026self, command: \u0026str, output: \u0026str, context: \u0026ToolContext) -\u003e String {\r\n        // 检查是否有针对该命令的过滤规则\r\n        if let Some(filters) = context.config.local_tools.terminal.filters.get(command) {\r\n            let lines: Vec\u003c\u0026str\u003e = output.lines().collect();\r\n            let filtered_lines: Vec\u003c\u0026str\u003e = lines\r\n                .into_iter()\r\n                .filter(|line| filters.iter().any(|filter| line.contains(filter)))\r\n                .collect();\r\n            return filtered_lines.join(\"\\n\");\r\n        }\r\n\r\n        output.to_string()\r\n    }\r\n}\r\n\r\n#[async_trait]\r\nimpl crate::tools::LocalTool for RunCommandTool {\r\n    fn name(\u0026self) -\u003e \u0026str {\r\n        \"run_command\"\r\n    }\r\n\r\n    fn description(\u0026self) -\u003e \u0026str {\r\n        \"运行系统命令\"\r\n    }\r\n\r\n    fn input_schema(\u0026self) -\u003e Value {\r\n        json!({\r\n            \"type\": \"object\",\r\n            \"properties\": {\r\n                \"command\": {\r\n                    \"type\": \"string\",\r\n                    \"description\": \"要执行的命令\"\r\n                },\r\n                \"args\": {\r\n                    \"type\": \"array\",\r\n                    \"items\": {\r\n                        \"type\": \"string\"\r\n                    },\r\n                    \"description\": \"命令参数\"\r\n                },\r\n                \"cwd\": {\r\n                    \"type\": \"string\",\r\n                    \"description\": \"工作目录\"\r\n                },\r\n                \"stream_output\": {\r\n                    \"type\": \"boolean\",\r\n                    \"description\": \"是否流式输出\"\r\n                }\r\n            },\r\n            \"required\": [\"command\"],\r\n            \"additionalProperties\": false\r\n        })\r\n    }\r\n\r\n    async fn call(\u0026self, arguments: Value, context: ToolContext) -\u003e Result\u003cValue\u003e {\r\n        let params: RunCommandParams = serde_json::from_value(arguments)?;\r\n\r\n        // 检查命令是否被黑名单\r\n        let full_command = if params.args.is_empty() {\r\n            params.command.clone()\r\n        } else {\r\n            format!(\"{} {}\", params.command, params.args.join(\" \"))\r\n        };\r\n\r\n        if self.is_command_blacklisted(\u0026full_command, \u0026context) {\r\n            return Err(crate::error::Error::LocalToolExecution {\r\n                tool: \"run_command\".to_string(),\r\n                message: \"Command is in blacklist\".to_string(),\r\n            });\r\n        }\r\n\r\n        // 检查工作目录是否被允许\r\n        if let Some(cwd) = \u0026params.cwd\r\n            \u0026\u0026 !self.is_working_dir_allowed(cwd, \u0026context) {\r\n                return Err(crate::error::Error::LocalToolExecution {\r\n                    tool: \"run_command\".to_string(),\r\n                    message: format!(\"Working directory not allowed: {}\", cwd),\r\n                });\r\n            }\r\n\r\n        // 执行命令\r\n        let mut command = Command::new(\u0026params.command);\r\n        if !params.args.is_empty() {\r\n            command.args(\u0026params.args);\r\n        }\r\n        if let Some(cwd) = \u0026params.cwd {\r\n            command.current_dir(cwd);\r\n        }\r\n\r\n        command.stdout(Stdio::piped());\r\n        command.stderr(Stdio::piped());\r\n\r\n        let child = command.spawn()?;\r\n        let child_id = child.id().expect(\"Failed to get child process id\");\r\n\r\n        let timeout = Duration::from_secs(context.config.local_tools.terminal.timeout_seconds);\r\n\r\n        let output_result = tokio::select! {\r\n            output = child.wait_with_output() =\u003e output,\r\n            _ = tokio::time::sleep(timeout) =\u003e {\r\n                // 超时，尝试终止进程\r\n                if let Ok(mut cmd) = tokio::process::Command::new(\"taskkill\")\r\n                    .arg(\"/F\")\r\n                    .arg(\"/PID\")\r\n                    .arg(format!(\"{}\", child_id))\r\n                    .spawn()\r\n                {\r\n                    let _ = cmd.wait().await;\r\n                }\r\n                return Err(crate::error::Error::LocalToolExecution {\r\n                    tool: \"run_command\".to_string(),\r\n                    message: format!(\r\n                        \"Command timed out after {} seconds\",\r\n                        context.config.local_tools.terminal.timeout_seconds\r\n                    ),\r\n                });\r\n            }\r\n        };\r\n\r\n        let output = match output_result {\r\n            Ok(output) =\u003e output,\r\n            Err(e) =\u003e {\r\n                return Err(crate::error::Error::LocalToolExecution {\r\n                    tool: \"run_command\".to_string(),\r\n                    message: e.to_string(),\r\n                });\r\n            }\r\n        };\r\n\r\n        // 处理输出\r\n        let stdout = String::from_utf8_lossy(\u0026output.stdout).to_string();\r\n        let stderr = String::from_utf8_lossy(\u0026output.stderr).to_string();\r\n\r\n        let max_output_bytes = context.config.local_tools.terminal.max_output_bytes;\r\n        let mut truncated = false;\r\n\r\n        let (processed_stdout, processed_stderr) = if stdout.len() + stderr.len() \u003e max_output_bytes\r\n        {\r\n            truncated = true;\r\n            let mut processed_stdout = stdout;\r\n            let mut processed_stderr = stderr;\r\n\r\n            // 截断输出以确保总长度不超过限制\r\n            while processed_stdout.len() + processed_stderr.len() \u003e max_output_bytes {\r\n                if processed_stdout.len() \u003e processed_stderr.len() {\r\n                    processed_stdout.pop();\r\n                } else {\r\n                    processed_stderr.pop();\r\n                }\r\n            }\r\n\r\n            (processed_stdout, processed_stderr)\r\n        } else {\r\n            (stdout, stderr)\r\n        };\r\n\r\n        // 应用输出过滤规则\r\n        let filtered_stdout =\r\n            self.apply_output_filters(\u0026params.command, \u0026processed_stdout, \u0026context);\r\n\r\n        let result = RunCommandResult {\r\n            exit_code: output.status.code().unwrap_or(-1),\r\n            stdout: filtered_stdout,\r\n            stderr: processed_stderr,\r\n            truncated,\r\n        };\r\n\r\n        Ok(serde_json::to_value(result)?)\r\n    }\r\n}\r\n\r\n// ==================== 终端工具管理器 ====================\r\n\r\npub struct TerminalTool;\r\n\r\nimpl Default for TerminalTool {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\nimpl TerminalTool {\r\n    pub fn new() -\u003e Self {\r\n        Self\r\n    }\r\n\r\n    /// 注册所有终端工具\r\n    pub fn register_all(registry: \u0026mut crate::tools::registry::LocalToolRegistry) {\r\n        registry.register(std::sync::Arc::new(RunCommandTool::new()));\r\n    }\r\n}\r\n\r\n// ==================== 测试 ====================\r\n\r\n#[cfg(test)]\r\nmod tests {\r\n    use super::*;\r\n    use crate::config::Config;\r\n    use crate::models::Session;\r\n    use crate::tools::LocalTool;\r\n    use std::sync::Arc;\r\n\r\n    #[tokio::test]\r\n    async fn test_run_command() {\r\n        let config = Arc::new(Config::default());\r\n        let session = Session::new();\r\n        let context = ToolContext::new(session, config);\r\n\r\n        let tool = RunCommandTool::new();\r\n        let args = json!({\r\n            \"command\": \"echo\",\r\n            \"args\": [\"Hello\", \"World\"],\r\n            \"cwd\": \".\",\r\n            \"stream_output\": false\r\n        });\r\n\r\n        let result = tool.call(args, context).await.unwrap();\r\n        let run_result: RunCommandResult = serde_json::from_value(result).unwrap();\r\n\r\n        assert_eq!(run_result.exit_code, 0);\r\n        assert!(run_result.stdout.contains(\"Hello World\"));\r\n        assert!(run_result.stderr.is_empty());\r\n        assert!(!run_result.truncated);\r\n    }\r\n}\r\n","traces":[{"line":48,"address":[],"length":0,"stats":{"Line":3963167672086036480}},{"line":49,"address":[],"length":0,"stats":{"Line":3963167672086036480}},{"line":53,"address":[],"length":0,"stats":{"Line":3674937295934324736}},{"line":55,"address":[],"length":0,"stats":{"Line":11024811887802974208}},{"line":58,"address":[],"length":0,"stats":{"Line":3674937295934324736}},{"
