  pub fn new(\r\n        id: acp::TerminalId,\r\n        command_label: \u0026str,\r\n        working_dir: Option\u003cPathBuf\u003e,\r\n        output_byte_limit: Option\u003cusize\u003e,\r\n        terminal: Entity\u003cterminal::Terminal\u003e,\r\n        language_registry: Arc\u003cLanguageRegistry\u003e,\r\n        cx: \u0026mut Context\u003cSelf\u003e,\r\n    ) -\u003e Self {\r\n        let command_task = terminal.read(cx).wait_for_completed_task(cx);\r\n        Self {\r\n            id,\r\n            command: cx.new(|cx| {\r\n                Markdown::new(\r\n                    format!(\"```\\n{}\\n```\", command_label).into(),\r\n                    Some(language_registry.clone()),\r\n                    None,\r\n                    cx,\r\n                )\r\n            }),\r\n            working_dir,\r\n            terminal,\r\n            started_at: Instant::now(),\r\n            output: None,\r\n            output_byte_limit,\r\n            user_stopped: Arc::new(AtomicBool::new(false)),\r\n            _output_task: cx\r\n                .spawn(async move |this, cx| {\r\n                    let exit_status = command_task.await;\r\n\r\n                    this.update(cx, |this, cx| {\r\n                        let (content, original_content_len) = this.truncated_output(cx);\r\n                        let content_line_count = this.terminal.read(cx).total_lines();\r\n\r\n                        this.output = Some(TerminalOutput {\r\n                            ended_at: Instant::now(),\r\n                            exit_status,\r\n                            content,\r\n                            original_content_len,\r\n                            content_line_count,\r\n                        });\r\n                        cx.notify();\r\n                    })\r\n                    .ok();\r\n\r\n                    let exit_status = exit_status.map(portable_pty::ExitStatus::from);\r\n\r\n                    acp::TerminalExitStatus::new()\r\n                        .exit_code(exit_status.as_ref().map(|e| e.exit_code()))\r\n                        .signal(exit_status.and_then(|e| e.signal().map(ToOwned::to_owned)))\r\n                })\r\n                .shared(),\r\n        }\r\n    }\r\n\r\n    pub fn id(\u0026self) -\u003e \u0026acp::TerminalId {\r\n        \u0026self.id\r\n    }\r\n\r\n    pub fn wait_for_exit(\u0026self) -\u003e Shared\u003cTask\u003cacp::TerminalExitStatus\u003e\u003e {\r\n        self._output_task.clone()\r\n    }\r\n\r\n    pub fn kill(\u0026mut self, cx: \u0026mut App) {\r\n        self.terminal.update(cx, |terminal, _cx| {\r\n            terminal.kill_active_task();\r\n        });\r\n    }\r\n\r\n    /// Marks this terminal as stopped by user action and then kills it.\r\n    /// This should be called when the user explicitly clicks a Stop button.\r\n    pub fn stop_by_user(\u0026mut self, cx: \u0026mut App) {\r\n        self.user_stopped.store(true, Ordering::SeqCst);\r\n        self.kill(cx);\r\n    }\r\n\r\n    /// Returns whether this terminal was stopped by explicit user action.\r\n    pub fn was_stopped_by_user(\u0026self) -\u003e bool {\r\n        self.user_stopped.load(Ordering::SeqCst)\r\n    }\r\n\r\n    pub fn current_output(\u0026self, cx: \u0026App) -\u003e acp::TerminalOutputResponse {\r\n        if let Some(output) = self.output.as_ref() {\r\n            let exit_status = output.exit_status.map(portable_pty::ExitStatus::from);\r\n\r\n            acp::TerminalOutputResponse::new(\r\n                output.content.clone(),\r\n                output.original_content_len \u003e output.content.len(),\r\n            )\r\n            .exit_status(\r\n                acp::TerminalExitStatus::new()\r\n                    .exit_code(exit_status.as_ref().map(|e| e.exit_code()))\r\n                    .signal(exit_status.and_then(|e| e.signal().map(ToOwned::to_owned))),\r\n            )\r\n        } else {\r\n            let (current_content, original_len) = self.truncated_output(cx);\r\n            let truncated = current_content.len() \u003c original_len;\r\n            acp::TerminalOutputResponse::new(current_content, truncated)\r\n        }\r\n    }\r\n\r\n    fn truncated_output(\u0026self, cx: \u0026App) -\u003e (String, usize) {\r\n        let terminal = self.terminal.read(cx);\r\n        let mut content = terminal.get_content();\r\n\r\n        let original_content_len = content.len();\r\n\r\n        if let Some(limit) = self.output_byte_limit\r\n            \u0026\u0026 content.len() \u003e limit\r\n        {\r\n            let mut end_ix = limit.min(content.len());\r\n            while !content.is_char_boundary(end_ix) {\r\n                end_ix -= 1;\r\n            }\r\n            // Don't truncate mid-line, clear the remainder of the last line\r\n            end_ix = content[..end_ix].rfind('\\n').unwrap_or(end_ix);\r\n            content.truncate(end_ix);\r\n        }\r\n\r\n        (content, original_content_len)\r\n    }\r\n\r\n    pub fn command(\u0026self) -\u003e \u0026Entity\u003cMarkdown\u003e {\r\n        \u0026self.command\r\n    }\r\n\r\n    pub fn update_command_label(\u0026self, label: \u0026str, cx: \u0026mut App) {\r\n        self.command.update(cx, |command, cx| {\r\n            command.replace(format!(\"```\\n{}\\n```\", label), cx);\r\n        });\r\n    }\r\n\r\n    pub fn working_dir(\u0026self) -\u003e \u0026Option\u003cPathBuf\u003e {\r\n        \u0026self.working_dir\r\n    }\r\n\r\n    pub fn started_at(\u0026self) -\u003e Instant {\r\n        self.started_at\r\n    }\r\n\r\n    pub fn output(\u0026self) -\u003e Option\u003c\u0026TerminalOutput\u003e {\r\n        self.output.as_ref()\r\n    }\r\n\r\n    pub fn inner(\u0026self) -\u003e \u0026Entity\u003cterminal::Terminal\u003e {\r\n        \u0026self.terminal\r\n    }\r\n\r\n    pub fn to_markdown(\u0026self, cx: \u0026App) -\u003e String {\r\n        format!(\r\n            \"Terminal:\\n```\\n{}\\n```\\n\",\r\n            self.terminal.read(cx).get_content()\r\n        )\r\n    }\r\n}\r\n\r\npub async fn create_terminal_entity(\r\n    command: String,\r\n    args: \u0026[String],\r\n    env_vars: Vec\u003c(String, String)\u003e,\r\n    cwd: Option\u003cPathBuf\u003e,\r\n    project: \u0026Entity\u003cProject\u003e,\r\n    cx: \u0026mut AsyncApp,\r\n) -\u003e Result\u003cEntity\u003cterminal::Terminal\u003e\u003e {\r\n    let mut env = if let Some(dir) = \u0026cwd {\r\n        project\r\n            .update(cx, |project, cx| {\r\n                project.environment().update(cx, |env, cx| {\r\n                    env.directory_environment(dir.clone().into(), cx)\r\n                })\r\n            })\r\n            .await\r\n            .unwrap_or_default()\r\n    } else {\r\n        Default::default()\r\n    };\r\n\r\n    // Disable pagers so agent/terminal commands don't hang behind interactive UIs\r\n    env.insert(\"PAGER\".into(), \"\".into());\r\n    // Override user core.pager (e.g. delta) which Git prefers over PAGER\r\n    env.insert(\"GIT_PAGER\".into(), \"cat\".into());\r\n    env.extend(env_vars);\r\n\r\n    // Use remote shell or default system shell, as appropriate\r\n    let shell = project\r\n        .update(cx, |project, cx| {\r\n            project\r\n                .remote_client()\r\n                .and_then(|r| r.read(cx).default_system_shell())\r\n                .map(Shell::Program)\r\n        })\r\n        .unwrap_or_else(|| Shell::Program(get_default_system_shell_preferring_bash()));\r\n    let is_windows = project.read_with(cx, |project, cx| project.path_style(cx).is_windows());\r\n    let (task_command, task_args) = task::ShellBuilder::new(\u0026shell, is_windows)\r\n        .redirect_stdin_to_dev_null()\r\n        .build(Some(command.clone()), \u0026args);\r\n\r\n    project\r\n        .update(cx, |project, cx| {\r\n            project.create_terminal_task(\r\n                task::SpawnInTerminal {\r\n                    command: Some(task_command),\r\n                    args: task_args,\r\n                    cwd,\r\n                    env,\r\n                    ..Default::default()\r\n                },\r\n                cx,\r\n            )\r\n        })\r\n        .await\r\n}\r\n","traces":[],"covered":0,"coverable":0},{"path":["D:","\\","mineclaw","参考","terminal_command_execution_tool","agent_settings.rs"],"content":"mod agent_profile;\r\n\r\nuse std::path::{Component, Path};\r\nuse std::sync::{Arc, LazyLock};\r\n\r\nuse agent_client_protocol::ModelId;\r\nuse collections::{HashSet, IndexMap};\r\nuse gpui::{App, Pixels, px};\r\nuse language_model::LanguageModel;\r\nuse project::DisableAiSettings;\r\nuse schemars::JsonSchema;\r\nuse serde::{Deserialize, Serialize};\r\nuse settings::{\r\n    DefaultAgentView, DockPosition, LanguageModelParameters, LanguageModelSelection,\r\n    NotifyWhenAgentWaiting, RegisterSetting, Settings, ToolPermissionMode,\r\n};\r\n\r\npub use crate::agent_profile::*;\r\n\r\npub const SUMMARIZE_THREAD_PROMPT: \u0026str = include_str!(\"prompts/summarize_thread_prompt.txt\");\r\npub const SUMMARIZE_THREAD_DETAILED_PROMPT: \u0026str =\r\n    include_str!(\"prompts/summarize_thread_detailed_prompt.txt\");\r\n\r\n#[derive(Clone, Debug, RegisterSetting)]\r\npub struct AgentSettings {\r\n    pub enabled: bool,\r\n    pub button: bool,\r\n    pub dock: DockPosition,\r\n    pub default_width: Pixels,\r\n    pub default_height: Pixels,\r\n    pub default_model: Option\u003cLanguageModelSelection\u003e,\r\n    pub inline_assistant_model: Option\u003cLanguageModelSelection\u003e,\r\n    pub inline_assistant_use_streaming_tools: bool,\r\n    pub commit_message_model: Option\u003cLanguageModelSelection\u003e,\r\n    pub thread_summary_model: Option\u003cLanguageModelSelection\u003e,\r\n    pub inline_alternatives: Vec\u003cLanguageModelSelection\u003e,\r\n    pub favorite_models: Vec\u003cLanguageModelSelection\u003e,\r\n    pub default_profile: AgentProfileId,\r\n    pub default_view: DefaultAgentView,\r\n    pub profiles: IndexMap\u003cAgentProfileId, AgentProfileSettings\u003e,\r\n\r\n    pub notify_when_agent_waiting: NotifyWhenAgentWaiting,\r\n    pub play_sound_when_agent_done: bool,\r\n    pub single_file_review: bool,\r\n    pub model_parameters: Vec\u003cLanguageModelParameters\u003e,\r\n    pub enable_feedback: bool,\r\n    pub expand_edit_card: bool,\r\n    pub expand_terminal_card: bool,\r\n    pub cancel_generation_on_terminal_stop: bool,\r\n    pub use_modifier_to_send: bool,\r\n    pub message_editor_min_lines: usize,\r\n    pub show_turn_stats: bool,\r\n    pub tool_permissions: ToolPermissions,\r\n}\r\n\r\nimpl AgentSettings {\r\n    pub fn enabled(\u0026self, cx: \u0026App) -\u003e bool {\r\n        self.enabled \u0026\u0026 !DisableAiSettings::get_global(cx).disable_ai\r\n    }\r\n\r\n    pub fn temperature_for_model(model: \u0026Arc\u003cdyn LanguageModel\u003e, cx: \u0026App) -\u003e Option\u003cf32\u003e {\r\n        let settings = Self::get_global(cx);\r\n        for setting in settings.model_parameters.iter().rev() {\r\n            if let Some(provider) = \u0026setting.provider\r\n                \u0026\u0026 provider.0 != model.provider_id().0\r\n            {\r\n                continue;\r\n            }\r\n            if let Some(setting_model) = \u0026setting.model\r\n                \u0026\u0026 *setting_model != model.id().0\r\n            {\r\n                continue;\r\n            }\r\n            return setting.temperature;\r\n        }\r\n        return None;\r\n    }\r\n\r\n    pub fn set_message_editor_max_lines(\u0026self) -\u003e usize {\r\n        self.message_editor_min_lines * 2\r\n    }\r\n\r\n    pub fn favorite_model_ids(\u0026self) -\u003e HashSet\u003cModelId\u003e {\r\n        self.favorite_models\r\n            .iter()\r\n            .map(|sel| ModelId::new(format!(\"{}/{}\", sel.provider.0, sel.model)))\r\n            .collect()\r\n    }\r\n}\r\n\r\n#[derive(Debug, PartialEq, Eq, Hash, Clone, Serialize, Deserialize, JsonSchema)]\r\npub struct AgentProfileId(pub Arc\u003cstr\u003e);\r\n\r\nimpl AgentProfileId {\r\n    pub fn as_str(\u0026self) -\u003e \u0026str {\r\n        \u0026self.0\r\n    }\r\n}\r\n\r\nimpl std::fmt::Display for AgentProfileId {\r\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\r\n        write!(f, \"{}\", self.0)\r\n    }\r\n}\r\n\r\nimpl Default for AgentProfileId {\r\n    fn default() -\u003e Self {\r\n        Self(\"write\".into())\r\n    }\r\n}\r\n\r\n#[derive(Clone, Debug, Default)]\r\npub struct ToolPermissions {\r\n    /// Global default permission when no tool-specific rules or patterns match.\r\n    pub default: ToolPermissionMode,\r\n    pub tools: collections::HashMap\u003cArc\u003cstr\u003e, ToolRules\u003e,\r\n}\r\n\r\nimpl ToolPermissions {\r\n    /// Returns all invalid regex patterns across all tools.\r\n    pub fn invalid_patterns(\u0026self) -\u003e Vec\u003c\u0026InvalidRegexPattern\u003e {\r\n        self.tools\r\n            .values()\r\n            .flat_map(|rules| rules.invalid_patterns.iter())\r\n            .collect()\r\n    }\r\n\r\n    /// Returns true if any tool has invalid regex patterns.\r\n    pub fn has_invalid_patterns(\u0026self) -\u003e bool {\r\n        self.tools\r\n            .values()\r\n            .any(|rules| !rules.invalid_patterns.is_empty())\r\n    }\r\n}\r\n\r\n/// Represents a regex pattern that failed to compile.\r\n#[derive(Clone, Debug)]\r\npub struct InvalidRegexPattern {\r\n    /// The pattern string that failed to compile.\r\n    pub pattern: String,\r\n    /// Which rule list this pattern was in (e.g., \"always_deny\", \"always_allow\", \"always_confirm\").\r\n    pub rule_type: String,\r\n    /// The error message from the regex compiler.\r\n    pub error: String,\r\n}\r\n\r\n#[derive(Clone, Debug, Default)]\r\npub struct ToolRules {\r\n    pub default: Option\u003cToolPermissionMode\u003e,\r\n    pub always_allow: Vec\u003cCompiledRegex\u003e,\r\n    pub always_deny: Vec\u003cCompiledRegex\u003e,\r\n    pub always_confirm: Vec\u003cCompiledRegex\u003e,\r\n    /// Patterns that failed to compile. If non-empty, tool calls should be blocked.\r\n    pub invalid_patterns: Vec\u003cInvalidRegexPattern\u003e,\r\n}\r\n\r\n#[derive(Clone)]\r\npub struct CompiledRegex {\r\n    pub pattern: String,\r\n    pub case_sensitive: bool,\r\n    pub regex: regex::Regex,\r\n}\r\n\r\nimpl std::fmt::Debug for CompiledRegex {\r\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\r\n        f.debug_struct(\"CompiledRegex\")\r\n            .field(\"pattern\", \u0026self.pattern)\r\n            .field(\"case_sensitive\", \u0026self.case_sensitive)\r\n            .finish()\r\n    }\r\n}\r\n\r\nimpl CompiledRegex {\r\n    pub fn new(pattern: \u0026str, case_sensitive: bool) -\u003e Option\u003cSelf\u003e {\r\n        Self::try_new(pattern, case_sensitive).ok()\r\n    }\r\n\r\n    pub fn try_new(pattern: \u0026str, case_sensitive: bool) -\u003e Result\u003cSelf, regex::Error\u003e {\r\n        let regex = regex::RegexBuilder::new(pattern)\r\n            .case_insensitive(!case_sensitive)\r\n            .build()?;\r\n        Ok(Self {\r\n            pattern: pattern.to_string(),\r\n            case_sensitive,\r\n            regex,\r\n        })\r\n    }\r\n\r\n    pub fn is_match(\u0026self, input: \u0026str) -\u003e bool {\r\n        self.regex.is_match(input)\r\n    }\r\n}\r\n\r\npub const HARDCODED_SECURITY_DENIAL_MESSAGE: \u0026str = \"Blocked by built-in security rule. This operation is considered too \\\r\n     harmful to be allowed, and cannot be overridden by settings.\";\r\n\r\n/// Security rules that are always enforced and cannot be overridden by any setting.\r\n/// These protect against catastrophic operations like wiping filesystems.\r\npub struct HardcodedSecurityRules {\r\n    pub terminal_deny: Vec\u003cCompiledRegex\u003e,\r\n}\r\n\r\npub static HARDCODED_SECURITY_RULES: LazyLock\u003cHardcodedSecurityRules\u003e = LazyLock::new(|| {\r\n    const FLAGS: \u0026str = r\"(--[a-zA-Z0-9][-a-zA-Z0-9_]*(=[^\\s]*)?\\s+|-[a-zA-Z]+\\s+)*\";\r\n    const TRAILING_FLAGS: \u0026str = r\"(\\s+--[a-zA-Z0-9][-a-zA-Z0-9_]*(=[^\\s]*)?|\\s+-[a-zA-Z]+)*\\s*\";\r\n\r\n    HardcodedSecurityRules {\r\n        terminal_deny: vec![\r\n            // Recursive deletion of root - \"rm -rf /\", \"rm -rf /*\"\r\n            CompiledRegex::new(\r\n                \u0026format!(r\"\\brm\\s+{FLAGS}(--\\s+)?/\\*?{TRAILING_FLAGS}$\"),\r\n                false,\r\n            )\r\n            .expect(\"hardcoded regex should compile\"),\r\n            // Recursive deletion of home via tilde - \"rm -rf ~\", \"rm -rf ~/\"\r\n            CompiledRegex::new(\r\n                \u0026format!(r\"\\brm\\s+{FLAGS}(--\\s+)?~/?\\*?{TRAILING_FLAGS}$\"),\r\n                false,\r\n            )\r\n            .expect(\"hardcoded regex should compile\"),\r\n            // Recursive deletion of home via env var - \"rm -rf $HOME\", \"rm -rf ${HOME}\"\r\n            CompiledRegex::new(\r\n                \u0026format!(r\"\\brm\\s+{FLAGS}(--\\s+)?(\\$HOME|\\$\\{{HOME\\}})/?(\\*)?{TRAILING_FLAGS}$\"),\r\n                false,\r\n            )\r\n            .expect(\"hardcoded regex should compile\"),\r\n            // Recursive deletion of current directory - \"rm -rf .\", \"rm -rf ./\"\r\n            CompiledRegex::new(\r\n                \u0026format!(r\"\\brm\\s+{FLAGS}(--\\s+)?\\./?\\*?{TRAILING_FLAGS}$\"),\r\n                false,\r\n            )\r\n            .expect(\"hardcoded regex should compile\"),\r\n            // Recursive deletion of parent directory - \"rm -rf ..\", \"rm -rf ../\"\r\n            CompiledRegex::new(\r\n                \u0026format!(r\"\\brm\\s+{FLAGS}(--\\s+)?\\.\\./?\\*?{TRAILING_FLAGS}$\"),\r\n                false,\r\n            )\r\n            .expect(\"hardcoded regex should compile\"),\r\n        ],\r\n    }\r\n});\r\n\r\n/// Checks if input matches any hardcoded security rules that cannot be bypassed.\r\n/// Returns the denial reason string if blocked, None otherwise.\r\n///\r\n/// `terminal_tool_name` should be the tool name used for the terminal tool\r\n/// (e.g. `\"terminal\"`). `extracted_commands` can optionally provide parsed\r\n/// sub-commands for chained command checking; callers with access to a shell\r\n/// parser should extract sub-commands and pass them here.\r\npub fn check_hardcoded_security_rules(\r\n    tool_name: \u0026str,\r\n    terminal_tool_name: \u0026str,\r\n    input: \u0026str,\r\n    extracted_commands: Option\u003c\u0026[String]\u003e,\r\n) -\u003e Option\u003cString\u003e {\r\n    if tool_name != terminal_tool_name {\r\n        return None;\r\n    }\r\n\r\n    let rules = \u0026*HARDCODED_SECURITY_RULES;\r\n    let terminal_patterns = \u0026rules.terminal_deny;\r\n\r\n    if matches_hardcoded_patterns(input, terminal_patterns) {\r\n        return Some(HARDCODED_SECURITY_DENIAL_MESSAGE.into());\r\n    }\r\n\r\n    if let Some(commands) = extracted_commands {\r\n        for command in commands {\r\n            if matches_hardcoded_patterns(command, terminal_patterns) {\r\n                return Some(HARDCODED_SECURITY_DENIAL_MESSAGE.into());\r\n            }\r\n        }\r\n    }\r\n\r\n    None\r\n}\r\n\r\nfn matches_hardcoded_patterns(command: \u0026str, patterns: \u0026[CompiledRegex]) -\u003e bool {\r\n    for pattern in patterns {\r\n        if pattern.is_match(command) {\r\n            return true;\r\n        }\r\n    }\r\n\r\n    for expanded in expand_rm_to_single_path_commands(command) {\r\n        for pattern in patterns {\r\n            if pattern.is_match(\u0026expanded) {\r\n                return true;\r\n            }\r\n        }\r\n    }\r\n\r\n    false\r\n}\r\n\r\nfn expand_rm_to_single_path_commands(command: \u0026str) -\u003e Vec\u003cString\u003e {\r\n    let trimmed = command.trim();\r\n\r\n    let first_token = trimmed.split_whitespace().next();\r\n    if !first_token.is_some_and(|t| t.eq_ignore_ascii_case(\"rm\")) {\r\n        return vec![];\r\n    }\r\n\r\n    let parts: Vec\u003c\u0026str\u003e = trimmed.split_whitespace().collect();\r\n    let mut flags = Vec::new();\r\n    let mut paths = Vec::new();\r\n    let mut past_double_dash = false;\r\n\r\n    for part in parts.iter().skip(1) {\r\n        if !past_double_dash \u0026\u0026 *part == \"--\" {\r\n            past_double_dash = true;\r\n            flags.push(*part);\r\n            continue;\r\n        }\r\n        if !past_double_dash \u0026\u0026 part.starts_with('-') {\r\n            flags.push(*part);\r\n        } else {\r\n            paths.push(*part);\r\n        }\r\n    }\r\n\r\n    let flags_str = if flags.is_empty() {\r\n        String::new()\r\n    } else {\r\n        format!(\"{} \", flags.join(\" \"))\r\n    };\r\n\r\n    let mut results = Vec::new();\r\n    for path in \u0026paths {\r\n        if path.starts_with('$') {\r\n            let home_prefix = if path.starts_with(\"${HOME}\") {\r\n                Some(\"${HOME}\")\r\n            } else if path.starts_with(\"$HOME\") {\r\n                Some(\"$HOME\")\r\n            } else {\r\n                None\r\n            };\r\n\r\n            if let Some(prefix) = home_prefix {\r\n                let suffix = \u0026path[prefix.len()..];\r\n                if suffix.is_empty() {\r\n                    results.push(format!(\"rm {flags_str}{path}\"));\r\n                } else if suffix.starts_with('/') {\r\n                    let normalized_suffix = normalize_path(suffix);\r\n                    let reconstructed = if normalized_suffix == \"/\" {\r\n                        prefix.to_string()\r\n                    } else {\r\n                        format!(\"{prefix}{normalized_suffix}\")\r\n                    };\r\n                    results.push(format!(\"rm {flags_str}{reconstructed}\"));\r\n                } else {\r\n                    results.push(format!(\"rm {flags_str}{path}\"));\r\n                }\r\n            } else {\r\n                results.push(format!(\"rm {flags_str}{path}\"));\r\n            }\r\n            continue;\r\n        }\r\n\r\n        let mut normalized = normalize_path(path);\r\n        if normalized.is_empty() \u0026\u0026 !Path::new(path).has_root() {\r\n            normalized = \".\".to_string();\r\n        }\r\n\r\n        results.push(format!(\"rm {flags_str}{normalized}\"));\r\n    }\r\n\r\n    results\r\n}\r\n\r\npub fn normalize_path(raw: \u0026str) -\u003e String {\r\n    let is_absolute = Path::new(raw).has_root();\r\n    let mut components: Vec\u003c\u0026str\u003e = Vec::new();\r\n    for component in Path::new(raw).components() {\r\n        match component {\r\n            Component::CurDir =\u003e {}\r\n            Component::ParentDir =\u003e {\r\n                if components.last() == Some(\u0026\"..\") {\r\n                    components.push(\"..\");\r\n                } else if !components.is_empty() {\r\n                    components.pop();\r\n                } else if !is_absolute {\r\n                    components.push(\"..\");\r\n                }\r\n            }\r\n            Component::Normal(segment) =\u003e {\r\n                if let Some(s) = segment.to_str() {\r\n                    components.push(s);\r\n                }\r\n            }\r\n            Component::RootDir | Component::Prefix(_) =\u003e {}\r\n        }\r\n    }\r\n    let joined = components.join(\"/\");\r\n    if is_absolute {\r\n        format!(\"/{joined}\")\r\n    } else {\r\n        joined\r\n    }\r\n}\r\n\r\nimpl Settings for AgentSettings {\r\n    fn from_settings(content: \u0026settings::SettingsContent) -\u003e Self {\r\n        let agent = content.agent.clone().unwrap();\r\n        Self {\r\n            enabled: agent.enabled.unwrap(),\r\n            button: agent.button.unwrap(),\r\n            dock: agent.dock.unwrap(),\r\n            default_width: px(agent.default_width.unwrap()),\r\n            default_height: px(agent.default_height.unwrap()),\r\n            default_model: Some(agent.default_model.unwrap()),\r\n            inline_assistant_model: agent.inline_assistant_model,\r\n            inline_assistant_use_streaming_tools: agent\r\n                .inline_assistant_use_streaming_tools\r\n                .unwrap_or(true),\r\n            commit_message_model: agent.commit_message_model,\r\n            thread_summary_model: agent.thread_summary_model,\r\n            inline_alternatives: agent.inline_alternatives.unwrap_or_default(),\r\n            favorite_models: agent.favorite_models,\r\n            default_profile: AgentProfileId(agent.default_profile.unwrap()),\r\n            default_view: agent.default_view.unwrap(),\r\n            profiles: agent\r\n                .profiles\r\n                .unwrap()\r\n                .into_iter()\r\n                .map(|(key, val)| (AgentProfileId(key), val.into()))\r\n                .collect(),\r\n\r\n            notify_when_agent_waiting: agent.notify_when_agent_waiting.unwrap(),\r\n            play_sound_when_agent_done: agent.play_sound_when_agent_done.unwrap(),\r\n            single_file_review: agent.single_file_review.unwrap(),\r\n            model_parameters: agent.model_parameters,\r\n            enable_feedback: agent.enable_feedback.unwrap(),\r\n            expand_edit_card: agent.expand_edit_card.unwrap(),\r\n            expand_terminal_card: agent.expand_terminal_card.unwrap(),\r\n            cancel_generation_on_terminal_stop: agent.cancel_generation_on_terminal_stop.unwrap(),\r\n            use_modifier_to_send: agent.use_modifier_to_send.unwrap(),\r\n            message_editor_min_lines: agent.message_editor_min_lines.unwrap(),\r\n            show_turn_stats: agent.show_turn_stats.unwrap(),\r\n            tool_permissions: compile_tool_permissions(agent.tool_permissions),\r\n        }\r\n    }\r\n}\r\n\r\nfn compile_tool_permissions(content: Option\u003csettings::ToolPermissionsContent\u003e) -\u003e ToolPermissions {\r\n    let Some(content) = content else {\r\n        return ToolPermissions::default();\r\n    };\r\n\r\n    let tools = content\r\n        .tools\r\n        .into_iter()\r\n        .map(|(tool_name, rules_content)| {\r\n            let mut invalid_patterns = Vec::new();\r\n\r\n            let (always_allow, allow_errors) = compile_regex_rules(\r\n                rules_content.always_allow.map(|v| v.0).unwrap_or_default(),\r\n                \"always_allow\",\r\n            );\r\n            invalid_patterns.extend(allow_errors);\r\n\r\n            let (always_deny, deny_errors) = compile_regex_rules(\r\n                rules_content.always_deny.map(|v| v.0).unwrap_or_default(),\r\n                \"always_deny\",\r\n            );\r\n            invalid_patterns.extend(deny_errors);\r\n\r\n            let (always_confirm, confirm_errors) = compile_regex_rules(\r\n                rules_content\r\n                    .always_confirm\r\n                    .map(|v| v.0)\r\n                    .unwrap_or_default(),\r\n                \"always_confirm\",\r\n            );\r\n            invalid_patterns.extend(confirm_errors);\r\n\r\n            // Log invalid patterns for debugging. Users will see an error when they\r\n            // attempt to use a tool with invalid patterns in their settings.\r\n            for invalid in \u0026invalid_patterns {\r\n                log::error!(\r\n                    \"Invalid regex pattern in tool_permissions for '{}' tool ({}): '{}' - {}\",\r\n                    tool_name,\r\n                    invalid.rule_type,\r\n                    invalid.pattern,\r\n                    invalid.error,\r\n                );\r\n            }\r\n\r\n            let rules = ToolRules {\r\n                // Preserve tool-specific default; None means fall back to global default at decision time\r\n                default: rules_content.default,\r\n                always_allow,\r\n                always_deny,\r\n                always_confirm,\r\n                invalid_patterns,\r\n            };\r\n            (tool_name, rules)\r\n        })\r\n        .collect();\r\n\r\n    ToolPermissions {\r\n        default: content.default.unwrap_or_default(),\r\n        tools,\r\n    }\r\n}\r\n\r\nfn compile_regex_rules(\r\n    rules: Vec\u003csettings::ToolRegexRule\u003e,\r\n    rule_type: \u0026str,\r\n) -\u003e (Vec\u003cCompiledRegex\u003e, Vec\u003cInvalidRegexPattern\u003e) {\r\n    let mut compiled = Vec::new();\r\n    let mut errors = Vec::new();\r\n\r\n    for rule in rules {\r\n        if rule.pattern.is_empty() {\r\n            errors.push(InvalidRegexPattern {\r\n                pattern: rule.pattern,\r\n                rule_type: rule_type.to_string(),\r\n                error: \"empty regex patterns are not allowed\".to_string(),\r\n            });\r\n            continue;\r\n        }\r\n        let case_sensitive = rule.case_sensitive.unwrap_or(false);\r\n        match CompiledRegex::try_new(\u0026rule.pattern, case_sensitive) {\r\n            Ok(regex) =\u003e compiled.push(regex),\r\n            Err(error) =\u003e {\r\n                errors.push(InvalidRegexPattern {\r\n                    pattern: rule.pattern,\r\n                    rule_type: rule_type.to_string(),\r\n                    error: error.to_string(),\r\n                });\r\n            }\r\n        }\r\n    }\r\n\r\n    (compiled, errors)\r\n}\r\n\r\n#[cfg(test)]\r\nmod tests {\r\n    use super::*;\r\n    use serde_json::json;\r\n    use settings::ToolPermissionMode;\r\n    use settings::ToolPermissionsContent;\r\n\r\n    #[test]\r\n    fn test_compiled_regex_case_insensitive() {\r\n        let regex = CompiledRegex::new(\"rm\\\\s+-rf\", false).unwrap();\r\n        assert!(regex.is_match(\"rm -rf /\"));\r\n        assert!(regex.is_match(\"RM -RF /\"));\r\n        assert!(regex.is_match(\"Rm -Rf /\"));\r\n    }\r\n\r\n    #[test]\r\n    fn test_compiled_regex_case_sensitive() {\r\n        let regex = CompiledRegex::new(\"DROP\\\\s+TABLE\", true).unwrap();\r\n        assert!(regex.is_match(\"DROP TABLE users\"));\r\n        assert!(!regex.is_match(\"drop table users\"));\r\n    }\r\n\r\n    #[test]\r\n    fn test_invalid_regex_returns_none() {\r\n        let result = CompiledRegex::new(\"[invalid(regex\", false);\r\n        assert!(result.is_none());\r\n    }\r\n\r\n    #[test]\r\n    fn test_tool_permissions_parsing() {\r\n        let json = json!({\r\n            \"tools\": {\r\n                \"terminal\": {\r\n                    \"default\": \"allow\",\r\n                    \"always_deny\": [\r\n                        { \"pattern\": \"rm\\\\s+-rf\" }\r\n                    ],\r\n                    \"always_allow\": [\r\n                        { \"pattern\": \"^git\\\\s\" }\r\n                    ]\r\n                }\r\n            }\r\n        });\r\n\r\n        let content: ToolPermissionsContent = serde_json::from_value(json).unwrap();\r\n        let permissions = compile_tool_permissions(Some(content));\r\n\r\n        let terminal_rules = permissions.tools.get(\"terminal\").unwrap();\r\n        assert_eq!(terminal_rules.default, Some(ToolPermissionMode::Allow));\r\n        assert_eq!(terminal_rules.always_deny.len(), 1);\r\n        assert_eq!(terminal_rules.always_allow.len(), 1);\r\n        assert!(terminal_rules.always_deny[0].is_match(\"rm -rf /\"));\r\n        assert!(terminal_rules.always_allow[0].is_match(\"git status\"));\r\n    }\r\n\r\n    #[test]\r\n    fn test_tool_rules_default() {\r\n        let json = json!({\r\n            \"tools\": {\r\n                \"edit_file\": {\r\n                    \"default\": \"deny\"\r\n                }\r\n            }\r\n        });\r\n\r\n        let content: ToolPermissionsContent = serde_json::from_value(json).unwrap();\r\n        let permissions = compile_tool_permissions(Some(content));\r\n\r\n        let rules = permissions.tools.get(\"edit_file\").unwrap();\r\n        assert_eq!(rules.default, Some(ToolPermissionMode::Deny));\r\n    }\r\n\r\n    #[test]\r\n    fn test_tool_permissions_empty() {\r\n        let permissions = compile_tool_permissions(None);\r\n        assert!(permissions.tools.is_empty());\r\n        assert_eq!(permissions.default, ToolPermissionMode::Confirm);\r\n    }\r\n\r\n    #[test]\r\n    fn test_tool_rules_default_returns_confirm() {\r\n        let default_rules = ToolRules::default();\r\n        assert_eq!(default_rules.default, None);\r\n        assert!(default_rules.always_allow.is_empty());\r\n        assert!(default_rules.always_deny.is_empty());\r\n        assert!(default_rules.always_confirm.is_empty());\r\n    }\r\n\r\n    #[test]\r\n    fn test_tool_permissions_with_multiple_tools() {\r\n        let json = json!({\r\n            \"tools\": {\r\n                \"terminal\": {\r\n                    \"default\": \"allow\",\r\n                    \"always_deny\": [{ \"pattern\": \"rm\\\\s+-rf\" }]\r\n                },\r\n                \"edit_file\": {\r\n                    \"default\": \"confirm\",\r\n                    \"always_deny\": [{ \"pattern\": \"\\\\.env$\" }]\r\n                },\r\n                \"delete_path\": {\r\n                    \"default\": \"deny\"\r\n                }\r\n            }\r\n        });\r\n\r\n        let content: ToolPermissionsContent = serde_json::from_value(json).unwrap();\r\n        let permissions = compile_tool_permissions(Some(content));\r\n\r\n        assert_eq!(permissions.tools.len(), 3);\r\n\r\n        let terminal = permissions.tools.get(\"terminal\").unwrap();\r\n        assert_eq!(terminal.default, Some(ToolPermissionMode::Allow));\r\n        assert_eq!(terminal.always_deny.len(), 1);\r\n\r\n        let edit_file = permissions.tools.get(\"edit_file\").unwrap();\r\n        assert_eq!(edit_file.default, Some(ToolPermissionMode::Confirm));\r\n        assert!(edit_file.always_deny[0].is_match(\"secrets.env\"));\r\n\r\n        let delete_path = permissions.tools.get(\"delete_path\").unwrap();\r\n        assert_eq!(delete_path.default, Some(ToolPermissionMode::Deny));\r\n    }\r\n\r\n    #[test]\r\n    fn test_tool_permissions_with_all_rule_types() {\r\n        let json = json!({\r\n            \"tools\": {\r\n                \"terminal\": {\r\n                    \"always_deny\": [{ \"pattern\": \"rm\\\\s+-rf\" }],\r\n                    \"always_confirm\": [{ \"pattern\": \"sudo\\\\s\" }],\r\n                    \"always_allow\": [{ \"pattern\": \"^git\\\\s+status\" }]\r\n                }\r\n            }\r\n        });\r\n\r\n        let content: ToolPermissionsContent = serde_json::from_value(json).unwrap();\r\n        let permissions = compile_tool_permissions(Some(content));\r\n\r\n        let terminal = permissions.tools.get(\"terminal\").unwrap();\r\n        assert_eq!(terminal.always_deny.len(), 1);\r\n        assert_eq!(terminal.always_confirm.len(), 1);\r\n        assert_eq!(terminal.always_allow.len(), 1);\r\n\r\n        assert!(terminal.always_deny[0].is_match(\"rm -rf /\"));\r\n        assert!(terminal.always_confirm[0].is_match(\"sudo apt install\"));\r\n        assert!(terminal.always_allow[0].is_match(\"git status\"));\r\n    }\r\n\r\n    #[test]\r\n    fn test_invalid_regex_is_tracked_and_valid_ones_still_compile() {\r\n        let json = json!({\r\n            \"tools\": {\r\n                \"terminal\": {\r\n                    \"always_deny\": [\r\n                        { \"pattern\": \"[invalid(regex\" },\r\n                        { \"pattern\": \"valid_pattern\" }\r\n                    ],\r\n                    \"always_allow\": [\r\n                        { \"pattern\": \"[another_bad\" }\r\n                    ]\r\n                }\r\n            }\r\n        });\r\n\r\n        let content: ToolPermissionsContent = serde_json::from_value(json).unwrap();\r\n        let permissions = compile_tool_permissions(Some(content));\r\n\r\n        let terminal = permissions.tools.get(\"terminal\").unwrap();\r\n\r\n        // Valid patterns should still be compiled\r\n        assert_eq!(terminal.always_deny.len(), 1);\r\n        assert!(terminal.always_deny[0].is_match(\"valid_pattern\"));\r\n\r\n        // Invalid patterns should be tracked (order depends on processing order)\r\n        assert_eq!(terminal.invalid_patterns.len(), 2);\r\n\r\n        let deny_invalid = terminal\r\n            .invalid_patterns\r\n            .iter()\r\n            .find(|p| p.rule_type == \"always_deny\")\r\n            .expect(\"should have invalid pattern from always_deny\");\r\n        assert_eq!(deny_invalid.pattern, \"[invalid(regex\");\r\n        assert!(!deny_invalid.error.is_empty());\r\n\r\n        let allow_invalid = terminal\r\n            .invalid_patterns\r\n            .iter()\r\n            .find(|p| p.rule_type == \"always_allow\")\r\n            .expect(\"should have invalid pattern from always_allow\");\r\n        assert_eq!(allow_invalid.pattern, \"[another_bad\");\r\n\r\n        // ToolPermissions helper methods should work\r\n        assert!(permissions.has_invalid_patterns());\r\n        assert_eq!(permissions.invalid_patterns().len(), 2);\r\n    }\r\n\r\n    #[test]\r\n    fn test_deny_takes_precedence_over_allow_and_confirm() {\r\n        let json = json!({\r\n            \"tools\": {\r\n                \"terminal\": {\r\n                    \"default\": \"allow\",\r\n                    \"always_deny\": [{ \"pattern\": \"dangerous\" }],\r\n                    \"always_confirm\": [{ \"pattern\": \"dangerous\" }],\r\n                    \"always_allow\": [{ \"pattern\": \"dangerous\" }]\r\n                }\r\n            }\r\n        });\r\n\r\n        let content: ToolPermissionsContent = serde_json::from_value(json).unwrap();\r\n        let permissions = compile_tool_permissions(Some(content));\r\n        let terminal = permissions.tools.get(\"terminal\").unwrap();\r\n\r\n        assert!(\r\n            terminal.always_deny[0].is_match(\"run dangerous command\"),\r\n            \"Deny rule should match\"\r\n        );\r\n        assert!(\r\n            terminal.always_allow[0].is_match(\"run dangerous command\"),\r\n            \"Allow rule should also match (but deny takes precedence at evaluation time)\"\r\n        );\r\n        assert!(\r\n            terminal.always_confirm[0].is_match(\"run dangerous command\"),\r\n            \"Confirm rule should also match (but deny takes precedence at evaluation time)\"\r\n        );\r\n    }\r\n\r\n    #[test]\r\n    fn test_confirm_takes_precedence_over_allow() {\r\n        let json = json!({\r\n            \"tools\": {\r\n                \"terminal\": {\r\n                    \"default\": \"allow\",\r\n                    \"always_confirm\": [{ \"pattern\": \"risky\" }],\r\n                    \"always_allow\": [{ \"pattern\": \"risky\" }]\r\n                }\r\n            }\r\n        });\r\n\r\n        let content: ToolPermissionsContent = serde_json::from_value(json).unwrap();\r\n        let permissions = compile_tool_permissions(Some(content));\r\n        let terminal = permissions.tools.get(\"terminal\").unwrap();\r\n\r\n        assert!(\r\n            terminal.always_confirm[0].is_match(\"do risky thing\"),\r\n            \"Confirm rule should match\"\r\n        );\r\n        assert!(\r\n            terminal.always_allow[0].is_match(\"do risky thing\"),\r\n            \"Allow rule should also match (but confirm takes precedence at evaluation time)\"\r\n        );\r\n    }\r\n\r\n    #[test]\r\n    fn test_regex_matches_anywhere_in_string_not_just_anchored() {\r\n        let json = json!({\r\n            \"tools\": {\r\n                \"terminal\": {\r\n                    \"always_deny\": [\r\n                        { \"pattern\": \"rm\\\\s+-rf\" },\r\n                        { \"pattern\": \"/etc/passwd\" }\r\n                    ]\r\n                }\r\n            }\r\n        });\r\n\r\n        let content: ToolPermissionsContent = serde_json::from_value(json).unwrap();\r\n        let permissions = compile_tool_permissions(Some(content));\r\n        let terminal = permissions.tools.get(\"terminal\").unwrap();\r\n\r\n        assert!(\r\n            terminal.always_deny[0].is_match(\"echo hello \u0026\u0026 rm -rf /\"),\r\n            \"Should match rm -rf in the middle of a command chain\"\r\n        );\r\n        assert!(\r\n            terminal.always_deny[0].is_match(\"cd /tmp; rm -rf *\"),\r\n            \"Should match rm -rf after semicolon\"\r\n        );\r\n        assert!(\r\n            terminal.always_deny[1].is_match(\"cat /etc/passwd | grep root\"),\r\n            \"Should match /etc/passwd in a pipeline\"\r\n        );\r\n        assert!(\r\n            terminal.always_deny[1].is_match(\"vim /etc/passwd\"),\r\n            \"Should match /etc/passwd as argument\"\r\n        );\r\n    }\r\n\r\n    #[test]\r\n    fn test_fork_bomb_pattern_matches() {\r\n        let fork_bomb_regex = CompiledRegex::new(r\":\\(\\)\\{\\s*:\\|:\u0026\\s*\\};:\", false).unwrap();\r\n        assert!(\r\n            fork_bomb_regex.is_match(\":(){ :|:\u0026 };:\"),\r\n            \"Should match the classic fork bomb\"\r\n        );\r\n        assert!(\r\n            fork_bomb_regex.is_match(\":(){ :|:\u0026};:\"),\r\n            \"Should match fork bomb without spaces\"\r\n        );\r\n    }\r\n\r\n    #[test]\r\n    fn test_compiled_regex_stores_case_sensitivity() {\r\n        let case_sensitive = CompiledRegex::new(\"test\", true).unwrap();\r\n        let case_insensitive = CompiledRegex::new(\"test\", false).unwrap();\r\n\r\n        assert!(case_sensitive.case_sensitive);\r\n        assert!(!case_insensitive.case_sensitive);\r\n    }\r\n\r\n    #[test]\r\n    fn test_invalid_regex_is_skipped_not_fail() {\r\n        let json = json!({\r\n            \"tools\": {\r\n                \"terminal\": {\r\n                    \"always_deny\": [\r\n                        { \"pattern\": \"[invalid(regex\" },\r\n                        { \"pattern\": \"valid_pattern\" }\r\n                    ]\r\n                }\r\n            }\r\n        });\r\n\r\n        let content: ToolPermissionsContent = serde_json::from_value(json).unwrap();\r\n        let permissions = compile_tool_permissions(Some(content));\r\n\r\n        let terminal = permissions.tools.get(\"terminal\").unwrap();\r\n        assert_eq!(terminal.always_deny.len(), 1);\r\n        assert!(terminal.always_deny[0].is_match(\"valid_pattern\"));\r\n    }\r\n\r\n    #[test]\r\n    fn test_unconfigured_tool_not_in_permissions() {\r\n        let json = json!({\r\n            \"tools\": {\r\n                \"terminal\": {\r\n                    \"default\": \"allow\"\r\n                }\r\n            }\r\n        });\r\n\r\n        let content: ToolPermissionsContent = serde_json::from_value(json).unwrap();\r\n        let permissions = compile_tool_permissions(Some(content));\r\n\r\n        assert!(permissions.tools.contains_key(\"terminal\"));\r\n        assert!(!permissions.tools.contains_key(\"edit_file\"));\r\n        assert!(!permissions.tools.contains_key(\"fetch\"));\r\n    }\r\n\r\n    #[test]\r\n    fn test_always_allow_pattern_only_matches_specified_commands() {\r\n        // Reproduces user-reported bug: when always_allow has pattern \"^echo\\s\",\r\n        // only \"echo hello\" should be allowed, not \"git status\".\r\n        //\r\n        // User config:\r\n        //   always_allow_tool_actions: false\r\n        //   tool_permissions.tools.terminal.always_allow: [{ pattern: \"^echo\\\\s\" }]\r\n        let json = json!({\r\n            \"tools\": {\r\n                \"terminal\": {\r\n                    \"always_allow\": [\r\n                        { \"pattern\": \"^echo\\\\s\" }\r\n                    ]\r\n                }\r\n            }\r\n        });\r\n\r\n        let content: ToolPermissionsContent = serde_json::from_value(json).unwrap();\r\n        let permissions = compile_tool_permissions(Some(content));\r\n\r\n        let terminal = permissions.tools.get(\"terminal\").unwrap();\r\n\r\n        // Verify the pattern was compiled\r\n        assert_eq!(\r\n            terminal.always_allow.len(),\r\n            1,\r\n            \"Should have one always_allow pattern\"\r\n        );\r\n\r\n        // Verify the pattern matches \"echo hello\"\r\n        assert!(\r\n            terminal.always_allow[0].is_match(\"echo hello\"),\r\n            \"Pattern ^echo\\\\s should match 'echo hello'\"\r\n        );\r\n\r\n        // Verify the pattern does NOT match \"git status\"\r\n        assert!(\r\n            !terminal.always_allow[0].is_match(\"git status\"),\r\n            \"Pattern ^echo\\\\s should NOT match 'git status'\"\r\n        );\r\n\r\n        // Verify the pattern does NOT match \"echoHello\" (no space)\r\n        assert!(\r\n            !terminal.always_allow[0].is_match(\"echoHello\"),\r\n            \"Pattern ^echo\\\\s should NOT match 'echoHello' (requires whitespace)\"\r\n        );\r\n\r\n        assert_eq!(\r\n            terminal.default, None,\r\n            \"default should be None when not specified\"\r\n        );\r\n    }\r\n\r\n    #[test]\r\n    fn test_empty_regex_pattern_is_invalid() {\r\n        let json = json!({\r\n            \"tools\": {\r\n                \"terminal\": {\r\n                    \"always_allow\": [\r\n                        { \"pattern\": \"\" }\r\n                    ],\r\n                    \"always_deny\": [\r\n                        { \"case_sensitive\": true }\r\n                    ],\r\n                    \"always_confirm\": [\r\n                        { \"pattern\": \"\" },\r\n                        { \"pattern\": \"valid_pattern\" }\r\n                    ]\r\n                }\r\n            }\r\n        });\r\n\r\n        let content: ToolPermissionsContent = serde_json::from_value(json).unwrap();\r\n        let permissions = compile_tool_permissions(Some(content));\r\n\r\n        let terminal = permissions.tools.get(\"terminal\").unwrap();\r\n\r\n        assert_eq!(terminal.always_allow.len(), 0);\r\n        assert_eq!(terminal.always_deny.len(), 0);\r\n        assert_eq!(terminal.always_confirm.len(), 1);\r\n        assert!(terminal.always_confirm[0].is_match(\"valid_pattern\"));\r\n\r\n        assert_eq!(terminal.invalid_patterns.len(), 3);\r\n        for invalid in \u0026terminal.invalid_patterns {\r\n            assert_eq!(invalid.pattern, \"\");\r\n            assert!(invalid.error.contains(\"empty\"));\r\n        }\r\n    }\r\n\r\n    #[test]\r\n    fn test_default_json_tool_permissions_parse() {\r\n        let default_json = include_str!(\"../../../assets/settings/default.json\");\r\n        let value: serde_json_lenient::Value = serde_json_lenient::from_str(default_json).unwrap();\r\n        let agent = value\r\n            .get(\"agent\")\r\n            .expect(\"default.json should have 'agent' key\");\r\n        let tool_permissions_value = agent\r\n            .get(\"tool_permissions\")\r\n            .expect(\"agent should have 'tool_permissions' key\");\r\n\r\n        let content: ToolPermissionsContent =\r\n            serde_json_lenient::from_value(tool_permissions_value.clone()).unwrap();\r\n        let permissions = compile_tool_permissions(Some(content));\r\n\r\n        assert_eq!(permissions.default, ToolPermissionMode::Confirm);\r\n\r\n        assert!(\r\n            permissions.tools.is_empty(),\r\n            \"default.json should not have any active tool-specific rules, found: {:?}\",\r\n            permissions.tools.keys().collect::\u003cVec\u003c_\u003e\u003e()\r\n        );\r\n    }\r\n\r\n    #[test]\r\n    fn test_tool_permissions_explicit_global_default() {\r\n        let json_allow = json!({\r\n            \"default\": \"allow\"\r\n        });\r\n        let content: ToolPermissionsContent = serde_json::from_value(json_allow).unwrap();\r\n        let permissions = compile_tool_permissions(Some(content));\r\n        assert_eq!(permissions.default, ToolPermissionMode::Allow);\r\n\r\n        let json_deny = json!({\r\n            \"default\": \"deny\"\r\n        });\r\n        let content: ToolPermissionsContent = serde_json::from_value(json_deny).unwrap();\r\n        let permissions = compile_tool_permissions(Some(content));\r\n        assert_eq!(permissions.default, ToolPermissionMode::Deny);\r\n    }\r\n}\r\n","traces":[],"covered":0,"coverable":0},{"path":["D:","\\","mineclaw","参考","terminal_command_execution_tool","task.rs"],"content":"//! Baseline interface of Tasks in Zed: all tasks in Zed are intended to use those for implementing their own logic.\r\n\r\nmod adapter_schema;\r\nmod debug_format;\r\nmod serde_helpers;\r\npub mod static_source;\r\nmod task_template;\r\nmod vscode_debug_format;\r\nmod vscode_format;\r\n\r\nuse anyhow::Context as _;\r\nuse collections::{HashMap, HashSet, hash_map};\r\nuse gpui::SharedString;\r\nuse serde::{Deserialize, Serialize};\r\nuse std::borrow::Cow;\r\nuse std::path::PathBuf;\r\nuse std::str::FromStr;\r\nuse std::sync::Arc;\r\n\r\npub use adapter_schema::{AdapterSchema, AdapterSchemas};\r\npub use debug_format::{\r\n    AttachRequest, BuildTaskDefinition, DebugRequest, DebugScenario, DebugTaskFile, LaunchRequest,\r\n    Request, TcpArgumentsTemplate, ZedDebugConfig,\r\n};\r\npub use task_template::{\r\n    DebugArgsRequest, HideStrategy, RevealStrategy, TaskTemplate, TaskTemplates,\r\n    substitute_variables_in_map, substitute_variables_in_str,\r\n};\r\npub use util::shell::{Shell, ShellKind};\r\npub use util::shell_builder::ShellBuilder;\r\npub use vscode_debug_format::VsCodeDebugTaskFile;\r\npub use vscode_format::VsCodeTaskFile;\r\npub use zed_actions::RevealTarget;\r\n\r\n/// Task identifier, unique within the application.\r\n/// Based on it, task reruns and terminal tabs are managed.\r\n#[derive(Default, Debug, Clone, PartialEq, Eq, Hash, PartialOrd, Ord, Deserialize)]\r\npub struct TaskId(pub String);\r\n\r\n/// Contains all information needed by Zed to spawn a new terminal tab for the given task.\r\n#[derive(Default, Debug, Clone, PartialEq, Eq)]\r\npub struct SpawnInTerminal {\r\n    /// Id of the task to use when determining task tab affinity.\r\n    pub id: TaskId,\r\n    /// Full unshortened form of `label` field.\r\n    pub full_label: String,\r\n    /// Human readable name of the terminal tab.\r\n    pub label: String,\r\n    /// Executable command to spawn.\r\n    pub command: Option\u003cString\u003e,\r\n    /// Arguments to the command, potentially unsubstituted,\r\n    /// to let the shell that spawns the command to do the substitution, if needed.\r\n    pub args: Vec\u003cString\u003e,\r\n    /// A human-readable label, containing command and all of its arguments, joined and substituted.\r\n    pub command_label: String,\r\n    /// Current working directory to spawn the command into.\r\n    pub cwd: Option\u003cPathBuf\u003e,\r\n    /// Env overrides for the command, will be appended to the terminal's environment from the settings.\r\n    pub env: HashMap\u003cString, String\u003e,\r\n    /// Whether to use a new terminal tab or reuse the existing one to spawn the process.\r\n    pub use_new_terminal: bool,\r\n    /// Whether to allow multiple instances of the same task to be run, or rather wait for the existing ones to finish.\r\n    pub allow_concurrent_runs: bool,\r\n    /// What to do with the terminal pane and tab, after the command was started.\r\n    pub reveal: RevealStrategy,\r\n    /// Where to show tasks' terminal output.\r\n    pub reveal_target: RevealTarget,\r\n    /// What to do with the terminal pane and tab, after the command had finished.\r\n    pub hide: HideStrategy,\r\n    /// Which shell to use when spawning the task.\r\n    pub shell: Shell,\r\n    /// Whether to show the task summary line in the task output (sucess/failure).\r\n    pub show_summary: bool,\r\n    /// Whether to show the command line in the task output.\r\n    pub show_command: bool,\r\n    /// Whether to show the rerun button in the terminal tab.\r\n    pub show_rerun: bool,\r\n}\r\n\r\nimpl SpawnInTerminal {\r\n    pub fn to_proto(\u0026self) -\u003e proto::SpawnInTerminal {\r\n        proto::SpawnInTerminal {\r\n            label: self.label.clone(),\r\n            command: self.command.clone(),\r\n            args: self.args.clone(),\r\n            env: self\r\n                .env\r\n                .iter()\r\n                .map(|(k, v)| (k.clone(), v.clone()))\r\n                .collect(),\r\n            cwd: self\r\n                .cwd\r\n                .clone()\r\n                .map(|cwd| cwd.to_string_lossy().into_owned()),\r\n        }\r\n    }\r\n\r\n    pub fn from_proto(proto: proto::SpawnInTerminal) -\u003e Self {\r\n        Self {\r\n            label: proto.label.clone(),\r\n            command: proto.command.clone(),\r\n            args: proto.args.clone(),\r\n            env: proto.env.into_iter().collect(),\r\n            cwd: proto.cwd.map(PathBuf::from),\r\n            ..Default::default()\r\n        }\r\n    }\r\n}\r\n\r\n/// A final form of the [`TaskTemplate`], that got resolved with a particular [`TaskContext`] and now is ready to spawn the actual task.\r\n#[derive(Clone, Debug, PartialEq, Eq)]\r\npub struct ResolvedTask {\r\n    /// A way to distinguish tasks produced by the same template, but different contexts.\r\n    /// NOTE: Resolved tasks may have the same labels, commands and do the same things,\r\n    /// but still may have different ids if the context was different during the resolution.\r\n    /// Since the template has `env` field, for a generic task that may be a bash command,\r\n    /// so it's impossible to determine the id equality without more context in a generic case.\r\n    pub id: TaskId,\r\n    /// A template the task got resolved from.\r\n    original_task: TaskTemplate,\r\n    /// Full, unshortened label of the task after all resolutions are made.\r\n    pub resolved_label: String,\r\n    /// Variables that were substituted during the task template resolution.\r\n    substituted_variables: HashSet\u003cVariableName\u003e,\r\n    /// Further actions that need to take place after the resolved task is spawned,\r\n    /// with all task variables resolved.\r\n    pub resolved: SpawnInTerminal,\r\n}\r\n\r\nimpl ResolvedTask {\r\n    /// A task template before the resolution.\r\n    pub fn original_task(\u0026self) -\u003e \u0026TaskTemplate {\r\n        \u0026self.original_task\r\n    }\r\n\r\n    /// Variables that were substituted during the task template resolution.\r\n    pub fn substituted_variables(\u0026self) -\u003e \u0026HashSet\u003cVariableName\u003e {\r\n        \u0026self.substituted_variables\r\n    }\r\n\r\n    /// A human-readable label to display in the UI.\r\n    pub fn display_label(\u0026self) -\u003e \u0026str {\r\n        self.resolved.label.as_str()\r\n    }\r\n}\r\n\r\n/// Variables, available for use in [`TaskContext`] when a Zed's [`TaskTemplate`] gets resolved into a [`ResolvedTask`].\r\n/// Name of the variable must be a valid shell variable identifier, which generally means that it is\r\n/// a word  consisting only  of alphanumeric characters and underscores,\r\n/// and beginning with an alphabetic character or an  underscore.\r\n#[derive(Debug, Clone, PartialEq, Eq, Hash, Serialize)]\r\npub enum VariableName {\r\n    /// An absolute path of the currently opened file.\r\n    File,\r\n    /// A path of the currently opened file (relative to worktree root).\r\n    RelativeFile,\r\n    /// A path of the currently opened file's directory (relative to worktree root).\r\n    RelativeDir,\r\n    /// The currently opened filename.\r\n    Filename,\r\n    /// The path to a parent directory of a currently opened file.\r\n    Dirname,\r\n    /// Stem (filename without extension) of the currently opened file.\r\n    Stem,\r\n    /// An absolute path of the currently opened worktree, that contains the file.\r\n    WorktreeRoot,\r\n    /// A symbol text, that contains latest cursor/selection position.\r\n    Symbol,\r\n    /// A row with the latest cursor/selection position.\r\n    Row,\r\n    /// A column with the latest cursor/selection position.\r\n    Column,\r\n    /// Text from the latest selection.\r\n    SelectedText,\r\n    /// The symbol selected by the symbol tagging system, specifically the @run capture in a runnables.scm\r\n    RunnableSymbol,\r\n    /// Open a Picker to select a process ID to use in place\r\n    /// Can only be used to debug configurations\r\n    PickProcessId,\r\n    /// Custom variable, provided by the plugin or other external source.\r\n    /// Will be printed with `CUSTOM_` prefix to avoid potential conflicts with other variables.\r\n    Custom(Cow\u003c'static, str\u003e),\r\n}\r\n\r\nimpl VariableName {\r\n    /// Generates a `$VARIABLE`-like string value to be used in templates.\r\n    pub fn template_value(\u0026self) -\u003e String {\r\n        format!(\"${self}\")\r\n    }\r\n    /// Generates a `\"$VARIABLE\"`-like string, to be used instead of `Self::template_value` when expanded value could contain spaces or special characters.\r\n    pub fn template_value_with_whitespace(\u0026self) -\u003e String {\r\n        format!(\"\\\"${self}\\\"\")\r\n    }\r\n}\r\n\r\nimpl FromStr for VariableName {\r\n    type Err = ();\r\n\r\n    fn from_str(s: \u0026str) -\u003e Result\u003cSelf, Self::Err\u003e {\r\n        let without_prefix = s.strip_prefix(ZED_VARIABLE_NAME_PREFIX).ok_or(())?;\r\n        let value = match without_prefix {\r\n            \"FILE\" =\u003e Self::File,\r\n            \"FILENAME\" =\u003e Self::Filename,\r\n            \"RELATIVE_FILE\" =\u003e Self::RelativeFile,\r\n            \"RELATIVE_DIR\" =\u003e Self::RelativeDir,\r\n            \"DIRNAME\" =\u003e Self::Dirname,\r\n            \"STEM\" =\u003e Self::Stem,\r\n            \"WORKTREE_ROOT\" =\u003e Self::WorktreeRoot,\r\n            \"SYMBOL\" =\u003e Self::Symbol,\r\n            \"RUNNABLE_SYMBOL\" =\u003e Self::RunnableSymbol,\r\n            \"SELECTED_TEXT\" =\u003e Self::SelectedText,\r\n            \"ROW\" =\u003e Self::Row,\r\n            \"COLUMN\" =\u003e Self::Column,\r\n            _ =\u003e {\r\n                if let Some(custom_name) =\r\n                    without_prefix.strip_prefix(ZED_CUSTOM_VARIABLE_NAME_PREFIX)\r\n                {\r\n                    Self::Custom(Cow::Owned(custom_name.to_owned()))\r\n                } else {\r\n                    return Err(());\r\n                }\r\n            }\r\n        };\r\n        Ok(value)\r\n    }\r\n}\r\n\r\n/// A prefix that all [`VariableName`] variants are prefixed with when used in environment variables and similar template contexts.\r\npub const ZED_VARIABLE_NAME_PREFIX: \u0026str = \"ZED_\";\r\nconst ZED_CUSTOM_VARIABLE_NAME_PREFIX: \u0026str = \"CUSTOM_\";\r\n\r\nimpl std::fmt::Display for VariableName {\r\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter) -\u003e std::fmt::Result {\r\n        match self {\r\n            Self::File =\u003e write!(f, \"{ZED_VARIABLE_NAME_PREFIX}FILE\"),\r\n            Self::Filename =\u003e write!(f, \"{ZED_VARIABLE_NAME_PREFIX}FILENAME\"),\r\n            Self::RelativeFile =\u003e write!(f, \"{ZED_VARIABLE_NAME_PREFIX}RELATIVE_FILE\"),\r\n            Self::RelativeDir =\u003e write!(f, \"{ZED_VARIABLE_NAME_PREFIX}RELATIVE_DIR\"),\r\n            Self::Dirname =\u003e write!(f, \"{ZED_VARIABLE_NAME_PREFIX}DIRNAME\"),\r\n            Self::Stem =\u003e write!(f, \"{ZED_VARIABLE_NAME_PREFIX}STEM\"),\r\n            Self::WorktreeRoot =\u003e write!(f, \"{ZED_VARIABLE_NAME_PREFIX}WORKTREE_ROOT\"),\r\n            Self::Symbol =\u003e write!(f, \"{ZED_VARIABLE_NAME_PREFIX}SYMBOL\"),\r\n            Self::Row =\u003e write!(f, \"{ZED_VARIABLE_NAME_PREFIX}ROW\"),\r\n            Self::Column =\u003e write!(f, \"{ZED_VARIABLE_NAME_PREFIX}COLUMN\"),\r\n            Self::SelectedText =\u003e write!(f, \"{ZED_VARIABLE_NAME_PREFIX}SELECTED_TEXT\"),\r\n            Self::RunnableSymbol =\u003e write!(f, \"{ZED_VARIABLE_NAME_PREFIX}RUNNABLE_SYMBOL\"),\r\n            Self::PickProcessId =\u003e write!(f, \"{ZED_VARIABLE_NAME_PREFIX}PICK_PID\"),\r\n            Self::Custom(s) =\u003e write!(\r\n                f,\r\n                \"{ZED_VARIABLE_NAME_PREFIX}{ZED_CUSTOM_VARIABLE_NAME_PREFIX}{s}\"\r\n            ),\r\n        }\r\n    }\r\n}\r\n\r\n/// Container for predefined environment variables that describe state of Zed at the time the task was spawned.\r\n#[derive(Clone, Debug, Default, PartialEq, Eq, Serialize)]\r\npub struct TaskVariables(HashMap\u003cVariableName, String\u003e);\r\n\r\nimpl TaskVariables {\r\n    /// Inserts another variable into the container, overwriting the existing one if it already exists — in this case, the old value is returned.\r\n    pub fn insert(\u0026mut self, variable: VariableName, value: String) -\u003e Option\u003cString\u003e {\r\n        self.0.insert(variable, value)\r\n    }\r\n\r\n    /// Extends the container with another one, overwriting the existing variables on collision.\r\n    pub fn extend(\u0026mut self, other: Self) {\r\n        self.0.extend(other.0);\r\n    }\r\n    /// Get the value associated with given variable name, if there is one.\r\n    pub fn get(\u0026self, key: \u0026VariableName) -\u003e Option\u003c\u0026str\u003e {\r\n        self.0.get(key).map(|s| s.as_str())\r\n    }\r\n    /// Clear out variables obtained from tree-sitter queries, which are prefixed with '_' character\r\n    pub fn sweep(\u0026mut self) {\r\n        self.0.retain(|name, _| {\r\n            if let VariableName::Custom(name) = name {\r\n                !name.starts_with('_')\r\n            } else {\r\n                true\r\n            }\r\n        })\r\n    }\r\n\r\n    pub fn iter(\u0026self) -\u003e impl Iterator\u003cItem = (\u0026VariableName, \u0026String)\u003e {\r\n        self.0.iter()\r\n    }\r\n}\r\n\r\nimpl FromIterator\u003c(VariableName, String)\u003e for TaskVariables {\r\n    fn from_iter\u003cT: IntoIterator\u003cItem = (VariableName, String)\u003e\u003e(iter: T) -\u003e Self {\r\n        Self(HashMap::from_iter(iter))\r\n    }\r\n}\r\n\r\nimpl IntoIterator for TaskVariables {\r\n    type Item = (VariableName, String);\r\n\r\n    type IntoIter = hash_map::IntoIter\u003cVariableName, String\u003e;\r\n\r\n    fn into_iter(self) -\u003e Self::IntoIter {\r\n        self.0.into_iter()\r\n    }\r\n}\r\n\r\n/// Keeps track of the file associated with a task and context of tasks execution (i.e. current file or current function).\r\n/// Keeps all Zed-related state inside, used to produce a resolved task out of its template.\r\n#[derive(Clone, Debug, Default, PartialEq, Eq)]\r\npub struct TaskContext {\r\n    /// A path to a directory in which the task should be executed.\r\n    pub cwd: Option\u003cPathBuf\u003e,\r\n    /// Additional environment variables associated with a given task.\r\n    pub task_variables: TaskVariables,\r\n    /// Environment variables obtained when loading the project into Zed.\r\n    /// This is the environment one would get when `cd`ing in a terminal\r\n    /// into the project's root directory.\r\n    pub project_env: HashMap\u003cString, String\u003e,\r\n}\r\n\r\n/// A shared reference to a [`TaskContext`], used to avoid cloning the context multiple times.\r\n#[derive(Clone, Debug, Default)]\r\npub struct SharedTaskContext(Arc\u003cTaskContext\u003e);\r\n\r\nimpl std::ops::Deref for SharedTaskContext {\r\n    type Target = TaskContext;\r\n\r\n    fn deref(\u0026self) -\u003e \u0026Self::Target {\r\n        \u0026self.0\r\n    }\r\n}\r\n\r\nimpl From\u003cTaskContext\u003e for SharedTaskContext {\r\n    fn from(context: TaskContext) -\u003e Self {\r\n        Self(Arc::new(context))\r\n    }\r\n}\r\n\r\n/// This is a new type representing a 'tag' on a 'runnable symbol', typically a test of main() function, found via treesitter.\r\n#[derive(Clone, Debug)]\r\npub struct RunnableTag(pub SharedString);\r\n\r\npub fn shell_from_proto(proto: proto::Shell) -\u003e anyhow::Result\u003cShell\u003e {\r\n    let shell_type = proto.shell_type.context(\"invalid shell type\")?;\r\n    let shell = match shell_type {\r\n        proto::shell::ShellType::System(_) =\u003e Shell::System,\r\n        proto::shell::ShellType::Program(program) =\u003e Shell::Program(program),\r\n        proto::shell::ShellType::WithArguments(program) =\u003e Shell::WithArguments {\r\n            program: program.program,\r\n            args: program.args,\r\n            title_override: None,\r\n        },\r\n    };\r\n    Ok(shell)\r\n}\r\n\r\npub fn shell_to_proto(shell: Shell) -\u003e proto::Shell {\r\n    let shell_type = match shell {\r\n        Shell::System =\u003e proto::shell::ShellType::System(proto::System {}),\r\n        Shell::Program(program) =\u003e proto::shell::ShellType::Program(program),\r\n        Shell::WithArguments {\r\n            program,\r\n            args,\r\n            title_override: _,\r\n        } =\u003e proto::shell::ShellType::WithArguments(proto::shell::WithArguments { program, args }),\r\n    };\r\n    proto::Shell {\r\n        shell_type: Some(shell_type),\r\n    }\r\n}\r\n\r\ntype VsCodeEnvVariable = String;\r\ntype VsCodeCommand = String;\r\ntype ZedEnvVariable = String;\r\n\r\nstruct EnvVariableReplacer {\r\n    variables: HashMap\u003cVsCodeEnvVariable, ZedEnvVariable\u003e,\r\n    commands: HashMap\u003cVsCodeCommand, ZedEnvVariable\u003e,\r\n}\r\n\r\nimpl EnvVariableReplacer {\r\n    fn new(variables: HashMap\u003cVsCodeEnvVariable, ZedEnvVariable\u003e) -\u003e Self {\r\n        Self {\r\n            variables,\r\n            commands: HashMap::default(),\r\n        }\r\n    }\r\n\r\n    fn with_commands(\r\n        mut self,\r\n        commands: impl IntoIterator\u003cItem = (VsCodeCommand, ZedEnvVariable)\u003e,\r\n    ) -\u003e Self {\r\n        self.commands = commands.into_iter().collect();\r\n        self\r\n    }\r\n\r\n    fn replace_value(\u0026self, input: serde_json::Value) -\u003e serde_json::Value {\r\n        match input {\r\n            serde_json::Value::String(s) =\u003e serde_json::Value::String(self.replace(\u0026s)),\r\n            serde_json::Value::Array(arr) =\u003e {\r\n                serde_json::Value::Array(arr.into_iter().map(|v| self.replace_value(v)).collect())\r\n            }\r\n            serde_json::Value::Object(obj) =\u003e serde_json::Value::Object(\r\n                obj.into_iter()\r\n                    .map(|(k, v)| (self.replace(\u0026k), self.replace_value(v)))\r\n                    .collect(),\r\n            ),\r\n            _ =\u003e input,\r\n        }\r\n    }\r\n    // Replaces occurrences of VsCode-specific environment variables with Zed equivalents.\r\n    fn replace(\u0026self, input: \u0026str) -\u003e String {\r\n        shellexpand::env_with_context_no_errors(\u0026input, |var: \u0026str| {\r\n            // Colons denote a default value in case the variable is not set. We want to preserve that default, as otherwise shellexpand will substitute it for us.\r\n            let colon_position = var.find(':').unwrap_or(var.len());\r\n            let (left, right) = var.split_at(colon_position);\r\n            if left == \"env\" \u0026\u0026 !right.is_empty() {\r\n                let variable_name = \u0026right[1..];\r\n                return Some(format!(\"${{{variable_name}}}\"));\r\n            } else if left == \"command\" \u0026\u0026 !right.is_empty() {\r\n                let command_name = \u0026right[1..];\r\n                if let Some(replacement_command) = self.commands.get(command_name) {\r\n                    return Some(format!(\"${{{replacement_command}}}\"));\r\n                }\r\n            }\r\n\r\n            let (variable_name, default) = (left, right);\r\n            let append_previous_default = |ret: \u0026mut String| {\r\n                if !default.is_empty() {\r\n                    ret.push_str(default);\r\n                }\r\n            };\r\n            if let Some(substitution) = self.variables.get(variable_name) {\r\n                // Got a VSCode-\u003eZed hit, perform a substitution\r\n                let mut name = format!(\"${{{substitution}\");\r\n                append_previous_default(\u0026mut name);\r\n                name.push('}');\r\n                return Some(name);\r\n            }\r\n            // This is an unknown variable.\r\n            // We should not error out, as they may come from user environment (e.g. $PATH). That means that the variable substitution might not be perfect.\r\n            // If there's a default, we need to return the string verbatim as otherwise shellexpand will apply that default for us.\r\n            if !default.is_empty() {\r\n                return Some(format!(\"${{{var}}}\"));\r\n            }\r\n            // Else we can just return None and that variable will be left as is.\r\n            None\r\n        })\r\n        .into_owned()\r\n    }\r\n}\r\n","traces":[{"line":291,"address":[],"length":0,"stats":{"Line":0}},{"line":292,"address":[],"length":0,"stats":{"Line":0}},{"line":392,"address":[],"length":0,"stats":{"Line":0}},{"line":393,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":4},{"path":["D:","\\","mineclaw","参考","terminal_command_execution_tool","terminal.rs"],"content":"pub mod mappings;\r\n\r\npub use alacritty_terminal;\r\n\r\nmod pty_info;\r\nmod terminal_hyperlinks;\r\npub mod terminal_settings;\r\n\r\nuse alacritty_terminal::{\r\n    Term,\r\n    event::{Event as AlacTermEvent, EventListener, Notify, WindowSize},\r\n    event_loop::{EventLoop, Msg, Notifier},\r\n    grid::{Dimensions, Grid, Row, Scroll as AlacScroll},\r\n    index::{Boundary, Column, Direction as AlacDirection, Line, Point as AlacPoint},\r\n    selection::{Selection, SelectionRange, SelectionType},\r\n    sync::FairMutex,\r\n    term::{\r\n        Config, RenderableCursor, TermMode,\r\n        cell::{Cell, Flags},\r\n        search::{Match, RegexIter, RegexSearch},\r\n    },\r\n    tty::{self},\r\n    vi_mo character palette for special characters.\r\n        ShowCharacterPalette,\r\n        /// Searches for text in the terminal.\r\n        SearchTest,\r\n        /// Scrolls up by one line.\r\n        ScrollLineUp,\r\n        /// Scrolls down by one line.\r\n        ScrollLineDown,\r\n        /// Scrolls up by one page.\r\n        ScrollPageUp,\r\n        /// Scrolls down by one page.\r\n        ScrollPageDown,\r\n        /// Scrolls up by half a page.\r\n        ScrollHalfPageUp,\r\n        /// Scrolls down by half a page.\r\n        ScrollHalfPageDown,\r\n        /// Scrolls to the top of the terminal buffer.\r\n        ScrollToTop,\r\n        /// Scrolls to the bottom of the terminal buffer.\r\n        ScrollToBottom,\r\n        /// Toggles vi mode in the terminal.\r\n        ToggleViMode,\r\n        /// Selects all text in the terminal.\r\n        SelectAll,\r\n    ]\r\n);\r\n\r\nconst DEBUG_TERMINAL_WIDTH: Pixels = px(500.);\r\nconst DEBUG_TERMINAL_HEIGHT: Pixels = px(30.);\r\nconst DEBUG_CELL_WIDTH: Pixels = px(5.);\r\nconst DEBUG_LINE_HEIGHT: Pixels = px(5.);\r\n\r\n/// Inserts Zed-specific environment variables for terminal sessions.\r\n/// Used by both local terminals and remote terminals (via SSH).\r\npub fn insert_zed_terminal_env(\r\n    env: \u0026mut HashMap\u003cString, String\u003e,\r\n    version: \u0026impl std::fmt::Display,\r\n) {\r\n    env.insert(\"ZED_TERM\".to_string(), \"true\".to_string());\r\n    env.insert(\"TERM_PROGRAM\".to_string(), \"zed\".to_string());\r\n    env.insert(\"TERM\".to_string(), \"xterm-256color\".to_string());\r\n    env.insert(\"COLORTERM\".to_string(), \"truecolor\".to_string());\r\n    env.insert(\"TERM_PROGRAM_VERSION\".to_string(), version.to_string());\r\n}\r\n\r\n///Upward flowing events, for changing the title and such\r\n#[derive(Clone, Debug, PartialEq, Eq)]\r\npub enum Event {\r\n    TitleChanged,\r\n    BreadcrumbsChanged,\r\n    CloseTerminal,\r\n    Bell,\r\n    Wakeup,\r\n    BlinkChanged(bool),\r\n    SelectionsChanged,\r\n    NewNavigationTarget(Option\u003cMaybeNavigationTarget\u003e),\r\n    Open(MaybeNavigationTarget),\r\n}\r\n\r\n#[derive(Clone, Debug, PartialEq, Eq)]\r\npub struct PathLikeTarget {\r\n    /// File system path, absolute or relative, existing or not.\r\n    /// Might have line and column number(s) attached as `file.rs:1:23`\r\n    pub maybe_path: String,\r\n    /// Current working directory of the terminal\r\n    pub terminal_dir: Option\u003cPathBuf\u003e,\r\n}\r\n\r\n/// A string inside terminal, potentially useful as a URI that can be opened.\r\n#[derive(Clone, Debug, PartialEq, Eq)]\r\npub enum MaybeNavigationTarget {\r\n    /// HTTP, git, etc. string determined by the `URL_REGEX` regex.\r\n    Url(String),\r\n    /// File system path, absolute or relative, existing or not.\r\n    /// Might have line and column number(s) attached as `file.rs:1:23`\r\n    PathLike(PathLikeTarget),\r\n}\r\n\r\n#[derive(Clone)]\r\nenum InternalEvent {\r\n    Resize(TerminalBounds),\r\n    Clear,\r\n    // FocusNextMatch,\r\n    Scroll(AlacScroll),\r\n    ScrollToAlacPoint(AlacPoint),\r\n    SetSelection(Option\u003c(Selection, AlacPoint)\u003e),\r\n    UpdateSelection(Point\u003cPixels\u003e),\r\n    FindHyperlink(Point\u003cPixels\u003e, bool),\r\n    ProcessHyperlink((String, bool, Match), bool),\r\n    // Whether keep selection when copy\r\n    Copy(Option\u003cbool\u003e),\r\n    // Vi mode events\r\n    ToggleViMode,\r\n    ViMotion(ViMotion),\r\n    MoveViCursorToAlacPoint(AlacPoint),\r\n}\r\n\r\n///A translation struct for Alacritty to communicate with us from their event loop\r\n#[derive(Clone)]\r\npub struct ZedListener(pub UnboundedSender\u003cAlacTermEvent\u003e);\r\n\r\nimpl EventListener for ZedListener {\r\n    fn send_event(\u0026self, event: AlacTermEvent) {\r\n        self.0.unbounded_send(event).ok();\r\n    }\r\n}\r\n\r\n#[derive(Clone, Copy, Debug, PartialEq, Eq, Serialize, Deserialize)]\r\npub struct TerminalBounds {\r\n    pub cell_width: Pixels,\r\n    pub line_height: Pixels,\r\n    pub bounds: Bounds\u003cPixels\u003e,\r\n}\r\n\r\nimpl TerminalBounds {\r\n    pub fn new(line_height: Pixels, cell_width: Pixels, bounds: Bounds\u003cPixels\u003e) -\u003e Self {\r\n        TerminalBounds {\r\n            cell_width,\r\n            line_height,\r\n            bounds,\r\n        }\r\n    }\r\n\r\n    pub fn num_lines(\u0026self) -\u003e usize {\r\n        (self.bounds.size.height / self.line_height).floor() as usize\r\n    }\r\n\r\n    pub fn num_columns(\u0026self) -\u003e usize {\r\n        (self.bounds.size.width / self.cell_width).floor() as usize\r\n    }\r\n\r\n    pub fn height(\u0026self) -\u003e Pixels {\r\n        self.bounds.size.height\r\n    }\r\n\r\n    pub fn width(\u0026self) -\u003e Pixels {\r\n        self.bounds.size.width\r\n    }\r\n\r\n    pub fn cell_width(\u0026self) -\u003e Pixels {\r\n        self.cell_width\r\n    }\r\n\r\n    pub fn line_height(\u0026self) -\u003e Pixels {\r\n        self.line_height\r\n    }\r\n}\r\n\r\nimpl Default for TerminalBounds {\r\n    fn default() -\u003e Self {\r\n        TerminalBounds::new(\r\n            DEBUG_LINE_HEIGHT,\r\n            DEBUG_CELL_WIDTH,\r\n            Bounds {\r\n                origin: Point::default(),\r\n                size: Size {\r\n                    width: DEBUG_TERMINAL_WIDTH,\r\n                    height: DEBUG_TERMINAL_HEIGHT,\r\n                },\r\n            },\r\n        )\r\n    }\r\n}\r\n\r\nimpl From\u003cTerminalBounds\u003e for WindowSize {\r\n    fn from(val: TerminalBounds) -\u003e Self {\r\n        WindowSize {\r\n            num_lines: val.num_lines() as u16,\r\n            num_cols: val.num_columns() as u16,\r\n            cell_width: f32::from(val.cell_width()) as u16,\r\n            cell_height: f32::from(val.line_height()) as u16,\r\n        }\r\n    }\r\n}\r\n\r\nimpl Dimensions for TerminalBounds {\r\n    /// Note: this is supposed to be for the back buffer's length,\r\n    /// but we exclusively use it to resize the terminal, which does not\r\n    /// use this method. We still have to implement it for the trait though,\r\n    /// hence, this comment.\r\n    fn total_lines(\u0026self) -\u003e usize {\r\n        self.screen_lines()\r\n    }\r\n\r\n    fn screen_lines(\u0026self) -\u003e usize {\r\n        self.num_lines()\r\n    }\r\n\r\n    fn columns(\u0026self) -\u003e usize {\r\n        self.num_columns()\r\n    }\r\n}\r\n\r\n#[derive(Error, Debug)]\r\npub struct TerminalError {\r\n    pub directory: Option\u003cPathBuf\u003e,\r\n    pub program: Option\u003cString\u003e,\r\n    pub args: Option\u003cVec\u003cString\u003e\u003e,\r\n    pub title_override: Option\u003cString\u003e,\r\n    pub source: std::io::Error,\r\n}\r\n\r\nimpl TerminalError {\r\n    pub fn fmt_directory(\u0026self) -\u003e String {\r\n        self.directory\r\n            .clone()\r\n            .map(|path| {\r\n                match path\r\n                    .into_os_string()\r\n                    .into_string()\r\n                    .map_err(|os_str| format!(\"\u003cnon-utf8 path\u003e {}\", os_str.to_string_lossy()))\r\n                {\r\n                    Ok(s) =\u003e s,\r\n                    Err(s) =\u003e s,\r\n                }\r\n            })\r\n            .unwrap_or_else(|| \"\u003cnone specified\u003e\".to_string())\r\n    }\r\n\r\n    pub fn fmt_shell(\u0026self) -\u003e String {\r\n        if let Some(title_override) = \u0026self.title_override {\r\n            format!(\r\n                \"{} {} ({})\",\r\n                self.program.as_deref().unwrap_or(\"\u003csystem defined shell\u003e\"),\r\n                self.args.as_ref().into_iter().flatten().format(\" \"),\r\n                title_override\r\n            )\r\n        } else {\r\n            format!(\r\n                \"{} {}\",\r\n                self.program.as_deref().unwrap_or(\"\u003csystem defined shell\u003e\"),\r\n                self.args.as_ref().into_iter().flatten().format(\" \")\r\n            )\r\n        }\r\n    }\r\n}\r\n\r\nimpl Display for TerminalError {\r\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\r\n        let dir_string: String = self.fmt_directory();\r\n        let shell = self.fmt_shell();\r\n\r\n        write!(\r\n            f,\r\n            \"Working directory: {} Shell command: `{}`, IOError: {}\",\r\n            dir_string, shell, self.source\r\n        )\r\n    }\r\n}\r\n\r\n// https://github.com/alacritty/alacritty/blob/cb3a79dbf6472740daca8440d5166c1d4af5029e/extra/man/alacritty.5.scd?plain=1#L207-L213\r\nconst DEFAULT_SCROLL_HISTORY_LINES: usize = 10_000;\r\npub const MAX_SCROLL_HISTORY_LINES: usize = 100_000;\r\n\r\npub struct TerminalBuilder {\r\n    terminal: Terminal,\r\n    events_rx: UnboundedReceiver\u003cAlacTermEvent\u003e,\r\n}\r\n\r\nimpl TerminalBuilder {\r\n    pub fn new_display_only(\r\n        cursor_shape: CursorShape,\r\n        alternate_scroll: AlternateScroll,\r\n        max_scroll_history_lines: Option\u003cusize\u003e,\r\n        window_id: u64,\r\n        background_executor: \u0026BackgroundExecutor,\r\n        path_style: PathStyle,\r\n    ) -\u003e Result\u003cTerminalBuilder\u003e {\r\n        // Create a display-only terminal (no actual PTY).\r\n        let default_cursor_style = AlacCursorStyle::from(cursor_shape);\r\n        let scrolling_history = max_scroll_history_lines\r\n            .unwrap_or(DEFAULT_SCROLL_HISTORY_LINES)\r\n            .min(MAX_SCROLL_HISTORY_LINES);\r\n        let config = Config {\r\n            scrolling_history,\r\n            default_cursor_style,\r\n            ..Config::default()\r\n        };\r\n\r\n        let (events_tx, events_rx) = unbounded();\r\n        let mut term = Term::new(\r\n            config.clone(),\r\n            \u0026TerminalBounds::default(),\r\n            ZedListener(events_tx),\r\n        );\r\n\r\n        if let AlternateScroll::Off = alternate_scroll {\r\n            term.unset_pr
