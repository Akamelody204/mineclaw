<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <style>:root {
  --color: black;
  --bg: white;
  --head-bg: white;
  --link: #338;

  --blue: #ccf;
  --red: #fcc;
  --yellow: #ffc;
  --green: #cfc;
}

[data-theme='dark'] {
  --color: white;
  --bg: black;
  --head-bg: #333;
  --link: #aaf;

  --blue: #225;
  --red: #522;
  --yellow: #552;
  --green: #252;
}

html,
body {
  margin: 0;
  padding: 0;
  color: var(--color);
  background: var(--bg);
}

.app {
  margin: 10px;
  padding: 0;
}

.files-list {
  margin: 10px 0 0;
  width: 100%;
  border-collapse: collapse;
}
.files-list__head {
  border: 1px solid #999;
}
.files-list__head > tr > th {
  padding: 10px;
  border: 1px solid #999;
  text-align: left;
  font-weight: normal;
  background: var(--head-bg);
}
.files-list__body {
}
.files-list__file {
  cursor: pointer;
}
.files-list__file:hover {
  background: var(--blue);
}
.files-list__file > td {
  padding: 10px;
  border: 1px solid #999;
}
.files-list__file > td:first-child::before {
  content: '\01F4C4';
  margin-right: 1em;
}
.files-list__file_low {
  background: var(--red);
}
.files-list__file_medium {
  background: var(--yellow);
}
.files-list__file_high {
  background: var(--green);
}
.files-list__file_folder > td:first-child::before {
  content: '\01F4C1';
  margin-right: 1em;
}

.file-header {
  border: 1px solid #999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
}

.file-header__back {
  margin: 10px;
  cursor: pointer;
  flex-shrink: 0;
  flex-grow: 0;
  text-decoration: underline;
  color: var(--link);
}

.file-header__name {
  margin: 10px;
  flex-shrink: 2;
  flex-grow: 2;
}

.file-header__stat {
  margin: 10px;
  flex-shrink: 0;
  flex-grow: 0;
}

.file-content {
  margin: 10px 0 0;
  border: 1px solid #999;
  padding: 10px;
  counter-reset: line;
  display: flex;
  flex-direction: column;
}

.code-line::before {
  content: counter(line);
  margin-right: 72px;
}
.code-line {
  margin: 0;
  height: 1em;
  counter-increment: line;

  position: absolute;
  padding: 0 0.3em 0.3em 0.3em;
  display: inherit;
  width: 100%;
}
.code-line_covered {
  background: var(--green);
}
.code-line_uncovered {
  background: var(--red);
}

.code-text-container {
  position: relative;
  height: 1em;
  padding: 0.3em 0;
}

.cover-indicator {
  display: flex;
  width: 100%;
  position: absolute;
  justify-content: end;
  height: 1em;
  align-items: center;
  padding: 0 0.3em 0.3em 0.3em;
}

.cover-indicator.check-cover::after {
  content: "\2713";
  font-weight: bold;
  background-color: var(--green);
  height: 1em;
}

.cover-indicator.no-cover::after {
  content: "\2716";
  font-weight: bold;
  background-color: var(--red);
  height: 1em;
}

.stat-line-hit {
  max-width: 48px;
  overflow: hidden;
  font-weight: bold;
  margin-right: 4px;
  background-color: var(--green);
  position: relative;
  top: 0.1em;
}

#theme-toggle-label {
  margin-left: 1ch;
}
</style>
</head>

sages 中包含了最终回复\r\n    // （当 LLM 只返回文本时，ToolCoordinator 会保存为 Assistant 消息）\r\n\r\n    state.session_repo.update(session.clone()).await?;\r\n\r\n    info!(\"Send message response sent, session_id: {}\", session.id);\r\n\r\n    Ok(Json(SendMessageResponse {\r\n        message_id: user_message_id,\r\n        session_id: session.id,\r\n        assistant_response,\r\n    }))\r\n}\r\n\r\npub async fn get_session(\r\n    State(state): State\u003cAppState\u003e,\r\n    Path(session_id_str): Path\u003cString\u003e,\r\n) -\u003e Result\u003cJson\u003cSession\u003e\u003e {\r\n    info!(\"Get session request received: {}\", session_id_str);\r\n\r\n    let session_id = Uuid::parse_str(\u0026session_id_str).map_err(|_| {\r\n        crate::error::Error::InvalidInput(format!(\"Invalid UUID: {}\", session_id_str))\r\n    })?;\r\n\r\n    let session = state\r\n        .session_repo\r\n        .get(\u0026session_id)\r\n        .await\r\n        .ok_or_else(|| crate::error::Error::SessionNotFound(session_id.to_string()))?;\r\n\r\n    info!(\"Get session response sent\");\r\n\r\n    Ok(Json(session))\r\n}\r\n\r\npub async fn list_sessions(State(state): State\u003cAppState\u003e) -\u003e Result\u003cJson\u003cListSessionsResponse\u003e\u003e {\r\n    info!(\"List sessions request received\");\r\n\r\n    let sessions = state.session_repo.list().await;\r\n\r\n    info!(\"List sessions response sent, count: {}\", sessions.len());\r\n\r\n    Ok(Json(ListSessionsResponse { sessions }))\r\n}\r\n\r\npub async fn list_messages(\r\n    State(state): State\u003cAppState\u003e,\r\n    Path(session_id_str): Path\u003cString\u003e,\r\n) -\u003e Result\u003cJson\u003cListMessagesResponse\u003e\u003e {\r\n    info!(\"List messages request received: {}\", session_id_str);\r\n\r\n    let session_id = Uuid::parse_str(\u0026session_id_str).map_err(|_| {\r\n        crate::error::Error::InvalidInput(format!(\"Invalid UUID: {}\", session_id_str))\r\n    })?;\r\n\r\n    let session = state\r\n        .session_r i/sessions/{id}\", get(handlers::get_session))\r\n        .route(\"/api/sessions/{id}\", delete(handlers::delete_session))\r\n        .route(\"/api/sessions/{id}/messages\", get(handlers::list_messages))\r\n        .route(\"/api/sessions/{id}/stream\", get(handlers::session_stream))\r\n        // 管理 API\r\n        .route(\"/api/tools\", get(handlers::list_tools))\r\n        .route(\"/api/mcp/servers\", get(handlers::list_mcp_servers))\r\n        .route(\r\n            \"/api/mcp/servers/{name}/restart\",\r\n            post(handlers::restart_mcp_server),\r\n        )\r\n        .with_state(state)\r\n}\r\n","traces":[{"line":7,"address":[],"length":0,"stats":{"Line":0}},{"line":8,"address":[],"length":0,"stats":{"Line":0}},{"line":9,"address":[],"length":0,"stats":{"Line":0}},{"line":10,"address":[],"length":0,"stats":{"Line":0}},{"line":11,"address":[],"length":0,"stats":{"Line":0}},{"line":12,"address":[],"length":0,"stats":{"Line":0}},{"line":13,"address":[],"length":0,"stats":{"Line":0}},{"line":14,"address":[],"length":0,"stats":{"Line":0}},{"line":15,"address":[],"length":0,"stats":{"Line":0}},{"line":16,"address":[],"length":0,"stats":{"Line":0}},{"line":18,"address":[],"length":0,"stats":{"Line":0}},{"line":19,"address":[],"length":0,"stats":{"Line":0}},{"line":22,"address":[],"length":0,"stats":{"Line":0}},{"line":24,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":14},{"path":["D:","\\","mineclaw","src","api","sse.rs"],"content":"//! SSE 响应处理\r\n//!\r\n//! 实现 Server-Sent Events 流式响应，用于实时推送工具协调器的事件。\r\n\r\nuse crate::models::{SendMessageRequest, SseEvent};\r\nuse crate::state::AppState;\r\nuse crate::tool_coordinator::ToolCoordinatorCallback;\r\nuse async_trait::async_trait;\r\nuse axum::response::sse::{Event, KeepAlive, Sse};\r\nuse futures_util::stream::Stream;\r\nuse serde_json::Value;\r\nuse std::convert::Infallible;\r\nuse tokio::sync::mpsc;\r\nuse tracing::{debug, info, warn};\r\nuse uuid::Uuid;\r\n\r\n// ==================== SseChannel ====================\r\n\r\n/// SSE 事件通道\r\n///\r\n/// 用于将工具协调器的事件转发到 SSE 流。\r\npub struct SseChannel {\r\n    sender: mpsc::UnboundedSender\u003cSseEvent\u003e,\r\n}\r\n\r\nimpl SseChannel {\r\n    /// 创建一个新的 SSE 通道\r\n    pub fn new() -\u003e (Self, mpsc::UnboundedReceiver\u003cSseEvent\u003e) {\r\n        let (sender, receiver) = mpsc::unbounded_channel();\r\n        (Self { sender }, receiver)\r\n    }\r\n\r\n    /// 发送事件\r\n    pub fn send(\u0026self, event: SseEvent) {\r\n        let _ = self.sender.send(event);\r\n    }\r\n}\r\n\r\n#[async_trait]\r\nimpl ToolCoordinatorCallback for SseChannel {\r\n    async fn on_assistant_message(\u0026self, content: \u0026str) {\r\n        self.send(SseEvent::assistant_message(content));\r\n    }\r\n\r\n    async fn on_tool_call(\u0026self, tool: \u0026str, arguments: \u0026Value) {\r\n        self.send(SseEvent::tool_call(tool, arguments.clone()));\r\n    }\r\n\r\n    async fn on_tool_result(\u0026self, content: \u0026str, is_error: bool) {\r\n        self.send(SseEvent::tool_result(content, is_error));\r\n    }\r\n\r\n    async fn on_completed(\u0026self, _final_response: \u0026str) {\r\n        self.send(SseEvent::completed());\r\n    }\r\n\r\n    async fn on_error(\u0026self, message: \u0026str) {\r\n        self.send(SseEvent::error(message));\r\n    }\r\n}\r\n\r\n// ==================== SSE Handler Helpers ====================\r\n\r\n/// 创建 SSE 流\r\n///\r\n/// 将接收器转换为 SSE 流。\r\nfn create_sse_stream(\r\n    mut receiver: mpsc::UnboundedReceiver\u003cSseEvent\u003e,\r\n) -\u003e impl Stream\u003cItem = std::result::Result\u003cEvent, Infallible\u003e\u003e {\r\n    async_stream::stream! {\r\n        while let Some(event) = receiver.recv().await {\r\n            match event.to_json() {\r\n                Ok(json) =\u003e {\r\n                    yield Ok(Event::default().data(json));\r\n                }\r\n                Err(e) =\u003e {\r\n                    warn!(\"Failed to serialize SSE event: {}\", e);\r\n                    let error_event = SseEvent::error(format!(\"Serialization error: {}\", e));\r\n                    if let Ok(error_json) = error_event.to_json() {\r\n                        yield Ok(Event::default().data(error_json));\r\n                    }\r\n                }\r\n            }\r\n        }\r\n    }\r\n}\r\n\r\n/// 处理消息流式请求\r\n///\r\n/// 这是内部辅助函数，被 `send_message_stream` 和 `session_stream` 调用。\r\npub async fn handle_stream_request(\r\n    state: AppState,\r\n    session_id: Uuid,\r\n    content: Option\u003cString\u003e,\r\n) -\u003e Sse\u003cimpl Stream\u003cItem = std::result::Result\u003cEvent, Infallible\u003e\u003e\u003e {\r\n    info!(\"Handling stream request, session_id={}\", session_id);\r\n\r\n    // 创建 SSE 通道\r\n    let (sse_channel, receiver) = SseChannel::new();\r\n\r\n    // 立即发送会话开始事件\r\n    sse_channel.send(SseEvent::session_started(session_id.to_string()));\r\n\r\n    // 获取会话\r\n    let session = if let Some(session) = state.session_repo.get(\u0026session_id).await {\r\n        session\r\n    } else {\r\n        warn!(\"Session not found, creating new one\");\r\n        state.session_repo.create().await\r\n    };\r\n\r\n    // 如果有新内容，添加用户消息并运行工具协调器\r\n    if let Some(content) = content {\r\n        let mut session = session;\r\n        let user_message =\r\n            crate::models::Message::new(session_id, crate::models::MessageRole::User, content);\r\n        session.add_message(user_message);\r\n\r\n        // 保存会话\r\n        let _ = state.session_repo.update(session.clone()).await;\r\n\r\n        // 在后台运行工具协调器\r\n        let state_clone = state.clone();\r\n        tokio::spawn(async move {\r\n            let result = state_clone\r\n                .tool_coordinator\r\n                .run_with_callback(session.clone(), sse_channel)\r\n                .await;\r\n\r\n            match result {\r\n                Ok((_final_response, intermediate_messages)) =\u003e {\r\n                    debug!(\"Tool coordinator completed successfully\");\r\n                    // 更新会话\r\n                    if let Some(mut session) = state_clone.session_repo.get(\u0026session_id).await {\r\n                        for msg in intermediate_messages {\r\n                            session.add_message(msg);\r\n                        }\r\n                        let _ = state_clone.session_repo.update(session).await;\r\n                    }\r\n                }\r\n                Err(e) =\u003e {\r\n                    warn!(\"Tool coordinator error: {}\", e);\r\n                }\r\n            }\r\n        });\r\n    } else {\r\n        // 没有新内容，只发送一个 completed 事件说明会话已存在\r\n        info!(\"No new content, session exists\");\r\n        sse_channel.send(SseEvent::completed());\r\n        // 这里不运行工具协调器，因为没有新的用户消息\r\n        // 如果想要重放历史事件，需要额外的逻辑\r\n    }\r\n\r\n    // 创建 SSE 响应\r\n    Sse::new(create_sse_stream(receiver)).keep_alive(KeepAlive::default())\r\n}\r\n\r\n/// 发送消息并建立 SSE 流式响应（新建会话）\r\npub async fn send_message_stream(\r\n    state: AppState,\r\n    request: SendMessageRequest,\r\n) -\u003e Sse\u003cimpl Stream\u003cItem = std::result::Result\u003cEvent, Infallible\u003e\u003e\u003e {\r\n    info!(\"Send message stream request received\");\r\n\r\n    // 创建新会话或使用现有会话\r\n    let session_id = if let Some(session_id) = request.session_id {\r\n        session_id\r\n    } else {\r\n        let session = state.session_repo.create().await;\r\n        session.id\r\n    };\r\n\r\n    handle_stream_request(state, session_id, Some(request.content)).await\r\n}\r\n\r\n/// 连接现有会话的 SSE 流式响应\r\npub async fn session_stream(\r\n    state: AppState,\r\n    session_id: Uuid,\r\n) -\u003e Sse\u003cimpl Stream\u003cItem = std::result::Result\u003cEvent, Infallible\u003e\u003e\u003e {\r\n    info!(\"Session stream request received, session_id={}\", session_id);\r\n\r\n    // 对于现有会话，不添加新内容\r\n    handle_stream_request(state, session_id, None).await\r\n}\r\n","traces":[{"line":28,"address":[],"length":0,"stats":{"Line":0}},{"line":29,"address":[],"length":0,"stats":{"Line":0}},{"line":30,"address":[],"length":0,"stats":{"Line":0}},{"line":34,"address":[],"length":0,"stats":{"Line":0}},{"line":35,"address":[],"length":0,"stats":{"Line":0}},{"line":41,"address":[],"length":0,"stats":{"Line":0}},{"line":45,"address":[],"length":0,"stats":{"Line":0}},{"line":49,"address":[],"length":0,"stats":{"Line":0}},{"line":53,"address":[],"length":0,"stats":{"Line":0}},{"line":57,"address":[],"length":0,"stats":{"Line":0}},{"line":67,"address":[],"length":0,"stats":{"Line":0}},{"line":70,"address":[],"length":0,"stats":{"Line":0}},{"line":91,"address":[],"length":0,"stats":{"Line":0}},{"line":96,"address":[],"length":0,"stats":{"Line":0}},{"line":99,"address":[],"length":0,"stats":{"Line":0}},{"line":102,"address":[],"length":0,"stats":{"Line":0}},{"line":105,"address":[],"length":0,"stats":{"Line":0}},{"line":106,"address":[],"length":0,"stats":{"Line":0}},{"line":108,"address":[],"length":0,"stats":{"Line":0}},{"line":109,"address":[],"length":0,"stats":{"Line":0}},{"line":113,"address":[],"length":0,"stats":{"Line":0}},{"line":114,"address":[],"length":0,"stats":{"Line":0}},{"line":115,"address":[],"length":0,"stats":{"Line":0}},{"line":116,"address":[],"length":0,"stats":{"Line":0}},{"line":117,"address":[],"length":0,"stats":{"Line":0}},{"line":120,"address":[],"length":0,"stats":{"Line":0}},{"line":123,"address":[],"length":0,"stats":{"Line":0}},{"line":124,"address":[],"length":0,"stats":{"Line":0}},{"line":125,"address":[],"length":0,"stats":{"Line":0}},{"line":126,"address":[],"length":0,"stats":{"Line":0}},{"line":127,"address":[],"length":0,"stats":{"Line":0}},{"line":128,"address":[],"length":0,"stats":{"Line":0}},{"line":130,"address":[],"length":0,"stats":{"Line":0}},{"line":131,"address":[],"length":0,"stats":{"Line":0}},{"line":132,"address":[],"length":0,"stats":{"Line":0}},{"line":134,"address":[],"length":0,"stats":{"Line":0}},{"line":135,"address":[],"length":0,"stats":{"Line":0}},{"line":136,"address":[],"length":0,"stats":{"Line":0}},{"line":138,"address":[],"length":0,"stats":{"Line":0}},{"line":141,"address":[],"length":0,"stats":{"Line":0}},{"line":142,"address":[],"length":0,"stats":{"Line":0}},{"line":148,"address":[],"length":0,"stats":{"Line":0}},{"line":149,"address":[],"length":0,"stats":{"Line":0}},{"line":155,"address":[],"length":0,"stats":{"Line":0}},{"line":159,"address":[],"length":0,"stats":{"Line":0}},{"line":163,"address":[],"length":0,"stats":{"Line":0}},{"line":166,"address":[],"length":0,"stats":{"Line":0}},{"line":167,"address":[],"length":0,"stats":{"Line":0}},{"line":169,"address":[],"length":0,"stats":{"Line":0}},{"line":170,"address":[],"length":0,"stats":{"Line":0}},{"line":173,"address":[],"length":0,"stats":{"Line":0}},{"line":177,"address":[],"length":0,"stats":{"Line":0}},{"line":181,"address":[],"length":0,"stats":{"Line":0}},{"line":184,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":54},{"path":["D:","\\","mineclaw","src","checkpoint","error.rs"],"content":"use thiserror::Error;\r\n\r\n#[derive(Error, Debug)]\r\npub enum CheckpointError {\r\n    #[error(\"Checkpoint not found: {0}\")]\r\n    NotFound(String),\r\n\r\n    #[error(\"Session not found: {0}\")]\r\n    SessionNotFound(String),\r\n\r\n    #[error(\"Checkpoint limit reached for session: {0}\")]\r\n    LimitReached(String),\r\n\r\n    #[error(\"AgentFS error: {0}\")]\r\n    AgentFS(String),\r\n\r\n    #[error(\"Serialization error: {0}\")]\r\n    Serialization(#[from] serde_json::Error),\r\n\r\n    #[error(\"IO error: {0}\")]\r\n    Io(#[from] std::io::Error),\r\n\r\n    #[error(\"Invalid checkpoint data: {0}\")]\r\n    InvalidData(String),\r\n}\r\n\r\npub type Result\u003cT\u003e = std::result::Result\u003cT, CheckpointError\u003e;\r\n","traces":[],"covered":0,"coverable":0},{"path":["D:","\\","mineclaw","src","checkpoint","manager.rs"],"content":"use crate::checkpoint::error::{CheckpointError, Result};\r\nuse crate::config::CheckpointConfig;\r\nuse crate::models::Session;\r\nuse crate::models::checkpoint::*;\r\nuse agentfs::{AgentFS, KvStore};\r\nuse chrono::Utc;\r\nuse std::collections::HashMap;\r\nuse std::sync::Arc;\r\nuse tracing::{info, warn};\r\nuse uuid::Uuid;\r\n\r\n/// Checkpoint 管理器\r\n#[derive(Clone)]\r\npub struct CheckpointManager {\r\n    agent_fs: Arc\u003cAgentFS\u003e,\r\n    config: CheckpointConfig,\r\n}\r\n\r\nimpl std::fmt::Debug for CheckpointManager {\r\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\r\n        f.debug_struct(\"CheckpointManager\")\r\n            .field(\"config\", \u0026self.config)\r\n            .finish_non_exhaustive()\r\n    }\r\n}\r\n\r\nimpl CheckpointManager {\r\n    /// 创建新的 CheckpointManager\r\n    pub fn new(agent_fs: Arc\u003cAgentFS\u003e, config: CheckpointConfig) -\u003e Self {\r\n        Self { agent_fs, config }\r\n    }\r\n\r\n    /// 获取配置引用\r\n    pub fn config(\u0026self) -\u003e \u0026CheckpointConfig {\r\n        \u0026self.config\r\n    }\r\n\r\n    // ==================== 核心功能 ====================\r\n\r\n    /// 创建 checkpoint\r\n    pub async fn create_checkpoint(\r\n        \u0026self,\r\n        session: \u0026Session,\r\n        description: Option\u003cString\u003e,\r\n        checkpoint_type: CheckpointType,\r\n        affected_files: Option\u003cVec\u003cString\u003e\u003e,\r\n    ) -\u003e Result\u003cCheckpoint\u003e {\r\n        if !self.config.enabled {\r\n            return Err(CheckpointError::InvalidData(\r\n                \"Checkpoint is disabled\".to_string(),\r\n            ));\r\n        }\r\n\r\n        // 获取父 checkpoint\r\n        let parent_id = self.get_latest_checkpoint_id(\u0026session.id).await?;\r\n\r\n        // 创建 checkpoint 对象\r\n        let mut checkpoint = Checkpoint::new(session.id, checkpoint_type, description);\r\n        if let Some(parent_id) = parent_id {\r\n            checkpoint = checkpoint.with_parent_id(parent_id);\r\n        }\r\n\r\n        // 收集文件信息\r\n        let file_infos = if let Some(files) = affected_files {\r\n            self.collect_file_infos(\u0026files).await?\r\n        } else {\r\n            Vec::new()\r\n        };\r\n        checkpoint = checkpoint.with_affected_files(file_infos.clone());\r\n\r\n        // 保存 checkpoint\r\n        self.save_checkpoint(\u0026checkpoint).await?;\r\n\r\n        // 保存文件快照\r\n        self.save_file_snapshots(\u0026checkpoint.id, \u0026session.id, \u0026file_infos)\r\n            .await?;\r\n\r\n        // 保存会话快照\r\n        self.save_session_snapshot(\u0026checkpoint.id, session).await?;\r\n\r\n        info!(\r\n            checkpoint_id = %checkpoint.id,\r\n            session_id = %session.id,\r\n            \"Checkpoint created successfully\"\r\n        );\r\n\r\n        Ok(checkpoint)\r\n    }\r\n\r\n    /// 列出会话的所有 checkpoints\r\n    pub async fn list_checkpoints(\u0026self, session_id: \u0026Uuid) -\u003e Result\u003cListCheckpointsResponse\u003e {\r\n        let checkpoints = self.load_checkpoints_for_session(session_id).await?;\r\n\r\n        let items: Vec\u003cCheckpointListItem\u003e =\r\n            checkpoints.iter().map(CheckpointListItem::from).collect();\r\n\r\n        Ok(ListCheckpointsResponse {\r\n            checkpoints: items,\r\n            total_count: checkpoints.len(),\r\n        })\r\n    }\r\n\r\n    /// 获取单个 checkpoint\r\n    pub async fn get_checkpoint(\u0026self, checkpoint_id: \u0026str) -\u003e Result\u003cCheckpoint\u003e {\r\n        self.load_checkpoint(checkpoint_id).await\r\n    }\r\n\r\n    /// 恢复 checkpoint\r\n    pub async fn restore_checkpoint(\r\n        \u0026self,\r\n        checkpoint_id: \u0026str,\r\n        restore_files: bool,\r\n        restore_session: bool,\r\n    ) -\u003e Result\u003cCheckpointSnapshot\u003e {\r\n        let checkpoint = self.load_checkpoint(checkpoint_id).await?;\r\n\r\n        let mut snapshot = CheckpointSnapshot {\r\n            checkpoint: checkpoint.clone(),\r\n            session: None,\r\n            files: HashMap::new(),\r\n        };\r\n\r\n        // 恢复会话\r\n        if restore_session {\r\n            snapshot.session = self.load_session_snapshot(checkpoint_id).await?;\r\n        }\r\n\r\n        // 恢复文件\r\n        if restore_files {\r\n            snapshot.files = self\r\n                .load_file_snapshots(checkpoint_id, \u0026checkpoint.session_id)\r\n                .await?;\r\n\r\n            // 实际写入文件\r\n            self.restore_files(\u0026snapshot.files).await?;\r\n        }\r\n\r\n        info!(\r\n            checkpoint_id = %checkpoint_id,\r\n            \"Checkpoint restored successfully\"\r\n        );\r\n\r\n        Ok(snapshot)\r\n    }\r\n\r\n    /// 删除 checkpoint\r\n    pub async fn delete_checkpoint(\u0026self, checkpoint_id: \u0026str) -\u003e Result\u003c()\u003e {\r\n        let checkpoint = self.load_checkpoint(checkpoint_id).await?;\r\n\r\n        // 删除文件快照\r\n        self.delete_file_snapshots(checkpoint_id, \u0026checkpoint.session_id)\r\n            .await?;\r\n\r\n        // 删除会话快照\r\n        self.delete_session_snapshot(checkpoint_id).await?;\r\n\r\n        // 删除 checkpoint 元数据\r\n        self.delete_checkpoint_metadata(checkpoint_id, \u0026checkpoint.session_id)\r\n            .await?;\r\n\r\n        info!(\r\n            checkpoint_id = %checkpoint_id,\r\n            \"Checkpoint deleted successfully\"\r\n        );\r\n\r\n        Ok(())\r\n    }\r\n\r\n    // ==================== 内部方法 ====================\r\n\r\n    /// 获取最新的 checkpoint ID\r\n    async fn get_latest_checkpoint_id(\u0026self, session_id: \u0026Uuid) -\u003e Result\u003cOption\u003cString\u003e\u003e {\r\n        let mut checkpoints = self.load_checkpoints_for_session(session_id).await?;\r\n        checkpoints.sort_by(|a, b| b.created_at.cmp(\u0026a.created_at));\r\n        Ok(checkpoints.first().map(|c| c.id.clone()))\r\n    }\r\n\r\n    /// 删除会话的所有 checkpoints\r\n    pub async fn delete_all_checkpoints_for_session(\u0026self, session_id: \u0026Uuid) -\u003e Result\u003cusize\u003e {\r\n        let checkpoints = self.load_checkpoints_for_session(session_id).await?;\r\n        let mut deleted_count = 0;\r\n\r\n        for checkpoint in checkpoints {\r\n            match self.delete_checkpoint(\u0026checkpoint.id).await {\r\n                Ok(_) =\u003e deleted_count += 1,\r\n                Err(e) =\u003e {\r\n                    warn!(\r\n                        checkpoint_id = %checkpoint.id,\r\n                        error = %e,\r\n                        \"Failed to delete checkpoint when cleaning up session\"\r\n                    );\r\n                }\r\n            }\r\n        }\r\n\r\n        // 删除会话的 checkpoint 列表文件\r\n        let list_key = self.checkpoint_list_key(session_id);\r\n        let _ = self.agent_fs.kv.delete(\u0026list_key).await;\r\n\r\n        info!(\r\n            session_id = %session_id,\r\n            count = %deleted_count,\r\n            \"Deleted all checkpoints for session\"\r\n        );\r\n\r\n        Ok(deleted_count)\r\n    }\r\n\r\n    /// 收集文件信息\r\n    async fn collect_file_infos(\u0026self, paths: \u0026[String]) -\u003e Result\u003cVec\u003cFileInfo\u003e\u003e {\r\n        let mut infos = Vec::new();\r\n\r\n        for path in paths {\r\n            if let Ok(metadata) = tokio::fs::metadata(path).await\r\n                \u0026\u0026 metadata.is_file()\r\n            {\r\n                let modified_at = metadata\r\n                    .modified()\r\n                    .map(|t| t.into())\r\n                    .unwrap_or_else(|_| Utc::now());\r\n\r\n                infos.push(FileInfo {\r\n                    path: path.clone(),\r\n                    size: metadata.len(),\r\n                    modified_at,\r\n                    content_hash: None, // 可以后续实现文件哈希计算\r\n                });\r\n            }\r\n        }\r\n\r\n        Ok(infos)\r\n    }\r\n\r\n    // ==================== 存储相关方法 ====================\r\n\r\n    /// 保存 checkpoint 元数据\r\n    async fn save_checkpoint(\u0026self, checkpoint: \u0026Checkpoint) -\u003e Result\u003c()\u003e {\r\n        let key = self.checkpoint_metadata_key(\u0026checkpoint.session_id, \u0026checkpoint.id);\r\n        let data = serde_json::to_vec(checkpoint)?;\r\n        self.agent_fs\r\n            .kv\r\n            .set(\u0026key, \u0026data)\r\n            .await\r\n            .map_err(|e| CheckpointError::AgentFS(e.to_string()))?;\r\n\r\n        // 更新会话的 checkpoint 列表\r\n        self.update_checkpoint_list(\u0026checkpoint.session_id, checkpoint)\r\n            .await?;\r\n\r\n        Ok(())\r\n    }\r\n\r\n    /// 加载 checkpoint 元数据\r\n    async fn load_checkpoint(\u0026self, checkpoint_id: \u0026str) -\u003e Result\u003cCheckpoint\u003e {\r\n        // 我们需要先找到这个 checkpoint 属于哪个会话\r\n        // 这里简化处理，实际可能需要更好的索引\r\n        let session_keys = self\r\n            .agent_fs\r\n            .kv\r\n            .scan(\"checkpoints/\")\r\n            .await\r\n            .map_err(|e| CheckpointError::AgentFS(e.to_string()))?;\r\n\r\n        for session_key in session_keys {\r\n            if session_key.ends_with(\"/list.json\") {\r\n                let session_id_str = session_key\r\n                    .strip_prefix(\"checkpoints/\")\r\n                    .and_then(|s| s.strip_suffix(\"/list.json\"));\r\n\r\n                if let Some(session_id_str) = session_id_str {\r\n                    let key = format!(\r\n                        \"checkpoints/{}/{}/metadata.json\",\r\n                        session_id_str, checkpoint_id\r\n                    );\r\n                    if let Ok(Some(data)) = self.agent_fs.kv.get(\u0026key).await {\r\n                        return Ok(serde_json::from_slice(\u0026data)?);\r\n                    }\r\n                }\r\n            }\r\n        }\r\n\r\n        Err(CheckpointError::NotFound(checkpoint_id.to_string()))\r\n    }\r\n\r\n    /// 加载会话的所有 checkpoints\r\n    async fn load_checkpoints_for_session(\u0026self, session_id: \u0026Uuid) -\u003e Result\u003cVec\u003cCheckpoint\u003e\u003e {\r\n        let list_key = self.checkpoint_list_key(session_id);\r\n\r\n        let data_opt = self\r\n            .agent_fs\r\n            .kv\r\n            .get(\u0026list_key)\r\n            .await\r\n            .map_err(|e| CheckpointError::AgentFS(e.to_string()))?;\r\n\r\n        let Some(data) = data_opt else {\r\n            return Ok(Vec::new());\r\n        };\r\n\r\n        let ids: Vec\u003cString\u003e = serde_json::from_slice(\u0026data)?;\r\n        let mut checkpoints = Vec::new();\r\n\r\n        for id in ids {\r\n            let key = self.checkpoint_metadata_key(session_id, \u0026id);\r\n            if let Ok(Some(data)) = self.agent_fs.kv.get(\u0026key).await\r\n                \u0026\u0026 let Ok(checkpoint) = serde_json::from_slice(\u0026data)\r\n            {\r\n                checkpoints.push(checkpoint);\r\n            }\r\n        }\r\n\r\n        Ok(checkpoints)\r\n    }\r\n\r\n    /// 更新 checkpoint 列表\r\n    async fn update_checkpoint_list(\r\n        \u0026self,\r\n        session_id: \u0026Uuid,\r\n        checkpoint: \u0026Checkpoint,\r\n    ) -\u003e Result\u003c()\u003e {\r\n        let list_key = self.checkpoint_list_key(session_id);\r\n\r\n        let data_opt = self\r\n            .agent_fs\r\n            .kv\r\n            .get(\u0026list_key)\r\n            .await\r\n            .map_err(|e| CheckpointError::AgentFS(e.to_string()))?;\r\n\r\n        let mut ids = match data_opt {\r\n            Some(data) =\u003e serde_json::from_slice::\u003cVec\u003cString\u003e\u003e(\u0026data).unwrap_or_default(),\r\n            None =\u003e Vec::new(),\r\n        };\r\n\r\n        if !ids.contains(\u0026checkpoint.id) {\r\n            ids.push(checkpoint.id.clone());\r\n        }\r\n\r\n        let data = serde_json::to_vec(\u0026ids)?;\r\n        self.agent_fs\r\n            .kv\r\n            .set(\u0026list_key, \u0026data)\r\n            .await\r\n            .map_err(|e| CheckpointError::AgentFS(e.to_string()))?;\r\n\r\n        Ok(())\r\n    }\r\n\r\n    /// 保存文件快照\r\n    async fn save_file_snapshots(\r\n        \u0026self,\r\n        checkpoint_id: \u0026str,\r\n        session_id: \u0026Uuid,\r\n        files: \u0026[FileInfo],\r\n    ) -\u003e Result\u003c()\u003e {\r\n        for file_info in files {\r\n            if let Ok(content) = tokio::fs::read(\u0026file_info.path).await {\r\n                let key = self.file_snapshot_key(session_id, checkpoint_id, \u0026file_info.path);\r\n                self.agent_fs\r\n                    .kv\r\n                    .set(\u0026key, \u0026content)\r\n                    .await\r\n                    .map_err(|e| CheckpointError::AgentFS(e.to_string()))?;\r\n            }\r\n        }\r\n        Ok(())\r\n    }\r\n\r\n    /// 加载文件快照\r\n    async fn load_file_snapshots(\r\n        \u0026self,\r\n        checkpoint_id: \u0026str,\r\n        session_id: \u0026Uuid,\r\n    ) -\u003e Result\u003cHashMap\u003cString, Vec\u003cu8\u003e\u003e\u003e {\r\n        let prefix = format!(\"checkpoints/{}/{}/files/\", session_id, checkpoint_id);\r\n        let keys = self\r\n            .agent_fs\r\n            .kv\r\n            .scan(\u0026prefix)\r\n            .await\r\n            .map_err(|e| CheckpointError::AgentFS(e.to_string()))?;\r\n\r\n        let mut files = HashMap::new();\r\n\r\n        for key in keys {\r\n            if let Ok(Some(data)) = self.agent_fs.kv.get(\u0026key).await {\r\n                // 从 key 中提取文件路径\r\n                if let Some(path) = key.strip_prefix(\u0026prefix) {\r\n                    files.insert(path.to_string(), data);\r\n                }\r\n            }\r\n        }\r\n\r\n        Ok(files)\r\n    }\r\n\r\n    /// 恢复文件到磁盘\r\n    async fn restore_files(\u0026self, files: \u0026HashMap\u003cString, Vec\u003cu8\u003e\u003e) -\u003e Result\u003c()\u003e {\r\n        for (path, content) in files {\r\n            // 从安全路径恢复原始路径\r\n            let original_path = path.replace(\"__\", \"/\");\r\n            if let Some(parent) = std::path::Path::new(\u0026original_path).parent() {\r\n                tokio::fs::create_dir_all(parent).await?;\r\n            }\r\n            tokio::fs::write(\u0026original_path, content).await?;\r\n        }\r\n        Ok(())\r\n    }\r\n\r\n    /// 删除文件快照\r\n    async fn delete_file_snapshots(\u0026self, checkpoint_id: \u0026str, session_id: \u0026Uuid) -\u003e Result\u003c()\u003e {\r\n        let prefix = format!(\"checkpoints/{}/{}/files/\", session_id, checkpoint_id);\r\n        let keys = self\r\n            .agent_fs\r\n            .kv\r\n            .scan(\u0026prefix)\r\n            .await\r\n            .map_err(|e| CheckpointError::AgentFS(e.to_string()))?;\r\n\r\n        for key in keys {\r\n            let _ = self.agent_fs.kv.delete(\u0026key).await;\r\n        }\r\n\r\n        Ok(())\r\n    }\r\n\r\n    /// 保存会话快照\r\n    async fn save_session_snapshot(\u0026self, checkpoint_id: \u0026str, session: \u0026Session) -\u003e Result\u003c()\u003e {\r\n        let key = self.session_snapshot_key(checkpoint_id);\r\n        let data = serde_json::to_vec(session)?;\r\n        self.agent_fs\r\n            .kv\r\n            .set(\u0026key, \u0026data)\r\n            .await\r\n            .map_err(|e| CheckpointError::AgentFS(e.to_string()))?;\r\n        Ok(())\r\n    }\r\n\r\n    /// 加载会话快照\r\n    async fn load_session_snapshot(\u0026self, checkpoint_id: \u0026str) -\u003e Result\u003cOption\u003cSession\u003e\u003e {\r\n        let key = self.session_snapshot_key(checkpoint_id);\r\n        match self.agent_fs.kv.get(\u0026key).await {\r\n            Ok(Some(data)) =\u003e Ok(Some(serde_json::from_slice(\u0026data)?)),\r\n            Ok(None) =\u003e Ok(None),\r\n            Err(e) =\u003e Err(CheckpointError::AgentFS(e.to_string())),\r\n        }\r\n    }\r\n\r\n    /// 删除会话快照\r\n    async fn delete_session_snapshot(\u0026self, checkpoint_id: \u0026str) -\u003e Result\u003c()\u003e {\r\n        let key = self.session_snapshot_key(checkpoint_id);\r\n        let _ = self.agent_fs.kv.delete(\u0026key).await;\r\n        Ok(())\r\n    }\r\n\r\n    /// 删除 checkpoint 元数据\r\n    async fn delete_checkpoint_metadata(\r\n        \u0026self,\r\n        checkpoint_id: \u0026str,\r\n        session_id: \u0026Uuid,\r\n    ) -\u003e Result\u003c()\u003e {\r\n        let key = self.checkpoint_metadata_key(session_id, checkpoint_id);\r\n        self.agent_fs\r\n            .kv\r\n            .delete(\u0026key)\r\n            .await\r\n            .map_err(|e| CheckpointError::AgentFS(e.to_string()))?;\r\n\r\n        // 从列表中移除\r\n        self.remove_checkpoint_from_list(session_id, checkpoint_id)\r\n            .await?;\r\n\r\n        Ok(())\r\n    }\r\n\r\n    /// 从列表中移除 checkpoint\r\n    async fn remove_checkpoint_from_list(\r\n        \u0026self,\r\n        session_id: \u0026Uuid,\r\n        checkpoint_id: \u0026str,\r\n    ) -\u003e Result\u003c()\u003e {\r\n        let list_key = self.checkpoint_list_key(session_id);\r\n\r\n        let data_opt = self\r\n            .agent_fs\r\n            .kv\r\n            .get(\u0026list_key)\r\n            .await\r\n            .map_err(|e| CheckpointError::AgentFS(e.to_string()))?;\r\n\r\n        if let Some(data) = data_opt {\r\n            let mut ids = serde_json::from_slice::\u003cVec\u003cString\u003e\u003e(\u0026data).unwrap_or_default();\r\n            ids.retain(|id| id != checkpoint_id);\r\n\r\n            let data = serde_json::to_vec(\u0026ids)?;\r\n            self.agent_fs\r\n                .kv\r\n                .set(\u0026list_key, \u0026data)\r\n                .await\r\n                .map_err(|e| CheckpointError::AgentFS(e.to_string()))?;\r\n        }\r\n\r\n        Ok(())\r\n    }\r\n\r\n    // ==================== Key 生成帮助方法 ====================\r\n\r\n    fn checkpoint_list_key(\u0026self, session_id: \u0026Uuid) -\u003e String {\r\n        format!(\"checkpoints/{}/list.json\", session_id)\r\n    }\r\n\r\n    fn checkpoint_metadata_key(\u0026self, session_id: \u0026Uuid, checkpoint_id: \u0026str) -\u003e String {\r\n        format!(\"checkpoints/{}/{}/metadata.json\", session_id, checkpoint_id)\r\n    }\r\n\r\n    fn file_snapshot_key(\u0026self, session_id: \u0026Uuid, checkpoint_id: \u0026str, file_path: \u0026str) -\u003e String {\r\n        // 需要对文件路径进行安全处理\r\n        let safe_path = file_path.replace(['/', '\\\\'], \"__\");\r\n        format!(\r\n            \"checkpoints/{}/{}/files/{}\",\r\n            session_id, checkpoint_id, safe_path\r\n        )\r\n    }\r\n\r\n    fn session_snapshot_key(\u0026self, checkpoint_id: \u0026str) -\u003e String {\r\n        format!(\"checkpoints/sessions/{}.json\", checkpoint_id)\r\n    }\r\n}\r\n\r\n#[cfg(test)]\r\nmod tests {\r\n    use super::*;\r\n    use crate::models::Session;\r\n    use agentfs::AgentFS;\r\n    use std::sync::Arc;\r\n    use tempfile::tempdir;\r\n    use tokio::fs;\r\n\r\n    // ==================== 测试辅助函数 ====================\r\n\r\n    async fn create_test_agent_fs() -\u003e (Arc\u003cAgentFS\u003e, tempfile::TempDir) {\r\n        let temp_dir = tempdir().unwrap();\r\n        let db_path = temp_dir.path().join(\"agentfs.db\");\r\n        let backend = agentsql::SqlBackend::sqlite(db_path.to_str().unwrap())\r\n            .await\r\n            .unwrap();\r\n        let agent_fs = AgentFS::new(Box::new(backend), \"test\", \"/test\")\r\n            .await\r\n            .unwrap();\r\n        (Arc::new(agent_fs), temp_dir)\r\n    }\r\n\r\n    fn create_test_session() -\u003e Session {\r\n        Session::new()\r\n    }\r\n\r\n    fn create_test_config(enabled: bool) -\u003e CheckpointConfig {\r\n        CheckpointConfig {\r\n            enabled,\r\n            checkpoint_directory: \"/test/checkpoints\".to_string(),\r\n        }\r\n    }\r\n\r\n    async fn create_test_file(\r\n        dir: \u0026std::path::Path,\r\n        name: \u0026str,\r\n        content: \u0026str,\r\n    ) -\u003e std::path::PathBuf {\r\n        let path = dir.join(name);\r\n        fs::write(\u0026path, content).await.unwrap();\r\n        path\r\n    }\r\n\r\n    // ==================== 基础功能测试 ====================\r\n\r\n    #[tokio::test]\r\n    async fn test_create_manager() {\r\n        let (agent_fs, _temp_dir) = create_test_agent_fs().await;\r\n        let config = create_test_config(true);\r\n        let manager = CheckpointManager::new(agent_fs.clone(), config.clone());\r\n\r\n        assert_eq!(manager.config().enabled, config.enabled);\r\n        assert_eq!(\r\n            manager.config().checkpoint_directory,\r\n            config.checkpoint_directory\r\n        );\r\n    }\r\n\r\n    #[tokio::test]\r\n    async fn test_create_simple_checkpoint() {\r\n        let (agent_fs, _temp_dir) = create_test_agent_fs().await;\r\n        let config = create_test_config(true);\r\n        let manager = CheckpointManager::new(agent_fs, config);\r\n        let session = create_test_session();\r\n\r\n        let checkpoint = manager\r\n            .create_checkpoint(\r\n                \u0026session,\r\n                Some(\"Test checkpoint\".to_string()),\r\n                CheckpointType::Manual,\r\n                None,\r\n            )\r\n            .await\r\n            .unwrap();\r\n\r\n        assert_eq!(checkpoint.session_id, session.id);\r\n        assert_eq!(checkpoint.checkpoint_type, CheckpointType::Manual);\r\n        assert_eq!(checkpoint.description, Some(\"Test checkpoint\".to_string()));\r\n        assert!(checkpoint.affected_files.is_empty());\r\n    }\r\n\r\n    #[tokio::test]\r\n    async fn test_create_checkpoint_with_files() {\r\n        let temp_dir = tempdir().unwrap();\r\n        let (agent_fs, _temp_dir) = create_test_agent_fs().await;\r\n        let config = create_test_config(true);\r\n        let manager = CheckpointManager::new(agent_fs, config);\r\n        let session = create_test_session();\r\n\r\n        let test_file = create_test_file(temp_dir.path(), \"test.txt\", \"Hello, World!\").await;\r\n\r\n        let checkpoint = manager\r\n            .create_checkpoint(\r\n                \u0026session,\r\n                None,\r\n                CheckpointType::Auto,\r\n                Some(vec![test_file.to_string_lossy().to_string()]),\r\n            )\r\n            .await\r\n            .unwrap();\r\n\r\n        assert_eq!(checkpoint.affected_files.len(), 1);\r\n        assert_eq!(\r\n            checkpoint.affected_files[0].path,\r\n            test_file.to_string_lossy().to_string()\r\n        );\r\n        assert_eq!(checkpoint.affected_files[0].size, 13);\r\n    }\r\n\r\n    #[tokio::test]\r\n    async fn test_list_checkpoints() {\r\n        let (agent_fs, _temp_dir) = create_test_agent_fs().await;\r\n        let config = create_test_config(true);\r\n        let manager = CheckpointManager::new(agent_fs, config);\r\n        let session = create_test_session();\r\n\r\n        manager\r\n            .create_checkpoint(\r\n                \u0026session,\r\n                Some(\"CP1\".to_string()),\r\n                CheckpointType::Manual,\r\n                None,\r\n            )\r\n            .await\r\n            .unwrap();\r\n        manager\r\n            .create_checkpoint(\r\n                \u0026session,\r\n                Some(\"CP2\".to_string()),\r\n                CheckpointType::Manual,\r\n                None,\r\n            )\r\n            .await\r\n            .unwrap();\r\n\r\n        let response = manager.list_checkpoints(\u0026session.id).await.unwrap();\r\n        assert_eq!(response.total_count, 2);\r\n        assert_eq!(response.checkpoints.len(), 2);\r\n    }\r\n\r\n    #[tokio::test]\r\n    async fn test_get_checkpoint() {\r\n        let (agent_fs, _temp_dir) = create_test_agent_fs().await;\r\n        let config = create_test_config(true);\r\n        let manager = CheckpointManager::new(agent_fs, config);\r\n        let session = create_test_session();\r\n\r\n        let created = manager\r\n            .create_checkpoint(\r\n                \u0026session,\r\n                Some(\"Get test\".to_string()),\r\n                CheckpointType::Manual,\r\n                None,\r\n            )\r\n            .await\r\n            .unwrap();\r\n\r\n        let retrieved = manager.get_checkpoint(\u0026created.id).await.unwrap();\r\n        assert_eq!(retrieved.id, created.id);\r\n        assert_eq!(retrieved.description, Some(\"Get test\".to_string()));\r\n    }\r\n\r\n    #[tokio::test]\r\n    async fn test_delete_checkpoint() {\r\n        let (agent_fs, _temp_dir) = create_test_agent_fs().await;\r\n        let config = create_test_config(true);\r\n        let manager = CheckpointManager::new(agent_fs, config);\r\n        let session = create_test_session();\r\n\r\n        let checkpoint = manager\r\n            .create_checkpoint(\u0026session, None, CheckpointType::Manual, None)\r\n            .await\r\n            .unwrap();\r\n\r\n        manager.delete_checkpoint(\u0026checkpoint.id).await.unwrap();\r\n\r\n        let result = manager.get_checkpoint(\u0026checkpoint.id).await;\r\n        assert!(result.is_err());\r\n    }\r\n\r\n    #[tokio::test]\r\n    async fn test_delete_all_checkpoints_for_session() {\r\n        let (agent_fs, _temp_dir) = create_test_agent_fs().await;\r\n        let config = create_test_config(true);\r\n        let manager = CheckpointManager::new(agent_fs, config);\r\n        let session = create_test_session();\r\n\r\n        manager\r\n            .create_checkpoint(\u0026session, None, CheckpointType::Manual, None)\r\n            .await\r\n            .unwrap();\r\n        manager\r\n            .create_checkpoint(\u0026session, None, CheckpointType::Manual, None)\r\n            .await\r\n            .unwrap();\r\n\r\n        let deleted_count = manager\r\n            .delete_all_checkpoints_for_session(\u0026session.id)\r\n            .await\r\n            .unwrap();\r\n        assert_eq!(deleted_                Err(e) =\u003e {\r\n                        warn!(\"Invalid encryption key in environment variable: {}\", e);\r\n                    }\r\n                }\r\n            } else {\r\n                // 没有加密密钥，发出警告\r\n                warn!(\r\n                    \"API Key is stored in plaintext. For better security, set MINECLAW_ENCRYPTION_KEY environment variable and encrypt your API Key.\"\r\n                );\r\n            }\r\n        }\r\n\r\n        Ok(config)\r\n    }\r\n\r\n    /// 更新配置文件，将 API Key 替换为加密版本\r\n    fn update_config_with_encrypted_key(\r\n        config_path: \u0026PathBuf,\r\n        encrypted_key: \u0026str,\r\n    ) -\u003e crate::error::Result\u003c()\u003e {\r\n        use toml_edit::{DocumentMut, value};\r\n\r\n        let content = fs::read_to_string(config_path).map_err(|e| {\r\n            crate::error::Error::Config(config::ConfigError::Message(format!(\r\n                \"Failed to read config file: {}\",\r\n                e\r\n            )))\r\n        })?;\r\n\r\n        let mut doc = content.parse::\u003cDocumentMut\u003e().map_err(|e| {\r\n            crate::error::Error::Config(config::ConfigError::Message(format!(\r\n                \"Failed to parse config file: {}\",\r\n                e\r\n            )))\r\n        })?;\r\n\r\n        // 更新 llm.api_key\r\n        if let Some(llm) = doc.get_mut(\"llm\").and_then(|t| t.as_table_mut()) {\r\n            llm[\"api_key\"] = value(format!(\"encrypted:{}\", encrypted_key));\r\n        } else {\r\n            return Err(crate::error::Error::Config(config::ConfigError::Message(\r\n                \"Config file missing [llm] section\".to_string(),\r\n            )));\r\n        }\r\n\r\n        // 写回文件\r\n        fs::write(config_path, doc.to_string()).map_err(|e| {\r\n            crate::error::Error::Config(config::ConfigError::Message(format!(\r\n                \"Failed to write config file: {}\",\r\n                e\r\n            )))\r\n        })?;\r\n\r\n        Ok(())\r\n    }\r\n\r\n    fn get_config_path() -\u003e crate::error::Result\u003cPathBuf\u003e {\r\n        Ok(PathBuf::from(\"config/mineclaw.toml\"))\r\n    }\r\n}\r\n\r\n#[cfg(test)]\r\nmod tests {\r\n    use super::*;\r\n\r\n    #[test]\r\n    fn test_default_config() {\r\n        let config = Config::default();\r\n\r\n        assert_eq!(config.server.host, \"127.0.0.1\");\r\n        assert_eq!(config.server.port, 18789);\r\n        assert_eq!(config.llm.provider, \"openai\");\r\n        assert!(config.mcp.is_none());\r\n    }\r\n\r\n    #[test]\r\n    fn test_mcp_config_deserialization() {\r\n        let toml_content = r#\"\r\n[server]\r\nhost = \"127.0.0.1\"\r\nport = 18789\r\n\r\n[llm]\r\nprovider = \"openai\"\r\napi_key = \"test-key\"\r\nbase_url = \"https://api.openai.com/v1\"\r\nmodel = \"gpt-4o\"\r\nmax_tokens = 2048\r\ntemperature = 0.7\r\n\r\n[mcp]\r\nenabled = true\r\n\r\n[[mcp.servers]]\r\nname = \"filesystem\"\r\ncommand = \"npx\"\r\nargs = [\"-y\", \"@modelcontextprotocol/server-filesystem\", \"/test\"]\r\nenv = { \"TEST_ENV\" = \"value\" }\r\n\"#;\r\n\r\n        let config: Config = toml::from_str(toml_content).unwrap();\r\n\r\n        assert!(config.mcp.is_some());\r\n        let mcp = config.mcp.unwrap();\r\n        assert!(mcp.enabled);\r\n        assert_eq!(mcp.servers.len(), 1);\r\n\r\n        let server = \u0026mcp.servers[0];\r\n        assert_eq!(server.name, \"filesystem\");\r\n        assert_eq!(server.command, \"npx\");\r\n        assert_eq!(\r\n            server.args,\r\n            vec![\"-y\", \"@modelcontextprotocol/server-filesystem\", \"/test\"]\r\n        );\r\n        assert_eq!(server.env.get(\"TEST_ENV\"), Some(\u0026\"value\".to_string()));\r\n    }\r\n\r\n    #[test]\r\n    fn test_mcp_config_without_servers() {\r\n        let toml_content = r#\"\r\n[server]\r\nhost = \"127.0.0.1\"\r\nport = 18789\r\n\r\n[llm]\r\nprovider = \"openai\"\r\napi_key = \"test-key\"\r\nbase_url = \"https://api.openai.com/v1\"\r\nmodel = \"gpt-4o\"\r\nmax_tokens = 2048\r\ntemperature = 0.7\r\n\r\n[mcp]\r\nenabled = false\r\n\"#;\r\n\r\n        let config: Config = toml::from_str(toml_content).unwrap();\r\n\r\n        assert!(config.mcp.is_some());\r\n        let mcp = config.mcp.unwrap();\r\n        assert!(!mcp.enabled);\r\n        assert!(mcp.servers.is_empty());\r\n    }\r\n\r\n    #[test]\r\n    fn test_mcp_config_without_env_and_args() {\r\n        let toml_content = r#\"\r\n[server]\r\nhost = \"127.0.0.1\"\r\nport = 18789\r\n\r\n[llm]\r\nprovider = \"openai\"\r\napi_key = \"test-key\"\r\nbase_url = \"https://api.openai.com/v1\"\r\nmodel = \"gpt-4o\"\r\nmax_tokens = 2048\r\ntemperature = 0.7\r\n\r\n[mcp]\r\nenabled = true\r\n\r\n[[mcp.servers]]\r\nname = \"simple\"\r\ncommand = \"echo\"\r\n\"#;\r\n\r\n        let config: Config = toml::from_str(toml_content).unwrap();\r\n\r\n        let mcp = config.mcp.unwrap();\r\n        let server = \u0026mcp.servers[0];\r\n        assert!(server.args.is_empty());\r\n        assert!(server.env.is_empty());\r\n    }\r\n}\r\n","traces":[{"line":19,"address":[],"length":0,"stats":{"Line":7133701809754865664}},{"line":20,"address":[],"length":0,"stats":{"Line":7133701809754865664}},{"line":23,"address":[],"length":0,"stats":{"Line":7133701809754865664}},{"line":24,"address":[],"length":0,"stats":{"Line":14267403619509731328}},{"line":28,"address":[],"length":0,"stats":{"Line":7133701809754865664}},{"line":30,"address":[],"length":0,"stats":{"Line":7133701809754865664}},{"line":31,"address":[],"length":0,"stats":{"Line":7133701809754865664}},{"line":53,"address":[],"length":0,"stats":{"Line":6557241057451442176}},{"line":54,"address":[],"length":0,"stats":{"Line":13114482114902884352}},{"line":103,"address":[],"length":0,"stats":{"Line":7133701809754865664}},{"line":104,"address":[],"length":0,"stats":{"Line":7133701809754865664}},{"line":108,"address":[],"length":0,"stats":{"Line":7133701809754865664}},{"line":110,"address":[],"length":0,"stats":{"Line":7133701809 \n        }\n\n        let key = Key::\u003cAes256Gcm\u003e::from_slice(\u0026key_bytes);\n        let manager = Ok(Self { key: ZeroizingKey(*key) });\n        \n        // Zeroize intermediate buffer\n        key_bytes.zeroize();\n        \n        manager\n    }\n\n    /// 生成一个新的随机密钥（Base64 编码）\n    pub fn generate_key() -\u003e String {\n        let key = Aes256Gcm::generate_key(OsRng);\n        general_purpose::STANDARD.encode(key)\n    }\n\n    /// 加密明文数据\n    /// 返回格式: nonce(12 bytes) + ciphertext + tag(16 bytes) 的 Base64 编码\n    /// 注意：aes-gcm crate 的 encrypt 方法返回的 ciphertext 已经包含了 tag\n    pub fn encrypt(\u0026self, plaintext: \u0026str) -\u003e Result\u003cString\u003e {\n        let cipher = Aes256Gcm::new(\u0026self.key.0);\n        let nonce = Aes256Gcm::generate_nonce(\u0026mut OsRng); // 96-bits; unique per message\n        \n        let ciphertext_with_tag = cipher\n            .encrypt(\u0026nonce, plaintext.as_bytes())\n            .map_err(|e| anyhow!(\"Encryption failed: {}\", e))?;\n            \n        // 组合 nonce 和密文(含tag)\n        let mut combined = nonce.to_vec();\n        combined.extend_from_slice(\u0026ciphertext_with_tag);\n        \n        Ok(general_purpose::STANDARD.encode(combined))\n    }\n\n    /// 解密密文数据（Base64 编码的 nonce + ciphertext + tag）\n    /// \n    /// # Security\n    /// - 验证 GCM Tag（由 aes-gcm crate 内部处理）\n    /// - 检查 Nonce 长度\n    pub fn decrypt(\u0026self, ciphertext_base64: \u0026str) -\u003e Result\u003cString\u003e {\n        let combined = general_purpose::STANDARD\n            .decode(ciphertext_base64)\n            .context(\"Invalid base64 ciphertext\")?;\n            \n        // 12 bytes nonce + min 16 bytes tag = 28 bytes\n        if combined.len() \u003c 28 {\n            return Err(anyhow!(\"Ciphertext too short (min 28 bytes required for Nonce+Tag)\"));\n        }\n        \n        let (nonce_bytes, ciphertext_with_tag) = combined.split_at(12);\n        let nonce = Nonce::from_slice(nonce_bytes);\n ss":[],"length":0,"stats":{"Line":0}},{"line":113,"address":[],"length":0,"stats":{"Line":0}},{"line":116,"address":[],"length":0,"stats":{"Line":0}},{"line":117,"address":[],"length":0,"stats":{"Line":0}},{"line":118,"address":[],"length":0,"stats":{"Line":0}},{"line":119,"address":[],"length":0,"stats":{"Line":0}},{"line":120,"address":[],"length":0,"stats":{"Line":0}},{"line":121,"address":[],"length":0,"stats":{"Line":0}},{"line":122,"address":[],"length":0,"stats":{"Line":0}},{"line":123,"address":[],"length":0,"stats":{"Line":0}},{"line":124,"address":[],"length":0,"stats":{"Line":0}},{"line":126,"address":[],"length":0,"stats":{"Line":0}},{"line":128,"address":[],"length":0,"stats":{"Line":0}},{"line":129,"address":[],"length":0,"stats":{"Line":0}},{"line":131,"address":[],"length":0,"stats":{"Line":0}},{"line":132,"address":[],"length":0,"stats":{"Line":0}},{"line":134,"address":[],"length":0,"stats":{"Line":0}},{"line":136,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":68},{"path":["D:","\\","mineclaw","src","mcp","client.rs"],"content":"//! MCP 客户端\r\n//!\r\n//! 实现 MCP 协议的客户端，负责与 MCP 服务器通信。\r\n\r\nuse crate::error::{Error, Result};\r\nuse crate::mcp::protocol::*;\r\nuse crate::mcp::transport::Transport;\r\nuse serde::de::DeserializeOwned;\r\nuse std::collections::HashMap;\r\nuse tokio::sync::oneshot;\r\nuse tracing::{debug, error, info, warn};\r\n\r\n// ==================== McpClient ====================\r\n\r\n/// MCP 客户端，管理与 MCP 服务器的会话\r\npub struct McpClient {\r\n    transport: Box\u003cdyn Transport\u003e,\r\n    pending_requests: HashMap\u003cRequestId, oneshot::Sender\u003cJsonRpcResponse\u003e\u003e,\r\n    next_id: u64,\r\n}\r\n\r\nimpl McpClient {\r\n    /// 创建一个新的 MCP 客户端\r\n    pub fn new(transport: Box\u003cdyn Transport\u003e) -\u003e Self {\r\n        Self {\r\n            transport,\r\n            pending_requests: HashMap::new(),\r\n            next_id: 1,\r\n        }\r\n    }\r\n\r\n    /// 生成下一个请求 ID\r\n    fn next_request_id(\u0026mut self) -\u003e RequestId {\r\n        let id = self.next_id;\r\n        self.next_id += 1;\r\n        RequestId::Number(id)\r\n    }\r\n\r\n    /// 发送请求并等待响应（简化版，不使用 select!）\r\n    async fn send_request\u003cR: DeserializeOwned\u003e(\r\n        \u0026mut self,\r\n        method: \u0026str,\r\n        params: Option\u003cserde_json::Value\u003e,\r\n    ) -\u003e Result\u003cR\u003e {\r\n        let request_id = self.next_request_id();\r\n        debug!(method, ?request_id, \"Sending MCP request\");\r\n\r\n        let request = JsonRpcRequest::new(request_id.clone(), method.to_string(), params);\r\n        let request_json = serde_json::to_string(\u0026request).map_err(|e| {\r\n            error!(error = %e, \"Failed to serialize request\");\r\n            Error::Mcp(format!(\"Serialization failed: {}\", e))\r\n        })?;\r\n\r\n        let (tx, rx) = oneshot::channel();\r\n        self.pending_requests.insert(request_id.clone(), tx);\r\n\r\n        self.transport.send(\u0026request_json).await?;\r\n\r\n        // 简单的接收循环：等待响应\r\n        loop {\r\n            let message = self.transport.receive().await?;\r\n            debug!(message, \"Received message from server\");\r\n\r\n            // 尝试解析为响应\r\n            if let Ok(response) = serde_json::from_str::\u003cJsonRpcResponse\u003e(\u0026message) {\r\n                if response.id == request_id {\r\n                    if let Some(sender) = self.pending_requests.remove(\u0026response.id) {\r\n                        debug!(?response.id, \"Matched response to pending request\");\r\n                        let _ = sender.send(response);\r\n                        break;\r\n                    }\r\n                } else if let Some(sender) = self.pending_requests.remove(\u0026response.id) {\r\n                    warn!(?response.id, \"Received response for different request ID\");\r\n                    let _ = sender.send(response);\r\n                } else {\r\n                    warn!(?response.id, \"Received response for unknown request ID\");\r\n                }\r\n                continue;\r\n            }\r\n\r\n            // 尝试解析为通知\r\n            if let Ok(notification) = serde_json::from_str::\u003cJsonRpcNotification\u003e(\u0026message) {\r\n                self.handle_notification(notification).await;\r\n                continue;\r\n            }\r\n\r\n            warn!(message, \"Received unrecognized message\");\r\n        }\r\n\r\n        match rx.await {\r\n            Ok(json_rpc_response) =\u003e {\r\n                if let Some(error) = json_rpc_response.error {\r\n                    error!(code = error.code, message = %error.message, \"MCP request failed\");\r\n                    return Err(Error::Mcp(format!(\r\n                        \"MCP error: {} ({})\",\r\n                        error.message, error.code\r\n                    )));\r\n                }\r\n\r\n                let result = json_rpc_response\r\n                    .result\r\n                    .ok_or_else(|| Error::Mcp(\"No result in response\".to_string()))?;\r\n\r\n                let deserialized = serde_json::from_value(result).map_err(|e| {\r\n                    error!(error = %e, \"Failed to deserialize response\");\r\n                    Error::Mcp(format!(\"Deserialization failed: {}\", e))\r\n                })?;\r\n\r\n                Ok(deserialized)\r\n            }\r\n            Err(_) =\u003e {\r\n                error!(\"Request channel closed\");\r\n                Err(Error::Mcp(\"Request cancelled\".to_string()))\r\n            }\r\n        }\r\n    }\r\n\r\n    /// 处理服务器发送的通知\r\n    async fn handle_notification(\u0026mut self, notification: JsonRpcNotification) {\r\n        debug!(method = %notification.method, \"Handling notification\");\r\n        // 目前不处理任何通知，预留接口\r\n    }\r\n\r\n    /// 发送通知（不需要响应）\r\n    async fn send_notification(\r\n        \u0026mut self,\r\n        method: \u0026str,\r\n        params: Option\u003cserde_json::Value\u003e,\r\n    ) -\u003e Result\u003c()\u003e {\r\n        debug!(method, \"Sending MCP notification\");\r\n\r\n        let notification = JsonRpcNotification::new(method.to_string(), params);\r\n        let notification_json = serde_json::to_string(\u0026notification).map_err(|e| {\r\n            error!(error = %e, \"Failed to serialize notification\");\r\n            Error::Mcp(format!(\"Serialization failed: {}\", e))\r\n        })?;\r\n\r\n        self.transport.send(\u0026notification_json).await\r\n    }\r\n\r\n    // ==================== 公共 MCP 方法 ====================\r\n\r\n    /// 初始化 MCP 会话\r\n    pub async fn initialize(\u0026mut self) -\u003e Result\u003cInitializeResponse\u003e {\r\n        info!(\"Initializing MCP session\");\r\n\r\n        let request = InitializeRequest::new(\"mineclaw\", \"0.1.0\");\r\n        let params = serde_json::to_value(request)\r\n            .map_err(|e| Error::Mcp(format!(\"Failed to serialize initialize request: {}\", e)))?;\r\n\r\n        let response: InitializeResponse = self.send_request(\"initialize\", Some(params)).await?;\r\n\r\n        info!(\r\n            server_name = %response.server_info.name,\r\n            server_version = %response.server_info.version,\r\n            \"MCP session initialized\"\r\n        );\r\n\r\n        // 发送 initialized 通知\r\n        self.send_notification(\"initialized\", None).await?;\r\n\r\n        Ok(response)\r\n    }\r\n\r\n    /// 获取工具列表\r\n    pub async fn list_tools(\u0026mut self) -\u003e Result\u003cListToolsResponse\u003e {\r\n        debug!(\"Listing tools\");\r\n\r\n        let request = ListToolsRequest::new();\r\n        let params = serde_json::to_value(request)\r\n            .map_err(|e| Error::Mcp(format!(\"Failed to serialize list_tools request: {}\", e)))?;\r\n\r\n        let response: ListToolsResponse = self.send_request(\"tools/list\", Some(params)).await?;\r\n\r\n        debug!(tool_count = response.tools.len(), \"Received tools list\");\r\n\r\n        Ok(response)\r\n    }\r\n\r\n    /// 调用工具\r\n    pub async fn call_tool(\r\n        \u0026mut self,\r\n        name: String,\r\n        arguments: serde_json::Value,\r\n    ) -\u003e Result\u003cCallToolResponse\u003e {\r\n        debug!(tool_name = %name, \"Calling tool\");\r\n\r\n        let request = CallToolRequest { name, arguments };\r\n        let params = serde_json::to_value(request)\r\n            .map_err(|e| Error::Mcp(format!(\"Failed to serialize call_tool request: {}\", e)))?;\r\n\r\n        let response: CallToolResponse = self.send_request(\"tools/call\", Some(params)).await?;\r\n\r\n        debug!(is_error = response.is_error, \"Tool call completed\");\r\n\r\n        Ok(response)\r\n    }\r\n\r\n    /// 关闭连接\r\n    pub async fn close(\u0026mut self) -\u003e Result\u003c()\u003e {\r\n        info!(\"Closing MCP client\");\r\n        self.transport.close().await\r\n    }\r\n}\r\n\r\nimpl Drop for McpClient {\r\n    fn drop(\u0026mut self) {\r\n        // 取消所有待处理的请求\r\n        for (_, sender) in self.pending_requests.drain() {\r\n            let _ = sender.send(JsonRpcResponse::error(\r\n                RequestId::Number(0),\r\n                -32603,\r\n                \"Client dropped\".to_string(),\r\n                None,\r\n            ));\r\n        }\r\n    }\r\n}\r\n\r\n#[cfg(test)]\r\nmod tests {\r\n    use super::*;\r\n    use crate::mcp::transport::mock::MockTransport;\r\n    use serde_json::json;\r\n\r\n    #[tokio::test]\r\n    async fn test_initialize() {\r\n        let transport = MockTransport::new();\r\n\r\n        // 设置初始化响应\r\n        let initialize_response = json!({\r\n            \"jsonrpc\": \"2.0\",\r\n            \"id\": 1,\r\n            \"result\": {\r\n                \"protocolVersion\": \"2024-11-05\",\r\n                \"capabilities\": {\r\n                    \"tools\": {}\r\n                },\r\n                \"serverInfo\": {\r\n                    \"name\": \"test-server\",\r\n                    \"version\": \"1.0.0\"\r\n                }\r\n            }\r\n        });\r\n        transport\r\n            .responses_to_receive\r\n            .lock()\r\n            .await\r\n            .push_back(initialize_response.to_string());\r\n\r\n        // initialized 通知会被发送，但不需要响应\r\n        let mut client = McpClient::new(Box::new(transport));\r\n\r\n        let result = client.initialize().await;\r\n        assert!(result.is_ok());\r\n\r\n        let response = result.unwrap();\r\n        assert_eq!(response.server_info.name, \"test-server\");\r\n        assert_eq!(response.server_info.version, \"1.0.0\");\r\n    }\r\n\r\n    #[tokio::test]\r\n    async fn test_list_tools() {\r\n        let transport = MockTransport::new();\r\n\r\n        // 设置初始化响应\r\n        let initialize_response = json!({\r\n            \"jsonrpc\": \"2.0\",\r\n            \"id\": 1,\r\n            \"result\": {\r\n                \"protocolVersion\": \"2024-11-05\",\r\n                \"capabilities\": {\r\n                    \"tools\": {}\r\n                },\r\n                \"serverInfo\": {\r\n                    \"name\": \"test-server\",\r\n                    \"version\": \"1.0.0\"\r\n                }\r\n            }\r\n        });\r\n        transport\r\n            .responses_to_receive\r\n            .lock()\r\n            .await\r\n            .push_back(initialize_response.to_string());\r\n\r\n        // 设置 list_tools 响应\r\n        let list_tools_response = json!({\r\n            \"jsonrpc\": \"2.0\",\r\n            \"id\": 2,\r\n            \"result\": {\r\n                \"tools\": [\r\n                    {\r\n                        \"name\": \"echo\",\r\n                        \"description\": \"Echo back the input\",\r\n                        \"inputSchema\": {\r\n                            \"type\": \"object\",\r\n                            \"properties\": {\r\n                                \"message\": { \"type\": \"string\" }\r\n                            },\r\n                            \"required\": [\"message\"]\r\n                        }\r\n                    }\r\n                ]\r\n            }\r\n        });\r\n        transport\r\n            .responses_to_receive\r\n            .lock()\r\n            .await\r\n            .push_back(list_tools_response.to_string());\r\n\r\n        let mut client = McpClient::new(Box::new(transport));\r\n\r\n        // 先初始化\r\n        client.initialize().await.unwrap();\r\n\r\n        // 列出工具\r\n        let result = client.list_tools().await;\r\n        assert!(result.is_ok());\r\n\r\n        let response = result.unwrap();\r\n        assert_eq!(response.tools.len(), 1);\r\n        assert_eq!(response.tools[0].name, \"echo\");\r\n    }\r\n\r\n    #[tokio::test]\r\n    async fn test_error_response() {\r\n        let transport = MockTransport::new();\r\n\r\n        // 设置错误响应\r\n        let error_response = json!({\r\n            \"jsonrpc\": \"2.0\",\r\n            \"id\": 1,\r\n            \"error\": {\r\n                \"code\": -32601,\r\n                \"message\": \"Method not found\"\r\n            }\r\n        });\r\n        transport\r\n            .responses_to_receive\r\n            .lock()\r\n            .await\r\n            .push_back(error_response.to_string());\r\n\r\n        let mut client = McpClient::new(Box::new(transport));\r\n\r\n        // 直接发送请求 - 因为我们修改了 send_request，需要用公共方法\r\n        // 这里我们用 initialize 来测试错误路径\r\n        let result = client.initialize().await;\r\n        assert!(result.is_err());\r\n        assert!(result.unwrap_err().to_string().contains(\"Method not found\"));\r\n    }\r\n\r\n    #[tokio::test]\r\n    async fn test_call_tool() {\r\n        let transport = MockTransport::new();\r\n\r\n        // 设置初始化响应\r\n        let initialize_response = json!({\r\n            \"jsonrpc\": \"2.0\",\r\n            \"id\": 1,\r\n            \"result\": {\r\n                \"protocolVersion\": \"2024-11-05\",\r\n                \"capabilities\": {\r\n                    \"tools\": {}\r\n                },\r\n                \"serverInfo\": {\r\n                    \"name\": \"test-server\",\r\n                    \"version\": \"1.0.0\"\r\n                }\r\n            }\r\n        });\r\n        transport\r\n            .responses_to_receive\r\n            .lock()\r\n            .await\r\n            .push_back(initialize_response.to_string());\r\n\r\n        // 设置 call_tool 响应\r\n        let call_tool_response = json!({\r\n            \"jsonrpc\": \"2.0\",\r\n            \"id\": 2,\r\n            \"result\": {\r\n                \"content\": [\r\n                    {\r\n                        \"type\": \"text\",\r\n                        \"text\": \"Hello, test!\"\r\n                    }\r\n                ],\r\n                \"isError\": false\r\n            }\r\n        });\r\n        transport\r\n            .responses_to_receive\r\n            .lock()\r\n            .await\r\n            .push_back(call_tool_response.to_string());\r\n\r\n        let mut client = McpClient::new(Box::new(transport));\r\n\r\n        // 先初始化\r\n        client.initialize().await.unwrap();\r\n\r\n        // 调用工具\r\n        let result = client\r\n            .call_tool(\"echo\".to_string(), json!({\"message\": \"test\"}))\r\n            .await;\r\n        assert!(result.is_ok());\r\n\r\n        let response = result.unwrap();\r\n        assert_eq!(response.content.len(), 1);\r\n        assert!(!response.is_error);\r\n    }\r\n\r\n    #[tokio::test]\r\n    async fn test_call_tool_error() {\r\n        let transport = MockTransport::new();\r\n\r\n        // 设置初始化响应\r\n        let initialize_response = json!({\r\n            \"jsonrpc\": \"2.0\",\r\n            \"id\": 1,\r\n            \"result\": {\r\n                \"protocolVersion\": \"2024-11-05\",\r\n                \"capabilities\": {\r\n                    \"tools\": {}\r\n                },\r\n                \"serverInfo\": {\r\n                    \"name\": \"test-server\",\r\n                    \"version\": \"1.0.0\"\r\n                }\r\n            }\r\n        });\r\n        transport\r\n            .responses_to_receive\r\n            .lock()\r\n            .await\r\n            .push_back(initialize_response.to_string());\r\n\r\n        // 设置错误响应\r\n        let error_response = json!({\r\n            \"jsonrpc\": \"2.0\",\r\n            \"id\": 2,\r\n            \"error\": {\r\n                \"code\": -32602,\r\n                \"message\": \"Invalid params\"\r\n            }\r\n        });\r\n        transport\r\n            .responses_to_receive\r\n            .lock()\r\n            .await\r\n            .push_back(error_response.to_string());\r\n\r\n        let mut client = McpClient::new(Box::new(transport));\r\n\r\n        // 先初始化\r\n        client.initialize().await.unwrap();\r\n\r\n        // 调用工具，应该返回错误\r\n        let result = client.call_tool(\"echo\".to_string(), json!({})).await;\r\n        assert!(result.is_err());\r\n        assert!(result.unwrap_err().to_string().contains(\"Invalid params\"));\r\n    }\r\n}\r\n","traces":[{"line":24,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":27,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":33,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":34,"address":[],"length":0,"stats":{"Line":1152921504606846976}},{"line":35,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":36,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":40,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":45,"address":[],"length":0,"stats":{"Line":1729382256910270464}},{"line":46,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":48,"address":[],"length":0,"stats":{"Line":4035225266123964416}},{"line":49,"address":[],"length":0,"stats":{"Line":2305843009213693952}},{"line":50,"address":[],"length":0,"stats":{"Line":0}},{"line":51,"address":[],"length":0,"stats":{"Lin derive(Clone)]\r\npub struct ToolExecutor {\r\n    /// 默认超时时间（毫秒）\r\n    default_timeout: Duration,\r\n}\r\n\r\nimpl ToolExecutor {\r\n    /// 创建一个新的工具执行器\r\n    pub fn new() -\u003e Self {\r\n        Self {\r\n            default_timeout: Duration::from_secs(30),\r\n        }\r\n    }\r\n\r\n    /// 设置默认超时时间\r\n    pub fn with_timeout(mut self, timeout: Duration) -\u003e Self {\r\n        self.default_timeout = timeout;\r\n        self\r\n    }\r\n\r\n    /// 执行工具调用\r\n    pub async fn execute(\r\n        \u0026self,\r\n        server_manager: \u0026mut McpServerManager,\r\n        tool_name: \u0026str,\r\n        arguments: Value,\r\n    ) -\u003e Result\u003cExecutionResult\u003e {\r\n        info!(tool_name = %tool_name, \"Executing tool\");\r\n\r\n        // 查找工具所在的服务器 - 先 clone 出来以避免借用问题\r\n        let server_name = server_manager\r\n            .find_tool_server(tool_name)\r\n            .map(|s| s.to_string())\r\n            .ok_or_else(|| {\r\n                error!(tool_name = %tool_name, \"Tool not found\");\r\n                Error::McpToolNotFound(tool_name.to_string())\r\n            })?;\r\n\r\n        debug!(server_name = %server_name, tool_name = %tool_name, \"Found tool server\");\r\n\r\n        // 执行工具调用（带超时）\r\n        let response = tokio::time::timeout(\r\n            self.default_timeout,\r\n            self.execute_without_timeout(server_manager, \u0026server_name, tool_name, arguments),\r\n        )\r\n        .await\r\n        .map_err(|_| {\r\n            error!(tool_name = %tool_name, \"Tool execution timed out\");\r\n            Error::McpToolExecution {\r\n                tool: tool_name.to_string(),\r\n                message: \"Execution timed out\".to_string(),\r\n            }\r\n        })??;\r\n\r\n        Ok(response)\r\n    }\r\n\r\n    /// 执行工具调用（不带超时）\r\n    async fn execute_without_timeout(\r\n        \u0026self,\r\n        server_manager: \u0026mut McpServerManager,\r\n        server_name: \u0026str,\r\n        tool_name: \u0026str,\r\n        arguments: Value,\r\n    ) -\u003e Result\u003cExecutionResult\u003e {\r\n        let response = server_manager\r\n            .call_tool(server_name, tool_name, arguments)\r\n            .await?;\r\n\r\n        // 转换为执行结果\r\n        let result = ExecutionResult::from_response(response, tool_name.to_string());\r\n\r\n        if result.is_error {\r\n            error!(tool_name = %tool_name, \"Tool execution returned error\");\r\n        } else {\r\n            debug!(tool_name = %tool_name, \"Tool execution succeeded\");\r\n        }\r\n\r\n        Ok(result)\r\n    }\r\n}\r\n\r\nimpl Default for ToolExecutor {\r\n    fn default() -\u003e Self {\r\n        Self::new()\r\n    }\r\n}\r\n\r\n// ==================== ExecutionResult ====================\r\n\r\n/// 工具执行结果\r\n#[derive(Debug, Clone)]\r\npub struct ExecutionResult {\r\n    /// 工具名称\r\n    pub tool_name: String,\r\n    /// 是否为错误\r\n    pub is_error: bool,\r\n    /// 文本内容（合并所有 text 类型的内容）\r\n    pub text_content: String,\r\n    /// 原始响应内容\r\n    pub raw_content: Vec\u003cToolResultContent\u003e,\r\n}\r\n\r\nimpl ExecutionResult {\r\n    /// 从响应创建执行结果\r\n    pub fn from_response(response: CallToolResponse, tool_name: String) -\u003e Self {\r\n        let mut text_content = String::new();\r\n\r\n        for content in \u0026response.content {\r\n            if let ToolResultContent::Text { text } = content {\r\n                if !text_content.is_empty() {\r\n                    text_content.push('\\n');\r\n                }\r\n                text_content.push_str(text);\r\n            }\r\n        }\r\n\r\n        Self {\r\n            tool_name,\r\n            is_error: response.is_error,\r\n            text_content,\r\n            raw_content: response.content,\r\n        }\r\n    }\r\n\r\n    /// 获取错误消息（如果是错误）\r\n    pub fn error_message(\u0026self) -\u003e Option\u003c\u0026str\u003e {\r\n        if self.is_error {\r\n            Some(\u0026self.text_content)\r\n        } else {\r\n            None\r\n        }\r\n    }\r\n}\r\n\r\n#[cfg(test)]\r\nmod tests {\r\n    use super::*;\r\n    use crate::mcp::protocol::CallToolResponse;\r\n\r\n    #[test]\r\n    fn test_executor_new() {\r\n        let executor = ToolExecutor::new();\r\n        assert_eq!(executor.default_timeout, Duration::from_secs(30));\r\n    }\r\n\r\n    #[test]\r\n    fn test_executor_with_timeout() {\r\n        let executor = ToolExecutor::new().with_timeout(Duration::from_secs(60));\r\n        assert_eq!(executor.default_timeout, Duration::from_secs(60));\r\n    }\r\n\r\n    #[test]\r\n    fn test_execution_result_from_response_success() {\r\n        let response = CallToolResponse {\r\n            content: vec![ToolResultContent::Text {\r\n                text: \"Hello, world!\".to_string(),\r\n            }],\r\n            is_error: false,\r\n        };\r\n\r\n        let result = ExecutionResult::from_response(response, \"echo\".to_string());\r\n\r\n        assert_eq!(result.tool_name, \"echo\");\r\n        assert!(!result.is_error);\r\n        assert_eq!(result.text_content, \"Hello, world!\");\r\n        assert!(result.error_message().is_none());\r\n    }\r\n\r\n    #[test]\r\n    fn test_execution_result_from_response_error() {\r\n        let response = CallToolResponse {\r\n            content: vec![ToolResultContent::Text {\r\n                text: \"Something went wrong\".to_string(),\r\n            }],\r\n            is_error: true,\r\n        };\r\n\r\n        let result = ExecutionResult::from_response(response, \"echo\".to_string());\r\n\r\n        assert_eq!(result.tool_name, \"echo\");\r\n        assert!(result.is_error);\r\n        assert_eq!(result.text_content, \"Something went wrong\");\r\n        assert_eq!(result.error_message(), Some(\"Something went wrong\"));\r\n    }\r\n\r\n    #[test]\r\n    fn test_execution_result_multiple_text_contents() {\r\n        let response = CallToolResponse {\r\n            content: vec![\r\n                ToolResultContent::Text {\r\n                    text: \"First line\".to_string(),\r\n                },\r\n                ToolResultContent::Text {\r\n                    text: \"Second line\".to_string(),\r\n                },\r\n            ],\r\n            is_error: false,\r\n        };\r\n\r\n        let result = ExecutionResult::from_response(response, \"echo\".to_string());\r\n\r\n        assert_eq!(result.text_content, \"First line\\nSecond line\");\r\n    }\r\n\r\n    #[test]\r\n    fn test_execution_result_with_image() {\r\n        let response = CallToolResponse {\r\n            content: vec![\r\n                ToolResultContent::Text {\r\n                    text: \"Here's an image\".to_string(),\r\n                },\r\n                ToolResultContent::Image {\r\n                    mime_type: \"image/png\".to_string(),\r\n                    data: \"base64data\".to_string(),\r\n                },\r\n            ],\r\n            is_error: false,\r\n        };\r\n\r\n        let result = ExecutionResult::from_response(response, \"echo\".to_string());\r\n\r\n        // 只有文本内容会被合并\r\n        assert_eq!(result.text_content, \"Here's an image\");\r\n        // 原始内容包含所有类型\r\n        assert_eq!(result.raw_content.len(), 2);\r\n    }\r\n}\r\n","traces":[{"line":23,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":25,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":30,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":31,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":32,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":36,"address":[],"length":0,"stats":{"Line":0}},{"line":42,"address":[],"length":0,"stats":{"Line":0}},{"line":45,"address":[],"length":0,"stats":{"Line":0}},{"line":46,"address":[],"length":0,"stats":{"Line":0}},{"line":47,"address":[],"length":0,"stats":{"Line":0}},{"line":48,"address":[],"length":0,"stats":{"Line":0}},{"line":49,"address":[],"length":0,"stats":{"Li \n    #[serde(default)]\r\n    pub error: Option\u003cJsonRpcError\u003e,\r\n}\r\n\r\n/// JSON-RPC 通知\r\n#[derive(Debug, Clone, Serialize, Deserialize)]\r\npub struct JsonRpcNotification {\r\n    pub jsonrpc: String,\r\n    pub method: String,\r\n    #[serde(default)]\r\n    pub params: Option\u003cserde_json::Value\u003e,\r\n}\r\n\r\n// ==================== MCP 通用类型 ====================\r\n\r\n/// 实现信息（客户端/服务器）\r\n#[derive(Debug, Clone, Serialize, Deserialize)]\r\npub struct Implementation {\r\n    pub name: String,\r\n    pub version: String,\r\n}\r\n\r\n/// 工具定义（复用 models 中的定义，但这里定义协议格式）\r\n#[derive(Debug, Clone, Serialize, Deserialize, PartialEq)]\r\npub struct ProtocolTool {\r\n    pub name: String,\r\n    pub description: String,\r\n    #[serde(rename = \"inputSchema\")]\r\n    pub input_schema: serde_json::Value,\r\n}\r\n\r\n// ==================== 客户端能力 ====================\r\n\r\n#[derive(Debug, Clone, Default, Serialize, Deserialize)]\r\npub struct ClientCapabilities {\r\n    #[serde(default, skip_serializing_if = \"Option::is_none\")]\r\n    pub experimental: Option\u003cHashMap\u003cString, serde_json::Value\u003e\u003e,\r\n    #[serde(default, skip_serializing_if = \"Option::is_none\")]\r\n    pub sampling: Option\u003cserde_json::Value\u003e,\r\n    #[serde(default, skip_serializing_if = \"Option::is_none\")]\r\n    pub roots: Option\u003cserde_json::Value\u003e,\r\n}\r\n\r\n// ==================== 服务器能力 ====================\r\n\r\n#[derive(Debug, Clone, Default, Serialize, Deserialize)]\r\npub struct ServerCapabilities {\r\n    #[serde(default, skip_serializing_if = \"Option::is_none\")]\r\n    pub experimental: Option\u003cHashMap\u003cString, serde_json::Value\u003e\u003e,\r\n    #[serde(default, skip_serializing_if = \"Option::is_none\")]\r\n    pub logging: Option\u003cserde_json::Value\u003e,\r\n    #[serde(default, skip_serializing_if = \"Option::is_none\")]\r\n    pub prompts: Option\u003cserde_json::Value\u003e,\r\n    #[serde(default)]\r\n
