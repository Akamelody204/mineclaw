::Value,\r\n}\r\n\r\n/// tools/call 响应结果\r\n#[derive(Debug, Clone, Serialize, Deserialize)]\r\npub struct CallToolResponse {\r\n    pub content: Vec\u003cToolResultContent\u003e,\r\n    #[serde(default, rename = \"isError\")]\r\n    pub is_error: bool,\r\n}\r\n\r\n/// 工具结果内容\r\n#[derive(Debug, Clone, Serialize, Deserialize)]\r\n#[serde(tag = \"type\")]\r\npub enum ToolResultContent {\r\n    #[serde(rename = \"text\")]\r\n    Text { text: String },\r\n    #[serde(rename = \"image\")]\r\n    Image {\r\n        #[serde(rename = \"mimeType\")]\r\n        mime_type: String,\r\n        data: String,\r\n    },\r\n    #[serde(rename = \"embeddedResource\")]\r\n    EmbeddedResource {\r\n        uri: String,\r\n        #[serde(rename = \"mimeType\")]\r\n        mime_type: Option\u003cString\u003e,\r\n        text: Option\u003cString\u003e,\r\n        blob: Option\u003cString\u003e,\r\n    },\r\n}\r\n\r\n// ==================== 构造函数 ====================\r\n\r\nimpl JsonRpcRequest {\r\n    /// 创建新的 JSON-RPC 请求\r\n    pub fn new(id: RequestId, method: String, params: Option\u003cserde_json::Value\u003e) -\u003e Self {\r\n        Self {\r\n            jsonrpc: \"2.0\".to_string(),\r\n            id,\r\n            method,\r\n            params,\r\n        }\r\n    }\r\n}\r\n\r\nimpl JsonRpcResponse {\r\n    /// 创建成功响应\r\n    pub fn success(id: RequestId, result: serde_json::Value) -\u003e Self {\r\n        Self {\r\n            jsonrpc: \"2.0\".to_string(),\r\n            id,\r\n            result: Some(result),\r\n            error: None,\r\n        }\r\n    }\r\n\r\n    /// 创建错误响应\r\n    pub fn error(\r\n        id: RequestId,\r\n        code: i32,\r\n        message: String,\r\n        data: Option\u003cserde_json::Value\u003e,\r\n    ) -\u003e Self {\r\n        Self {\r\n            jsonrpc: \"2.0\".to_string(),\r\n            id,\r\n            result: None,\r\n            error: Some(JsonRpcError {\r\n                code,\r\n                message,\r\n                data,\r\n            }),\r\n        }\r\n    }\r\n}\r\n\r\nimpl JsonRpcNotification {\r\n    /// 创建新的 JSON-RPC 通知\r\n    pub fn new(method: String, params: Option\u003cserde_json::Value\u003e) -\u003e Self {\r\n        Self {\r\n            jsonrpc: \"2.0\".to_string(),\r\n            method,\r\n            params,\r\n        }\r\n    }\r\n}\r\n\r\nimpl InitializeRequest {\r\n    /// 创建初始化请求\r\n    pub fn new(client_name: \u0026str, client_version: \u0026str) -\u003e Self {\r\n        Self {\r\n            protocol_version: \"2024-11-05\".to_string(),\r\n            capabilities: ClientCapabilities::default(),\r\n            client_info: Implementation {\r\n                name: client_name.to_string(),\r\n                version: client_version.to_string(),\r\n            },\r\n        }\r\n    }\r\n}\r\n\r\nimpl ListToolsRequest {\r\n    /// 创建工具列表请求\r\n    pub fn new() -\u003e Self {\r\n        Self { cursor: None }\r\n    }\r\n}\r\n\r\nimpl Default for ListToolsRequest {\r\n    fn default() -\u003e Self {\r\n        Self::new()\r\n    }\r\n}\r\n\r\n#[cfg(test)]\r\nmod tests {\r\n    use super::*;\r\n    use serde_json::json;\r\n\r\n    #[test]\r\n    fn test_jsonrpc_request_serialization() {\r\n        let request = JsonRpcRequest::new(\r\n            RequestId::Number(1),\r\n            \"test_method\".to_string(),\r\n            Some(json!({\"key\": \"value\"})),\r\n        );\r\n\r\n        let serialized = serde_json::to_string(\u0026request).unwrap();\r\n        let deserialized: JsonRpcRequest = serde_json::from_str(\u0026serialized).unwrap();\r\n\r\n        assert_eq!(deserialized.jsonrpc, \"2.0\");\r\n        assert_eq!(deserialized.id, RequestId::Number(1));\r\n        assert_eq!(deserialized.method, \"test_method\");\r\n    }\r\n\r\n    #[test]\r\n    fn test_jsonrpc_response_success() {\r\n        let response = JsonRpcResponse::success(\r\n            RequestId::String(\"req-123\".to_string()),\r\n            json!({\"result\": \"ok\"}),\r\n        );\r\n\r\n        assert!(response.result.is_some());\r\n        assert!(response.error.is_none());\r\n    }\r\n\r\n    #[test]\r\n    fn test_jsonrpc_response_error() {\r\n        let response = JsonRpcResponse::error(\r\n            RequestId::Number(1),\r\n            -32601,\r\n            \"Method not found\".to_string(),\r\n            None,\r\n        );\r\n\r\n        assert!(response.result.is_none());\r\n        assert!(response.error.is_some());\r\n        let error = response.error.unwrap();\r\n        assert_eq!(error.code, -32601);\r\n    }\r\n\r\n    #[test]\r\n    fn test_initialize_request() {\r\n        let request = InitializeRequest::new(\"mineclaw\", \"0.1.0\");\r\n\r\n        assert_eq!(request.protocol_version, \"2024-11-05\");\r\n        assert_eq!(request.client_info.name, \"mineclaw\");\r\n        assert_eq!(request.client_info.version, \"0.1.0\");\r\n\r\n        let serialized = serde_json::to_string(\u0026request).unwrap();\r\n        let json_value: serde_json::Value = serde_json::from_str(\u0026serialized).unwrap();\r\n        assert_eq!(json_value[\"protocolVersion\"], \"2024-11-05\");\r\n        assert_eq!(json_value[\"clientInfo\"][\"name\"], \"mineclaw\");\r\n    }\r\n\r\n    #[test]\r\n    fn test_list_tools_response() {\r\n        let tool = ProtocolTool {\r\n            name: \"echo\".to_string(),\r\n            description: \"Echo tool\".to_string(),\r\n            input_schema: json!({\"type\": \"object\"}),\r\n        };\r\n\r\n        let response = ListToolsResponse {\r\n            tools: vec![tool],\r\n            next_cursor: None,\r\n        };\r\n\r\n        assert_eq!(response.tools.len(), 1);\r\n        assert_eq!(response.tools[0].name, \"echo\");\r\n\r\n        let serialized = serde_json::to_string(\u0026response).unwrap();\r\n        let json_value: serde_json::Value = serde_json::from_str(\u0026serialized).unwrap();\r\n        assert_eq!(\r\n            json_value[\"tools\"][0][\"inputSchema\"],\r\n            json!({ \");\r\n        assert_eq!(json_value[\"content\"][0][\"text\"], \"Hello world\");\r\n        assert_eq!(json_value[\"isError\"], false);\r\n    }\r\n\r\n    #[test]\r\n    fn test_call_tool_response_image() {\r\n        let response = CallToolResponse {\r\n            content: vec![ToolResultContent::Image {\r\n                mime_type: \"image/png\".to_string(),\r\n                data: \"base64data\".to_string(),\r\n            }],\r\n            is_error: false,\r\n        };\r\n\r\n        let serialized = serde_json::to_string(\u0026response).unwrap();\r\n        let json_value: serde_json::Value = serde_json::from_str(\u0026serialized).unwrap();\r\n\r\n        assert_eq!(json_value[\"content\"][0][\"type\"], \"image\");\r\n        assert_eq!(json_value[\"content\"][0][\"mimeType\"], \"image/png\");\r\n        assert_eq!(json_value[\"content\"][0][\"data\"], \"base64data\");\r\n    }\r\n\r\n    #[test]\r\n    fn test_call_tool_response_error() {\r\n        let response = CallToolResponse {\r\n            content: vec![ToolResultContent::Text {\r\n                text: \"Error occurred\".to_string(),\r\n            }],\r\n            is_error: true,\r\n        };\r\n\r\n        assert!(response.is_error);\r\n    }\r\n}\r\n","traces":[{"line":197,"address":[],"length":0,"stats":{"Line":648518346341351424}},{"line":199,"address":[],"length":0,"stats":{"Line":1945555039024054272}},{"line":209,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":211,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":213,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":219,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":226,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":229,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":240,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":242,"address":[],"length":0,"stats":{"Line":1080863910568919040}},{"line":251,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":253,"address":[],"length":0,"stats":{"Line":1297036692682702848}},{"line":254,"address":[],"length":0,"stats":{"Line":864691128455135232}},{"line":255,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":265,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":271,"address":[],"length":0,"stats":{"Line":0}},{"line":272,"address":[],"length":0,"stats":{"Line":0}}],"covered":15,"coverable":17},{"path":["D:","\\","mineclaw","src","mcp","registry.rs"],"content":"//! MCP 工具注册表\r\n//!\r\n//! 管理多个 MCP 服务器的工具，提供工具查找和路由功能。\r\n\r\nuse crate::models::Tool;\r\nuse std::collections::HashMap;\r\nuse tracing::{debug, warn};\r\n\r\n// ==================== ToolRegistry ====================\r\n\r\n/// 工具注册表\r\npub struct ToolRegistry {\r\n    /// 工具名称到服务器名称的映射\r\n    /// 注意：如果有同名工具，只会保留最后注册的那个\r\n    tool_to_server: HashMap\u003cString, String\u003e,\r\n    /// 服务器名称到工具列表的映射\r\n    server_tools: HashMap\u003cString, Vec\u003cTool\u003e\u003e,\r\n}\r\n\r\nimpl ToolRegistry {\r\n    /// 创建一个新的工具注册表\r\n    pub fn new() -\u003e Self {\r\n        Self {\r\n            tool_to_server: HashMap::new(),\r\n            server_tools: HashMap::new(),\r\n        }\r\n    }\r\n\r\n    /// 注册一个服务器的所有工具\r\n    pub fn register_server(\u0026mut self, server_name: String, tools: Vec\u003cTool\u003e) {\r\n        debug!(server_name = %server_name, tool_count = tools.len(), \"Registering server tools\");\r\n\r\n        // 更新服务器到工具的映射\r\n        self.server_tools.insert(server_name.clone(), tools.clone());\r\n\r\n        // 更新工具到服务器的映射\r\n        for tool in tools {\r\n            if let Some(existing_server) = self\r\n                .tool_to_server\r\n                .insert(tool.name.clone(), server_name.clone())\r\n            {\r\n                warn!(\r\n                    tool_name = %tool.name,\r\n                    old_server = %existing_server,\r\n                    new_server = %server_name,\r\n                    \"Tool name conflict, overwriting\"\r\n                );\r\n            }\r\n        }\r\n    }\r\n\r\n    /// 注销一个服务器的所有工具\r\n    pub fn unregister_server(\u0026mut self, server_name: \u0026str) {\r\n        debug!(server_name = %server_name, \"Unregistering server tools\");\r\n\r\n        if let Some(tools) = self.server_tools.remove(server_name) {\r\n            for tool in tools {\r\n                if let Some(registered_server) = self.tool_to_server.get(\u0026tool.name)\r\n                    \u0026\u0026 registered_server == server_name\r\n                {\r\n                    self.tool_to_server.remove(\u0026tool.name);\r\n                }\r\n            }\r\n        }\r\n    }\r\n\r\n    /// 查找工具所在的服务器\r\n    pub fn find_server(\u0026self, tool_name: \u0026str) -\u003e Option\u003c\u0026str\u003e {\r\n        self.tool_to_server.get(tool_name).map(|s| s.as_str())\r\n    }\r\n\r\n    /// 获取所有工具列表\r\n    pub fn all_tools(\u0026self) -\u003e Vec\u003c(String, Tool)\u003e {\r\n        let mut result = Vec::new();\r\n        for (server_name, tools) in \u0026self.server_tools {\r\n            for tool in tools {\r\n                result.push((server_name.clone(), tool.clone()));\r\n            }\r\n        }\r\n        result\r\n    }\r\n\r\n    /// 获取指定服务器的工具列表\r\n    pub fn server_tools(\u0026self, server_name: \u0026str) -\u003e Option\u003c\u0026[Tool]\u003e {\r\n        self.server_tools.get(server_name).map(|v| v.as_slice())\r\n    }\r\n\r\n    /// 检查工具是否存在\r\n    pub fn has_tool(\u0026self, tool_name: \u0026str) -\u003e bool {\r\n        self.tool_to_server.contains_key(tool_name)\r\n    }\r\n\r\n    /// 获取工具定义\r\n    pub fn get_tool(\u0026self, tool_name: \u0026str) -\u003e Option\u003c\u0026Tool\u003e {\r\n        let server_name = self.tool_to_server.get(tool_name)?;\r\n        let tools = self.server_tools.get(server_name)?;\r\n        tools.iter().find(|t| t.name == tool_name)\r\n    }\r\n\r\n    /// 清空注册表\r\n    pub fn clear(\u0026mut self) {\r\n        self.tool_to_server.clear();\r\n        self.server_tools.clear();\r\n    }\r\n}\r\n\r\nimpl Default for ToolRegistry {\r\n    fn default() -\u003e Self {\r\n        Self::new()\r\n    }\r\n}\r\n\r\n#[cfg(test)]\r\nmod tests {\r\n    use super::*;\r\n    use serde_json::json;\r\n\r\n    #[test]\r\n    fn test_registry_new() {\r\n        let registry = ToolRegistry::new();\r\n        assert!(registry.tool_to_server.is_empty());\r\n        assert!(registry.server_tools.is_empty());\r\n    }\r\n\r\n    #[test]\r\n    fn test_register_server() {\r\n        let mut registry = ToolRegistry::new();\r\n\r\n        let tools = vec![Tool {\r\n            name: \"echo\".to_string(),\r\n            description: \"Echo tool\".to_string(),\r\n            input_schema: json!({\"type\": \"object\"}),\r\n        }];\r\n\r\n        registry.register_server(\"server1\".to_string(), tools);\r\n\r\n        assert!(registry.has_tool(\"echo\"));\r\n        assert_eq!(registry.find_server(\"echo\"), Some(\"server1\"));\r\n    }\r\n\r\n    #[test]\r\n    fn test_unregister_server() {\r\n        let mut registry = ToolRegistry::new();\r\n\r\n        let tools = vec![Tool {\r\n            name: \"echo\".to_string(),\r\n            description: \"Echo tool\".to_string(),\r\n            input_schema: json!({\"type\": \"object\"}),\r\n        }];\r\n\r\n        registry.register_server(\"server1\".to_string(), tools);\r\n        assert!(registry.has_tool(\"echo\"));\r\n\r\n        registry.unregister_server(\"server1\");\r\n        assert!(!registry.has_tool(\"echo\"));\r\n    }\r\n\r\n    #[test]\r\n    fn test_tool_name_conflict() {\r\n        let mut registry = ToolRegistry::new();\r\n\r\n        let tools1 = vec![Tool {\r\n            name: \"echo\".to_string(),\r\n            description: \"Echo from server1\".to_string(),\r\n            input_schema: json!({\"type\": \"object\"}),\r\n        }];\r\n\r\n        let tools2 = vec![Tool {\r\n            name: \"echo\".to_string(),\r\n            description: \"Echo from server2\".to_string(),\r\n            input_schema: json!({\"type\": \"object\"}),\r\n        }];\r\n\r\n        registry.register_server(\"server1\".to_string(), tools1);\r\n        registry.register_server(\"server2\".to_string(), tools2);\r\n\r\n        // 后注册的应该覆盖先注册的\r\n        assert_eq!(registry.find_server(\"echo\"), Some(\"server2\"));\r\n    }\r\n\r\n    #[test]\r\n    fn test_all_tools() {\r\n        let mut registry = ToolRegistry::new();\r\n\r\n        let tools1 = vec![Tool {\r\n            name: \"echo\".to_string(),\r\n            description: \"Echo tool\".to_string(),\r\n            input_schema: json!({\"type\": \"object\"}),\r\n        }];\r\n\r\n        let tools2 = vec![Tool {\r\n            name: \"add\".to_string(),\r\n            description: \"Add tool\".to_string(),\r\n            input_schema: json!({\"type\": \"object\"}),\r\n        }];\r\n\r\n        registry.register_server(\"server1\".to_string(), tools1);\r\n        registry.register_server(\"server2\".to_string(), tools2);\r\n\r\n        let all_tools = registry.all_tools();\r\n        assert_eq!(all_tools.len(), 2);\r\n    }\r\n\r\n    #[test]\r\n    fn test_get_tool() {\r\n        let mut registry = ToolRegistry::new();\r\n\r\n        let tool = Tool {\r\n            name: \"echo\".to_string(),\r\n            description: \"Echo tool\".to_string(),\r\n            input_schema: json!({\"type\": \"object\"}),\r\n        };\r\n\r\n        registry.register_server(\"server1\".to_string(), vec![tool.clone()]);\r\n\r\n        let found = registry.get_tool(\"echo\");\r\n        assert!(found.is_some());\r\n        assert_eq!(found.unwrap().name, \"echo\");\r\n    }\r\n\r\n    #[test]\r\n    fn test_server_tools() {\r\n        let mut registry = ToolRegistry::new();\r\n\r\n        let tools = vec![\r\n            Tool {\r\n                name: \"echo\".to_string(),\r\n                description: \"Echo tool\".to_string(),\r\n                input_schema: json!({\"type\": \"object\"}),\r\n            },\r\n            Tool {\r\n                name: \"add\".to_string(),\r\n                description: \"Add tool\".to_string(),\r\n                input_schema: json!({\"type\": \"object\"}),\r\n            },\r\n        ];\r\n\r\n        registry.register_server(\"server1\".to_string(), tools.clone());\r\n\r\n        let server_tools = registry.server_tools(\"server1\");\r\n        assert!(server_tools.is_some());\r\n        assert_eq!(server_tools.unwrap().len(), 2);\r\n    }\r\n\r\n    #[test]\r\n    fn test_clear() {\r\n        let mut registry = ToolRegistry::new();\r\n\r\n        let tools = vec![Tool {\r\n            name: \"echo\".to_string(),\r\n            description: \"Echo tool\".to_string(),\r\n            input_schema: json!({\"type\": \"object\"}),\r\n        }];\r\n\r\n        registry.register_server(\"server1\".to_string(), tools);\r\n        assert!(!registry.all_tools().is_empty());\r\n\r\n        registry.clear();\r\n        assert!(registry.all_tools().is_empty());\r\n    }\r\n}\r\n","traces":[{"line":22,"address":[],"length":0,"stats":{"Line":1224979098644774912}},{"line":24,"address":[],"length":0,"stats":{"Line":1224979098644774912}},{"line":25,"address":[],"length":0,"stats":{"Line":1224979098644774912}},{"line":30,"address":[],"length":0,"stats":{"Line":648518346341351424}},{"line":31,"address":[],"length":0,"stats":{"Line":648518346341351424}},{"line":34,"address":[],"length":0,"stats":{"Line":3891110078048108544}},{"line":37,"address":[],"length":0,"stats":{"Line":1369094286720630784}},{"line":38,"address":[],"length":0,"stats":{"Line":1513209474796486656}},{"line":39,"address":[],"length":0,"stats":{"Line":1441151880758558720}},{"line":40,"address":[],"length":0,"stats":{"Line":2882303761517117440}},{"line":42,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":53,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":54,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":56,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":57,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":58,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":59,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":61,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":68,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":69,"address":[],"length":0,"stats":{"Line":864691128455135232}},{"line":73,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":74,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":75,"address":[],"length":0,"stats":{"Line":648518346341351424}},{"line":76,"address":[],"length":0,"stats":{"Line":648518346341351424}},{"line":77,"address":[],"length":0,"stats":{"Line":1080863910568919040}},{"line":80,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":84,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":85,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":89,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":90,"address":[],"length":0,"stats":{"Line":648518346341351424}},{"line":94,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":95,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":96,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":97,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":101,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":102,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":103,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":108,"address":[],"length":0,"stats":{"Line":0}},{"line":109,"address":[],"length":0,"stats":{"Line":0}}],"covered":37,"coverable":39},{"path":["D:","\\","mineclaw","src","mcp","server.rs"],"content":"//! MCP 服务器管理器\r\n//!\r\n//! 管理多个 MCP 服务器的生命周期和状态。\r\n\r\nuse crate::config::McpServerConfig;\r\nuse crate::error::{Error, Result};\r\nuse crate::mcp::client::McpClient;\r\nuse crate::mcp::protocol::{CallToolResponse, ProtocolTool};\r\nuse crate::mcp::registry::ToolRegistry;\r\nuse crate::mcp::transport::StdioTransport;\r\nuse crate::models::Tool;\r\nuse chrono::{DateTime, Utc};\r\nuse serde::{Deserialize, Serialize};\r\nuse std::collections::HashMap;\r\nuse tracing::{debug, error, info, warn};\r\n\r\n// ==================== ServerStatus ====================\r\n\r\n/// MCP 服务器状态\r\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\r\n#[serde(tag = \"type\", content = \"message\")]\r\npub enum ServerStatus {\r\n    /// 正在连接\r\n    Connecting,\r\n    /// 已连接\r\n    Connected,\r\n    /// 已断开连接\r\n    Disconnected,\r\n    /// 发生错误\r\n    Error(String),\r\n}\r\n\r\n// ==================== McpServerHandle ====================\r\n\r\n/// MCP 服务器句柄\r\npub struct McpServerHandle {\r\n    /// 服务器名称\r\n    pub name: String,\r\n    /// MCP 客户端\r\n    pub client: Option\u003cMcpClient\u003e,\r\n    /// 服务器提供的工具\r\n    pub tools: Vec\u003cTool\u003e,\r\n    /// 服务器状态\r\n    pub status: ServerStatus,\r\n    /// 服务器配置（用于重启）\r\n    pub config: Option\u003cMcpServerConfig\u003e,\r\n    /// 启动时间\r\n    pub started_at: Option\u003cDateTime\u003cUtc\u003e\u003e,\r\n    /// 最后健康检查时间\r\n    pub last_health_check: Option\u003cDateTime\u003cUtc\u003e\u003e,\r\n}\r\n\r\nimpl McpServerHandle {\r\n    /// 创建一个新的服务器句柄\r\n    fn new(name: String) -\u003e Self {\r\n        Self {\r\n            name,\r\n            client: None,\r\n            tools: Vec::new(),\r\n            status: ServerStatus::Connecting,\r\n            config: None,\r\n            started_at: None,\r\n            last_health_check: None,\r\n        }\r\n    }\r\n\r\n    /// 将 ProtocolTool 转换为 models::Tool\r\n    fn protocol_tool_to_model(tool: \u0026ProtocolTool) -\u003e Tool {\r\n        Tool {\r\n            name: tool.name.clone(),\r\n            description: tool.description.clone(),\r\n            input_schema: tool.input_schema.clone(),\r\n        }\r\n    }\r\n\r\n    /// 获取运行时间（秒）\r\n    pub fn uptime_seconds(\u0026self) -\u003e Option\u003cu64\u003e {\r\n        self.started_at\r\n            .map(|started| (Utc::now() - started).num_seconds().max(0) as u64)\r\n    }\r\n}\r\n\r\n// ==================== McpServerManager ====================\r\n\r\n/// MCP 服务器管理器\r\npub struct McpServerManager {\r\n    servers: HashMap\u003cString, McpServerHandle\u003e,\r\n    /// 工具注册表\r\n    tool_registry: ToolRegistry,\r\n}\r\n\r\nimpl McpServerManager {\r\n    /// 创建一个新的服务器管理器\r\n    pub fn new() -\u003e Self {\r\n        Self {\r\n            servers: HashMap::new(),\r\n            tool_registry: ToolRegistry::new(),\r\n        }\r\n    }\r\n\r\n    /// 获取工具注册表的引用\r\n    pub fn tool_registry(\u0026self) -\u003e \u0026ToolRegistry {\r\n        \u0026self.tool_registry\r\n    }\r\n\r\n    /// 启动一个 MCP 服务器\r\n    pub async fn start_server(\u0026mut self, config: \u0026McpServerConfig) -\u003e Result\u003c()\u003e {\r\n        info!(server_name = %config.name, \"Starting MCP server\");\r\n\r\n        if self.servers.contains_key(\u0026config.name) {\r\n            warn!(server_name = %config.name, \"Server already exists, stopping first\");\r\n            self.stop_server(\u0026config.name).await?;\r\n        }\r\n\r\n        let mut handle = McpServerHandle::new(config.name.clone());\r\n        handle.config = Some(config.clone());\r\n        handle.started_at = Some(Utc::now());\r\n        self.servers.insert(config.name.clone(), handle);\r\n\r\n        // 启动传输层\r\n        let transport =\r\n            match StdioTransport::spawn(\u0026config.command, \u0026config.args, \u0026config.env).await {\r\n                Ok(t) =\u003e t,\r\n                Err(e) =\u003e {\r\n                    error!(server_name = %config.name, error = %e, \"Failed to spawn server\");\r\n                    if let Some(handle) = self.servers.get_mut(\u0026config.name) {\r\n                        handle.status = ServerStatus::Error(e.to_string());\r\n                    }\r\n                    return Err(e);\r\n                }\r\n            };\r\n\r\n        // 创建客户端\r\n        let mut client = McpClient::new(Box::new(transport));\r\n\r\n        // 初始化\r\n        match client.initialize().await {\r\n            Ok(_) =\u003e {\r\n                debug!(server_name = %config.name, \"Initialized successfully\");\r\n            }\r\n            Err(e) =\u003e {\r\n                error!(server_name = %config.name, error = %e, \"Failed to initialize server\");\r\n                if let Some(handle) = self.servers.get_mut(\u0026config.name) {\r\n                    handle.status = ServerStatus::Error(e.to_string());\r\n                }\r\n                let _ = client.close().await;\r\n                return Err(e);\r\n            }\r\n        }\r\n\r\n        // 获取工具列表\r\n        let tools_response = match client.list_tools().await {\r\n            Ok(r) =\u003e r,\r\n            Err(e) =\u003e {\r\n                error!(server_name = %config.name, error = %e, \"Failed to list tools\");\r\n                if let Some(handle) = self.servers.get_mut(\u0026config.name) {\r\n                    handle.status = ServerStatus::Error(e.to_string());\r\n                }\r\n                let _ = client.close().await;\r\n                return Err(e);\r\n            }\r\n        };\r\n\r\n        let tools: Vec\u003cTool\u003e = tools_response\r\n            .tools\r\n            .iter()\r\n            .map(McpServerHandle::protocol_tool_to_model)\r\n            .collect();\r\n\r\n        info!(\r\n            server_name = %config.name,\r\n            tool_count = tools.len(),\r\n            \"MCP server started successfully\"\r\n        );\r\n\r\n        // 更新句柄\r\n        if let Some(handle) = self.servers.get_mut(\u0026config.name) {\r\n            handle.client = Some(client);\r\n            handle.tools = tools.clone();\r\n            handle.status = ServerStatus::Connected;\r\n            handle.last_health_check = Some(Utc::now());\r\n        }\r\n\r\n        // 注册到工具注册表\r\n        self.tool_registry\r\n            .register_server(config.name.clone(), tools);\r\n\r\n        Ok(())\r\n    }\r\n\r\n    /// 重启一个 MCP 服务器\r\n    pub async fn restart_server(\u0026mut self, name: \u0026str) -\u003e Result\u003c()\u003e {\r\n        info!(server_name = name, \"Restarting MCP server\");\r\n\r\n        let config = self\r\n            .get_server(name)\r\n            .and_then(|h| h.config.clone())\r\n            .ok_or_else(|| Error::McpServer {\r\n                server: name.to_string(),\r\n                message: \"Server configuration not found\".to_string(),\r\n            })?;\r\n\r\n        self.stop_server(name).await?;\r\n        self.start_server(\u0026config).await?;\r\n\r\n        info!(server_name = name, \"MCP server restarted successfully\");\r\n        Ok(())\r\n    }\r\n\r\n    /// 健康检查一个 MCP 服务器\r\n    pub async fn health_check(\u0026mut self, name: \u0026str) -\u003e Result\u003cbool\u003e {\r\n        debug!(server_name = name, \"Performing health check\");\r\n\r\n        let handle = match self.servers.get_mut(name) {\r\n            Some(h) =\u003e h,\r\n            None =\u003e {\r\n                return Ok(false);\r\n            }\r\n        };\r\n\r\n        handle.last_health_check = Some(Utc::now());\r\n\r\n        if handle.status != ServerStatus::Connected {\r\n            return Ok(false);\r\n        }\r\n\r\n        let client = match handle.client.as_mut() {\r\n            Some(c) =\u003e c,\r\n            None =\u003e {\r\n                handle.status = ServerStatus::Disconnected;\r\n                return Ok(false);\r\n            }\r\n        };\r\n\r\n        // 通过调用 list_tools 来测试连接\r\n        match client.list_tools().await {\r\n            Ok(_) =\u003e {\r\n                debug!(server_name = name, \"Health check passed\");\r\n                Ok(true)\r\n            }\r\n            Err(e) =\u003e {\r\n                error!(server_name = name, error = %e, \"Health check failed\");\r\n                handle.status = ServerStatus::Error(e.to_string());\r\n                Ok(false)\r\n            }\r\n        }\r\n    }\r\n\r\n    /// 停止一个 MCP 服务器\r\n    pub async fn stop_server(\u0026mut self, name: \u0026str) -\u003e Result\u003c()\u003e {\r\n        info!(server_name = name, \"Stopping MCP server\");\r\n\r\n        if let Some(mut handle) = self.servers.remove(name) {\r\n            if let Some(mut client) = handle.client.take()\r\n                \u0026\u0026 let Err(e) = client.close().await\r\n            {\r\n                warn!(server_name = name, error = %e, \"Error while closing client\");\r\n            }\r\n            handle.status = ServerStatus::Error(\"Stopped\".to_string());\r\n        }\r\n\r\n        // 从工具注册表中注销\r\n        self.tool_registry.unregister_server(name);\r\n\r\n        Ok(())\r\n    }\r\n\r\n    /// 获取一个服务器的句柄\r\n    pub fn get_server(\u0026self, name: \u0026str) -\u003e Option\u003c\u0026McpServerHandle\u003e {\r\n        self.servers.get(name)\r\n    }\r\n\r\n    /// 获取一个服务器的可变句柄\r\n    pub fn get_server_mut(\u0026mut self, name: \u0026str) -\u003e Option\u003c\u0026mut McpServerHandle\u003e {\r\n        self.servers.get_mut(name)\r\n    }\r\n\r\n    /// 列出所有服务器\r\n    pub fn list_servers(\u0026self) -\u003e Vec\u003c\u0026McpServerHandle\u003e {\r\n        self.servers.values().collect()\r\n    }\r\n\r\n    /// 获取所有服务器提供的所有工具\r\n    pub fn all_tools(\u0026self) -\u003e Vec\u003c(String, Tool)\u003e {\r\n        let mut result = Vec::new();\r\n        for (server_name, handle) in \u0026self.servers {\r\n            if handle.status == ServerStatus::Connected {\r\n                for tool in \u0026handle.tools {\r\n                    result.push((server_name.clone(), tool.clone()));\r\n                }\r\n            }\r\n        }\r\n        result\r\n    }\r\n\r\n    /// 停止所有服务器\r\n    pub async fn stop_all(\u0026mut self) -\u003e Result\u003c()\u003e {\r\n        info!(\"Stopping all MCP servers\");\r\n\r\n        let server_names: Vec\u003cString\u003e = self.servers.keys().cloned().collect();\r\n        for name in server_names {\r\n            self.stop_server(\u0026name).await?;\r\n        }\r\n\r\n        Ok(())\r\n    }\r\n\r\n    /// 查找工具所在的服务器\r\n    pub fn find_tool_server(\u0026self, tool_name: \u0026str) -\u003e Option\u003c\u0026str\u003e {\r\n        self.tool_registry.find_server(tool_name)\r\n    }\r\n\r\n    /// 调用工具\r\n    pub async fn call_tool(\r\n        \u0026mut self,\r\n        server_name: \u0026str,\r\n        tool_name: \u0026str,\r\n        arguments: serde_json::Value,\r\n    ) -\u003e Result\u003cCallToolResponse\u003e {\r\n        debug!(\r\n            server_name = %server_name,\r\n            tool_name = %tool_name,\r\n            \"Calling tool\"\r\n        );\r\n\r\n        let handle = self\r\n            .servers\r\n            .get_mut(server_name)\r\n            .ok_or_else(|| Error::McpServer {\r\n                server: server_name.to_string(),\r\n                message: \"Server not found\".to_string(),\r\n            })?;\r\n\r\n        if handle.status != ServerStatus::Connected {\r\n            return Err(Error::McpServer {\r\n                server: server_name.to_string(),\r\n                message: \"Server not connected\".to_string(),\r\n            });\r\n        }\r\n\r\n        let client = handle.client.as_mut().ok_or_else(|| Error::McpServer {\r\n            server: server_name.to_string(),\r\n            message: \"Client not initialized\".to_string(),\r\n        })?;\r\n\r\n        let response = client.call_tool(tool_name.to_string(), arguments).await?;\r\n\r\n        Ok(response)\r\n    }\r\n}\r\n\r\nimpl Default for McpServerManager {\r\n    fn default() -\u003e Self {\r\n        Self::new()\r\n    }\r\n}\r\n\r\nimpl Drop for McpServerManager {\r\n    fn drop(\u0026mut self) {\r\n        // 因为 drop 不是 async，我们无法优雅地关闭服务器\r\n        // 只能记录警告\r\n        if !self.servers.is_empty() {\r\n            warn!(\r\n                server_count = self.servers.len(),\r\n                \"McpServerManager dropped with active servers, they may not be cleanly shut down\"\r\n            );\r\n        }\r\n    }\r\n}\r\n\r\n#[cfg(test)]\r\nmod tests {\r\n    use super::*;\r\n    use crate::mcp::protocol::ProtocolTool;\r\n    use serde_json::json;\r\n\r\n    #[test]\r\n    fn test_server_manager_new() {\r\n        let manager = McpServerManager::new();\r\n        assert!(manager.servers.is_empty());\r\n    }\r\n\r\n    #[test]\r\n    fn test_server_handle_new() {\r\n        let handle = McpServerHandle::new(\"test-server\".to_string());\r\n        assert_eq!(handle.name, \"test-server\");\r\n        assert!(handle.client.is_none());\r\n        assert!(handle.tools.is_empty());\r\n        assert_eq!(handle.status, ServerStatus::Connecting);\r\n    }\r\n\r\n    #[test]\r\n    fn test_protocol_tool_to_model() {\r\n        let protocol_tool = ProtocolTool {\r\n            name: \"test-tool\".to_string(),\r\n            description: \"A test tool\".to_string(),\r\n            input_schema: json!({\"type\": \"object\"}),\r\n        };\r\n\r\n        let tool = McpServerHandle::protocol_tool_to_model(\u0026protocol_tool);\r\n        assert_eq!(tool.name, \"test-tool\");\r\n        assert_eq!(tool.description, \"A test tool\");\r\n        assert_eq!(tool.input_schema, json!({\"type\": \"object\"}));\r\n    }\r\n\r\n    #[test]\r\n    fn test_manager_list_servers_empty() {\r\n        let manager = McpServerManager::new();\r\n        let servers = manager.list_servers();\r\n        assert!(servers.is_empty());\r\n    }\r\n\r\n    #[test]\r\n    fn test_manager_all_tools_empty() {\r\n        let manager = McpServerManager::new();\r\n        let tools = manager.all_tools();\r\n        assert!(tools.is_empty());\r\n    }\r\n\r\n    #[test]\r\n    fn test_server_handle_tool_conversion() {\r\n        let protocol_tool = ProtocolTool {\r\n            name: \"echo\".to_string(),\r\n            description: \"Echo tool\".to_string(),\r\n            input_schema: json!({\"type\": \"object\"}),\r\n        };\r\n\r\n        let tool = McpServerHandle::protocol_tool_to_model(\u0026protocol_tool);\r\n        assert_eq!(tool.name, \"echo\");\r\n        assert_eq!(tool.description, \"Echo tool\");\r\n    }\r\n}\r\n","traces":[{"line":55,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":59,"address":[],"length":0,"stats":{"Line":720575940379279360}},{"line":68,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":70,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":71,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":72,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":77,"address":[],"length":0,"stats":{"Line":0}},{"line":78,"address":[],"length":0,"stats":{"Line":0}},{"line":79,"address":[],"length":0,"stats":{"Line":0}},{"line":94,"address":[],"length":0,"stats":{"Line":648518346341351424}},{"line":96,"address":[],"length":0,"stats":{"Line":648518346341351424}},{"line":97,"address":[],"length":0,"stats":{"Line":648518346341351424}},{"line":102,"address":[],"length":0,"stats":{"Line":0}},{"line":103,"address":[],"length":0,"stats":{"Line":0}},{"line":107,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":108,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":110,"address":[],"length":0,"stats":{"Line":864691128455135232}},{"line":111,"address":[],"length":0,"stats":{"Line":0}},{"line":112,"address":[],"length":0,"stats":{"Line":0}},{"line":115,"address":[],"length":0,"stats":{"Line":1152921504606846976}},{"line":116,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":117,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":11  关闭传输连接\r\n    async fn close(\u0026mut self) -\u003e Result\u003c()\u003e;\r\n}\r\n\r\n// ==================== StdioTransport ====================\r\n\r\n/// 基于 stdio 的传输层实现\r\npub struct StdioTransport {\r\n    child: Option\u003cChild\u003e,\r\n    stdin: Option\u003cChildStdin\u003e,\r\n    stdout_lines: Option\u003ctokio::io::Lines\u003cBufReader\u003cChildStdout\u003e\u003e\u003e,\r\n}\r\n\r\nimpl StdioTransport {\r\n    /// 创建一个新的 stdio 传输层并启动子进程\r\n    pub async fn spawn(\r\n        command: \u0026str,\r\n        args: \u0026[String],\r\n        env: \u0026std::collections::HashMap\u003cString, String\u003e,\r\n    ) -\u003e Result\u003cSelf\u003e {\r\n        info!(command, ?args, \"Spawning MCP server process\");\r\n\r\n        let mut cmd = Command::new(command);\r\n        cmd.args(args)\r\n            .stdin(Stdio::piped())\r\n            .stdout(Stdio::piped())\r\n            .stderr(Stdio::inherit());\r\n\r\n        // 设置环境变量\r\n        for (key, value) in env {\r\n            cmd.env(key, value);\r\n        }\r\n\r\n        let mut child = cmd.spawn().map_err(|e| {\r\n            error!(error = %e, \"Failed to spawn MCP server\");\r\n            Error::Mcp(format!(\"Failed to spawn server: {}\", e))\r\n        })?;\r\n\r\n        let stdin = child\r\n            .stdin\r\n            .take()\r\n            .ok_or_else(|| Error::Mcp(\"Failed to capture stdin\".to_string()))?;\r\n\r\n        let stdout = child\r\n            .stdout\r\n            .take()\r\n            .ok_or_else(|| Error::Mcp(\"Failed to capture stdout\".to_string()))?;\r\n\r\n        let stdout_lines = BufReader::new(stdout).lines();\r\n\r\n        info!(\"MCP server process spawned successfully\");\r\n\r\n        Ok(Self {\r\n            child: Some(child),\r\n            stdin: Some(stdin),\r\n            stdout_lines: Some(stdout_lines),\r\n        })\r\n    }\r\n\r\n    /// 获取子进程的可变引用（用于测试）\r\n    #[cfg(test)]\r\n    pub fn child_mut(\u0026mut self) -\u003e Option\u003c\u0026mut Child\u003e {\r\n        self.child.as_mut()\r\n    }\r\n}\r\n\r\n#[async_trait]\r\nimpl Transport for StdioTransport {\r\n    async fn send(\u0026mut self, message: \u0026str) -\u003e Result\u003c()\u003e {\r\n        debug!(message, \"Sending message to MCP server\");\r\n\r\n        let stdin = self\r\n            .stdin\r\n            .as_mut()\r\n            .ok_or_else(|| Error::Mcp(\"Transport is closed\".to_string()))?;\r\n\r\n        stdin.write_all(message.as_bytes()).await.map_err(|e| {\r\n            error!(error = %e, \"Failed to write to stdin\");\r\n            Error::Mcp(format!(\"Write failed: {}\", e))\r\n        })?;\r\n\r\n        stdin.write_all(b\"\\n\").await.map_err(|e| {\r\n            error!(error = %e, \"Failed to write newline\");\r\n            Error::Mcp(format!(\"Write failed: {}\", e))\r\n        })?;\r\n\r\n        stdin.flush().await.map_err(|e| {\r\n            error!(error = %e, \"Failed to flush stdin\");\r\n            Error::Mcp(format!(\"Flush failed: {}\", e))\r\n        })?;\r\n\r\n        debug!(\"Message sent successfully\");\r\n        Ok(())\r\n    }\r\n\r\n    async fn receive(\u0026mut self) -\u003e Result\u003cString\u003e {\r\n        let lines = self\r\n            .stdout_lines\r\n            .as_mut()\r\n            .ok_or_else(|| Error::Mcp(\"Transport is closed\".to_string()))?;\r\n\r\n        debug!(\"Waiting for message from MCP server\");\r\n\r\n        match lines.next_line().await {\r\n            Ok(Some(line)) =\u003e {\r\n                if line.trim().is_empty() {\r\n                    debug!(\"Received empty line, skipping\");\r\n                    self.receive().await\r\n                } else {\r\n                    debug!(line, \"Received message from MCP server\");\r\n                    Ok(line)\r\n                }\r\n            }\r\n            Ok(None) =\u003e {\r\n                error!(\"MCP server stdout closed\");\r\n                Err(Error::Mcp(\"Server closed connection\".to_string()))\r\n            }\r\n            Err(e) =\u003e {\r\n                error!(error = %e, \"Failed to read from stdout\");\r\n                Err(Error::Mcp(format!(\"Read failed: {}\", e)))\r\n            }\r\n        }\r\n    }\r\n\r\n    async fn close(\u0026mut self) -\u003e Result\u003c()\u003e {\r\n        info!(\"Closing MCP server transport\");\r\n\r\n        // Drop stdin first to signal EOF\r\n        self.stdin.take();\r\n        self.stdout_lines.take();\r\n\r\n        if let Some(mut child) = self.child.take() {\r\n            // Try graceful shutdown first\r\n            match child.try_wait() {\r\n                Ok(Some(status)) =\u003e {\r\n                    info!(%status, \"MCP server already exited\");\r\n                }\r\n                Ok(None) =\u003e {\r\n                    // Send SIGTERM (Unix) or terminate (Windows)\r\n                    #[cfg(unix)]\r\n                    {\r\n                        use tokio::signal::unix::{SignalKind, signal};\r\n                        if let Ok(mut sigterm) = signal(SignalKind::terminate()) {\r\n                            let _ = child.start_kill();\r\n                            tokio::select! {\r\n                                _ = sigterm.recv() =\u003e {},\r\n                                _ = tokio::time::sleep(tokio::time::Duration::from_secs(5)) =\u003e {\r\n                                    let _ = child.kill().await;\r\n                                }\r\n                            }\r\n                        }\r\n                    }\r\n                    #[cfg(not(unix))]\r\n                    {\r\n                        let _ = child.kill().await;\r\n                    }\r\n\r\n                    let status = child.wait().await;\r\n                    info!(?status, \"MCP server exited\");\r\n                }\r\n                Err(e) =\u003e {\r\n                    error!(error = %e, \"Failed to wait for MCP server\");\r\n                    let _ = child.kill().await;\r\n                }\r\n            }\r\n        }\r\n\r\n        Ok(())\r\n    }\r\n}\r\n\r\nimpl Drop for StdioTransport {\r\n    fn drop(\u0026mut self) {\r\n        // 如果还没关闭，尝试清理\r\n        if self.child.is_some() {\r\n            // 因为 drop 不是 async，我们只能尽力而为\r\n            if let Some(mut child) = self.child.take() {\r\n                let _ = child.start_kill();\r\n            }\r\n        }\r\n    }\r\n}\r\n\r\n// ==================== MockTransport (for testing) ====================\r\n\r\n#[cfg(test)]\r\npub mod mock {\r\n    use super::*;\r\n    use std::collections::VecDeque;\r\n    use tokio::sync::Mutex;\r\n\r\n    /// 用于测试的 mock 传输层\r\n    pub struct MockTransport {\r\n        pub sent_messages: Mutex\u003cVec\u003cString\u003e\u003e,\r\n        pub responses_to_receive: Mutex\u003cVecDeque\u003cString\u003e\u003e,\r\n        pub is_closed: Mutex\u003cbool\u003e,\r\n    }\r\n\r\n    impl MockTransport {\r\n        pub fn new() -\u003e Self {\r\n            Self {\r\n                sent_messages: Mutex::new(Vec::new()),\r\n                responses_to_receive: Mutex::new(VecDeque::new()),\r\n                is_closed: Mutex::new(false),\r\n            }\r\n        }\r\n\r\n        pub fn with_responses(responses: Vec\u003cString\u003e) -\u003e Self {\r\n            Self {\r\n                sent_messages: Mutex::new(Vec::new()),\r\n                responses_to_receive: Mutex::new(VecDeque::from(responses)),\r\n                is_closed: Mutex::new(false),\r\n            }\r\n        }\r\n    }\r\n\r\n    impl Default for MockTransport {\r\n        fn default() -\u003e Self {\r\n            Self::new()\r\n        }\r\n    }\r\n\r\n    #[async_trait]\r\n    impl Transport for MockTransport {\r\n        async fn send(\u0026mut self, message: \u0026str) -\u003e Result\u003c()\u003e {\r\n            let is_closed = self.is_closed.lock().await;\r\n            if *is_closed {\r\n                return Err(Error::Mcp(\"Transport is closed\".to_string()));\r\n            }\r\n            drop(is_closed);\r\n\r\n            self.sent_messages.lock().await.push(message.to_string());\r\n            Ok(())\r\n        }\r\n\r\n        async fn receive(\u0026mut self) -\u003e Result\u003cString\u003e {\r\n            let is_closed = self.is_closed.lock().await;\r\n            if *is_closed {\r\n                return Err(Error::Mcp(\"Transport is closed\".to_string()));\r\n            }\r\n            drop(is_closed);\r\n\r\n            self.responses_to_receive\r\n                .lock()\r\n                .await\r\n                .pop_front()\r\n                .ok_or_else(|| Error::Mcp(\"No more responses\".to_string()))\r\n        }\r\n\r\n        async fn close(\u0026mut self) -\u003e Result\u003c()\u003e {\r\n            *self.is_closed.lock().await = true;\r\n            Ok(())\r\n        }\r\n    }\r\n}\r\n\r\n#[cfg(test)]\r\nmod tests {\r\n    use super::*;\r\n    use mock::MockTransport;\r\n\r\n    #[tokio::test]\r\n    async fn test_mock_transport_send_receive() {\r\n        let mut transport =\r\n            MockTransport::with_responses(vec![\"response1\".to_string(), \"response2\".to_string()]);\r\n\r\n        transport.send(\"request1\").await.unwrap();\r\n        let resp1 = transport.receive().await.unwrap();\r\n        assert_eq!(resp1, \"response1\");\r\n\r\n        transport.send(\"request2\").await.unwrap();\r\n        let resp2 = transport.receive().await.unwrap();\r\n        assert_eq!(resp2, \"response2\");\r\n\r\n        let sent = transport.sent_messages.lock().await;\r\n        assert_eq!(sent.len(), 2);\r\n        assert_eq!(sent[0], \"request1\");\r\n        assert_eq!(sent[1], \"request2\");\r\n    }\r\n\r\n    #[tokio::test]\r\n    async fn test_mock_transport_close() {\r\n        let mut transport = MockTransport::new();\r\n        transport.close().await.unwrap();\r\n\r\n        let result = transport.send(\"test\").await;\r\n        assert!(result.is_err());\r\n        assert!(result.unwrap_err().to_string().contains(\"closed\"));\r\n    }\r\n}\r\n","traces":[{"line":38,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":43,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":45,"address":[],"length":0,"stats":{"Line":864691128455135232}},{"line":46,"address":[],"length":0,"stats":{"Line":1152921504606846976}},{"line":47,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":48,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":49,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":52,"address":[],"length":0,"stats":{"Line":1152921504606846976}},{"line":53,"address":[],"length":0,"stats":{"Line":864691128455135232}},{"line":56,"address":[],"length":0,"stats":{"Line":1152921504606846976}},{"line":57,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":58,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":61,"address":[],"length":0,"stats":{"Line":0}},{"line":62,"address":[],"length":0,"stats":{"Line":0}},{"line":64,"address":[],"length":0,"stats":{"Line":0}},{"line":66,"address":[],"length":0,"stats":{"Line":0}},{"line":67,"address":[],"length":0,"stats":{"Line":0}},{"line":69,"address":[],"length":0,"stats":{"Line":0}},{"line":71,"address":[],"length":0,"stats":{"Line":0}},{"line":73,"address":[],"length":0,"stats":{"Line":0}},{"line":75,"address":[],"length":0,"stats":{"Line":0}},{"line":76,"address":[],"length":0,"stats":{"Line":0}},{"line":77,"address":[],"length":0,"stats":{"Line":0}},{"line":78,"address":[],"length":0,"stats":{"Line":0}},{"line":84,"address":[],"length":0,"stats":{"Line":0}},{"line":85,"address":[],"length":0,"stats":{"Line":0}},{"line":91,"address":[],"length":0,"stats":{"Line":0}},{"line":97,"address":[],"length":0,"stats":{"Line":0}},{"line":99,"address":[],"length":0,"stats":{"Line":0}},{"line":100,"address":[],"length":0,"stats":{"Line":0}},{"line":101,"address":[],"length":0,"stats":{"Line":0}},{"line":104 b parent_id: Option\u003cString\u003e,\r\n    /// 元数据\r\n    pub metadata: Option\u003cserde_json::Value\u003e,\r\n}\r\n\r\nimpl Checkpoint {\r\n    /// 创建新的 Checkpoint\r\n    pub fn new(\r\n        session_id: Uuid,\r\n        checkpoint_type: CheckpointType,\r\n        description: Option\u003cString\u003e,\r\n    ) -\u003e Self {\r\n        Self {\r\n            id: Uuid::new_v4().to_string(),\r\n            session_id,\r\n            created_at: Utc::now(),\r\n            description,\r\n            checkpoint_type,\r\n            affected_files: Vec::new(),\r\n            parent_id: None,\r\n            metadata: None,\r\n        }\r\n    }\r\n\r\n    /// 添加受影响的文件\r\n    pub fn with_affected_files(mut self, files: Vec\u003cFileInfo\u003e) -\u003e Self {\r\n        self.affected_files = files;\r\n        self\r\n    }\r\n\r\n    /// 设置父 checkpoint\r\n    pub fn with_parent_id(mut self, parent_id: String) -\u003e Self {\r\n        self.parent_id = Some(parent_id);\r\n        self\r\n    }\r\n\r\n    /// 设置元数据\r\n    pub fn with_metadata(mut self, metadata: serde_json::Value) -\u003e Self {\r\n        self.metadata = Some(metadata);\r\n        self\r\n    }\r\n}\r\n\r\n/// Checkpoint 快照（用于恢复）\r\n#[derive(Debug, Clone, Serialize, Deserialize)]\r\npub struct CheckpointSnapshot {\r\n    /// Checkpoint 元数据\r\n    pub checkpoint: Checkpoint,\r\n    /// 会话快照\r\n    pub session: Option\u003ccrate::models::Session\u003e,\r\n    /// 文件快照（路径 -\u003e 内容）\r\n    pub files: HashMap\u003cString, Vec\u003cu8\u003e\u003e,\r\n}\r\n\r\n/// Checkpoint 列表项（用于列表展示）\r\n#[derive(Debug, Clone, Serialize)]\r\npub struct CheckpointListItem {\r\n    pub id: String,\r\n    pub created_at: DateTime\u003cUtc\u003e,\r\n    pub description: Option\u003cString\u003e,\r\n    pub checkpoint_type: CheckpointType,\r\n    pub file_count: usize,\r\n    pub parent_id: Option\u003cString\u003e,\r\n}\r\n\r\nimpl From\u003c\u0026Checkpoint\u003e for CheckpointListItem {\r\n    fn from(checkpoint: \u0026Checkpoint) -\u003e Self {\r\n        Self {\r\n            id: checkpoint.id.clone(),\r\n            created_at: checkpoint.created_at,\r\n            description: checkpoint.description.clone(),\r\n            checkpoint_type: checkpoint.checkpoint_type.clone(),\r\n            file_count: checkpoint.affected_files.len(),\r\n            parent_id: checkpoint.parent_id.clone(),\r\n        }\r\n    }\r\n}\r\n\r\n/// 列出 checkpoints 响应\r\n#[derive(Debug, Serialize)]\r\npub struct ListCheckpointsResponse {\r\n    pub checkpoints: Vec\u003cCheckpointListItem\u003e,\r\n    pub total_count: usize,\r\n}\r\n\r\n/// 创建 checkpoint 请求\r\n#[derive(Debug, Deserialize)]\r\npub struct CreateCheckpointRequest {\r\n    pub session_id: Uuid,\r\n    pub description: Option\u003cString\u003e,\r\n    pub checkpoint_type: Option\u003cCheckpointType\u003e,\r\n    pub affected_files: Option\u003cVec\u003cString\u003e\u003e,\r\n}\r\n\r\n/// 创建 checkpoint 响应\r\n#[derive(Debug, Serialize)]\r\npub struct CreateCheckpointResponse {\r\n    pub checkpoint_id: String,\r\n    pub success: bool,\r\n}\r\n\r\n/// 恢复 checkpoint 请求\r\n#[derive(Debug, Deserialize)]\r\npub struct RestoreCheckpointRequest {\r\n    pub checkpoint_id: String,\r\n    pub restore_files: Option\u003cbool\u003e,\r\n    pub restore_session: Option\u003cbool\u003e,\r\n}\r\n\r\n/// 恢复 checkpoint 响应\r\n#[derive(Debug, Serialize)]\r\npub struct RestoreCheckpointResponse {\r\n    pub success: bool,\r\n    pub restored_files: Vec\u003cString\u003e,\r\n    pub message: String,\r\n}\r\n\r\n/// 删除 checkpoint 请求\r\n#[derive(Debug, Deserialize)]\r\npub struct DeleteCheckpointRequest {\r\n    pub checkpoint_id: String,\r\n}\r\n\r\n/// 删除 checkpoint 响应\r\n#[derive(Debug, Serialize)]\r\npub struct DeleteCheckpointResponse {\r\n    pub success: bool,\r\n    pub message: String,\r\n}\r\n\r\n#[cfg(test)]\r\nmod tests {\r\n    use super::*;\r\n    use serde_json::json;\r\n    use uuid::Uuid;\r\n\r\n    #[test]\r\n    fn test_checkpoint_new() {\r\n eckpoint ID（可选）\r\n    pub checkpoint_id: Option\u003cString\u003e,\r\n}\r\n\r\nimpl Message {\r\n    pub fn new(session_id: Uuid, role: MessageRole, content: String) -\u003e Self {\r\n        Self {\r\n            id: Uuid::new_v4(),\r\n            session_id,\r\n            role,\r\n            content,\r\n            timestamp: Utc::now(),\r\n            metadata: None,\r\n            tool_calls: None,\r\n            tool_result: None,\r\n            checkpoint_id: None,\r\n        }\r\n    }\r\n\r\n    pub fn with_metadata(mut self, metadata: serde_json::Value) -\u003e Self {\r\n        self.metadata = Some(metadata);\r\n        self\r\n    }\r\n\r\n    pub fn with_tool_calls(mut self, tool_calls: Vec\u003cToolCall\u003e) -\u003e Self {\r\n        self.tool_calls = Some(tool_calls);\r\n        self\r\n    }\r\n\r\n    pub fn with_tool_result(mut self, tool_result: ToolResult) -\u003e Self {\r\n        self.tool_result = Some(tool_result);\r\n        self\r\n    }\r\n\r\n    pub fn with_checkpoint_id(mut self, checkpoint_id: String) -\u003e Self {\r\n        self.checkpoint_id = Some(checkpoint_id);\r\n        self\r\n    }\r\n}\r\n\r\n#[derive(Debug, Deserialize)]\r\npub struct SendMessageRequest {\r\n    pub session_id: Option\u003cUuid\u003e,\r\n    pub content: String,\r\n    pub metadata: Option\u003cserde_json::Value\u003e,\r\n}\r\n\r\n#[derive(Debug, Serialize)]\r\npub struct SendMessageResponse {\r\n    pub message_id: Uuid,\r\n    pub session_id: Uuid,\r\n    pub assistant_response: String,\r\n}\r\n\r\n#[derive(Debug, Serialize)]\r\npub struct ListMessagesResponse {\r\n    pub messages: Vec\u003cMessage\u003e,\r\n}\r\n\r\n// ==================== 管理 API 数据结构 ====================\r\n\r\n/// 工具信息（用于列表 API）\r\n#[derive(Debug, Clone, Serialize)]\r\npub struct ToolInfo {\r\n    pub name: String,\r\n    pub description: String,\r\n    pub server_name: String,\r\n    pub input_schema: serde_json::Value,\r\n}\r\n\r\n/// 工具列表响应\r\n#[derive(Debug, Serialize)]\r\npu        .with_checkpoint_id(checkpoint_id.clone());\r\n\r\n        let serialized = serde_json::to_string(\u0026msg).unwrap();\r\n        let deserialized: Message = serde_json::from_str(\u0026serialized).unwrap();\r\n\r\n        assert_eq!(msg.id, deserialized.id);\r\n        assert_eq!(msg.role, deserialized.role);\r\n        assert_eq!(deserialized.checkpoint_id, Some(checkpoint_id));\r\n    }\r\n\r\n    #[test]\r\n    fn test_with_tool_calls() {\r\n        let session_id = Uuid::new_v4();\r\n        let tool_call = ToolCall {\r\n            id: \"call_123\".to_string(),\r\n            name: \"test_tool\".to_string(),\r\n            arguments: json!({\"param\": \"value\"}),\r\n        };\r\n\r\n        let msg = Message::new(session_id, MessageRole::ToolCall, \"\".to_string())\r\n            .with_tool_calls(vec![tool_call.clone()]);\r\n\r\n        assert!(msg.tool_calls.is_some());\r\n        let calls = msg.tool_calls.unwrap();\r\n        assert_eq!(calls.len(), 1);\r\n        assert_eq!(calls[0].id, \"call_123\");\r\n        assert_eq!(calls[0].name, \"test_tool\");\r\n    }\r\n\r\n    #[test]\r\n    fn test_with_tool_result() {\r\n        let session_id = Uuid::new_v4();\r\n        let tool_result = ToolResult {\r\n            tool_call_id: \"call_123\".to_string(),\r\n            content: \"result content\".to_string(),\r\n            is_error: false,\r\n        };\r\n\r\n        let msg = Message::new(session_id, MessageRole::ToolResult, \"\".to_string())\r\n            .with_tool_result(tool_result.clone());\r\n\r\n        assert!(msg.tool_result.is_some());\r\n        let result = msg.tool_result.unwrap();\r\n        assert_eq!(result.tool_call_id, \"call_123\");\r\n        assert_eq!(result.content, \"result content\");\r\n        assert!(!result.is_error);\r\n    }\r\n\r\n    #[test]\r\n    fn test_message_role_serialization() {\r\n        let roles = vec![\r\n            MessageRole::User,\r\n            MessageRole::Assistant,\r\n            MessageRole::System,\r\n            MessageRole::ToolCall,\r\n            MessageRole::ToolResult,\r\n        ];\r\n\r\n        for role in roles {\r\n            let serialized = serde_json::to_string(\u0026role).unwrap();\r\n            let deserialized: MessageRole = serde_json::from_str(\u0026serialized).unwrap();\r\n            assert_eq!(role, deserialized);\r\n        }\r\n    }\r\n\r\n    #[test]\r\n    fn test_tool_serialization() {\r\n        let tool = Tool {\r\n            name: \"test_tool\".to_string(),\r\n            description: \"A test tool\".to_string(),\r\n            input_schema: json!({\"type\": \"object\"}),\r\n        };\r\n\r\n        let serialized = serde_json::to_string(\u0026tool).unwrap();\r\n        let deserialized: Tool = serde_json::from_str(\u0026serialized).unwrap();\r\n\r\n        assert_eq!(tool.name, deserialized.name);\r\n        assert_eq!(tool.description, deserialized.description);\r\n        assert_eq!(tool.input_schema, deserialized.input_schema);\r\n    }\r\n\r\n    #[test]\r\n    fn test_tool_call_serialization() {\r\n        let tool_call = ToolCall {\r\n            id: \"call_123\".to_string(),\r\n            name: \"test_tool\".to_string(),\r\n            arguments: json!({\"param\": \"value\"}),\r\n        };\r\n\r\n        let serialized = serde_json::to_string(\u0026tool_call).unwrap();\r\n        let deserialized: ToolCall = serde_json::from_str(\u0026serialized).unwrap();\r\n\r\n        assert_eq!(tool_call.id, deserialized.id);\r\n        assert_eq!(tool_call.name, deserialized.name);\r\n        assert_eq!(tool_call.arguments, deserialized.arguments);\r\n    }\r\n\r\n    #[test]\r\n    fn test_tool_result_serialization() {\r\n        let tool_result = ToolResult {\r\n            tool_call_id: \"call_123\".to_string(),\r\n            content: \"result\".to_string(),\r\n            is_error: true,\r\n        };\r\n\r\n        let serialized = serde_json::to_string(\u0026tool_result).unwrap();\r\n        let deserialized: ebug_struct(\"SessionRepository\")\r\n            .field(\"sessions\", \u0026self.sessions)\r\n            .field(\"agent_fs\", \u0026\"\u003cAgentFS\u003e\")\r\n            .finish()\r\n    }\r\n}\r\n\r\nimpl SessionRepository {\r\n    /// 创建新的 SessionRepository（不带 agentfs，纯内存存储）\r\n    pub fn new() -\u003e Self {\r\n        Self {\r\n            sessions: Arc::new(RwLock::new(HashMap::new())),\r\n            agent_fs: None,\r\n            checkpoint_manager: None,\r\n        }\r\n    }\r\n\r\n    /// 创建新的 SessionRepository（带 agentfs 持久化）\r\n    pub async fn with_agent_fs(agent_fs: AgentFS) -\u003e Result\u003cSelf\u003e {\r\n        let repo = Self {\r\n            sessions: Arc::new(RwLock::new(HashMap::new())),\r\n            agent_fs: Some(Arc::new(agent_fs)),\r\n            checkpoint_manager: None,\r\n        };\r\n\r\n        repo.load_sessions_from_agentfs().await?;\r\n\r\n        Ok(repo)\r\n    }\r\n\r\n    /// 创建新的 SessionRepository（带 agentfs 和 checkpoint manager）\r\n    pub async fn with_agent_fs_and_checkpoint(\r\n        agent_fs: AgentFS,\r\n        checkpoint_manager: CheckpointManager,\r\n    ) -\u003e Result\u003cSelf\u003e {\r\n        let repo = Self {\r\n            sessions: Arc::new(RwLock::new(HashMap::new())),\r\n            agent_fs: Some(Arc::new(agent_fs)),\r\n            checkpoint_manager: Some(Arc::new(checkpoint_manager)),\r\n        };\r\n\r\n        repo.load_sessions_from_agentfs().await?;\r\n\r\n        Ok(repo)\r\n    }\r\n\r\n    /// 设置 CheckpointManager\r\n    pub fn with_checkpoint_manager(mut self, checkpoint_manager: CheckpointManager) -\u003e Self {\r\n        self.checkpoint_manager = Some(Arc::new(checkpoint_manager));\r\n        self\r\n    }\r\n\r\n    /// 从 agentfs 加载所有会话到内存\r\n    async fn load_sessions_from_agentfs(\u0026self) -\u003e Result\u003c()\u003e {\r\n        let Some(agent_fs) = \u0026self.agent_fs else {\r\n            return Ok(());\r\n        };\r\n\r\n        let session_keys = match agent_fs.kv.scan(\"sessions/\").await {\r\n            Ok(keys) =\u003e keys,\r\n            Err(e) =\u003e {\r\n                warn!(error = %e, \"Failed to scan sessions from agentfs\");\r\n                return Ok(());\r\n            }\r\n        };\r\n\r\n        let mut sessions = self.sessions.write().await;\r\n        let mut loaded_count = 0;\r\n\r\n        for key in session_keys {\r\n            let session_data = match agent_fs.kv.get(\u0026key).await {\r\n                Ok(Some(data)) =\u003e data,\r\n                Ok(None) =\u003e continue,\r\n                Err(e) =\u003e {\r\n                    warn!(key = %key, error = %e, \"Failed to read session from agentfs\");\r\n                    continue;\r\n                }\r\n            };\r\n\r\n            let session: Session = match serde_json::from_slice(\u0026session_data) {\r\n                Ok(s) =\u003e s,\r\n                Err(e) =\u003e {\r\n                    warn!(key = %key, error = %e, \"Failed to deserialize session\");\r\n                    continue;\r\n                }\r\n            };\r\n\r\n            sessions.insert(session.id, session);\r\n            loaded_count += 1;\r\n        }\r\n\r\n        debug!(count = %loaded_count, \"Loaded sessions from agentfs\");\r\n        Ok(())\r\n    }\r\n\r\n    /// 保存单个会话到 agentfs\r\n    async fn save_session_to_agentfs(\u0026self, session: \u0026Session) {\r\n        let Some(agent_fs) = \u0026self.agent_fs else {\r\n            return;\r\n        };\r\n\r\n        let key = format!(\"sessions/{}.json\", session.id);\r\n        let session_json = match serde_json::to_vec(session) {\r\n            Ok(json) =\u003e json,\r\n            Err(e) =\u003e {\r\n                warn!(session_id = %session.id, error = %e, \"Failed to serialize session\");\r\n                return;\r\n            }\r\n        };\r\n\r\n        if let Err(e) = agent_fs.kv.set(\u0026key, \u0026session_json).await {\r\n            warn!(session_id = %session.id, key = %key, error = %e, \"Failed to save session to agentfs\");\r\n        }\r\n    }\r\n\r\n    /// 从 agentfs 删除会话\r\n    async fn delete_session_from_agentfs(\u0026self, session_id: \u0026Uuid) {\r\n        let Some(agent_fs) = \u0026self.agent_fs else {\r\n            return;\r\n        };\r\n\r\n        let key = format!(\"sessions/{}.json\", session_id);\r\n\r\n        if let Err(e) = agent_fs.kv.delete(\u0026key).await {\r\n            warn!(session_id = %session_id, key = %key, error = %e, \"Failed to delete session from agentfs\");\r\n        }\r\n    }\r\n\r\n    pub async fn create(\u0026self) -\u003e Session {\r\n        let session = Session::new();\r\n        let mut sessions = self.sessions.write().await;\r\n        sessions.insert(session.id, session.clone());\r\n        drop(sessions);\r\n\r\n        self.save_session_to_agentfs(\u0026session).await;\r\n\r\n        session\r\n    }\r\n\r\n    pub async fn get(\u0026self, id: \u0026Uuid) -\u003e Option\u003cSession\u003e {\r\n        let sessions = self.sessions.read().await;\r\n        sessions.get(id).cloned()\r\n    }\r\n\r\n    pub async fn list(\u0026self) -\u003e Vec\u003cSessionInfo\u003e {\r\n        let sessions = self.sessions.read().await;\r\n        sessions.values().map(SessionInfo::from).collect()\r\n    }\r\n\r\n    pub async fn update(\u0026self, session: Session) -\u003e Result\u003c()\u003e {\r\n        let mut sessions = self.sessions.write().await;\r\n        if let std::collections::hash_map::Entry::Occupied(mut e) = sessions.entry(session.id) {\r\n            e.insert(session.clone());\r\n            drop(sessions);\r\n\r\n            self.save_session_to_agentfs(\u0026session).await;\r\n\r\n            Ok(())\r\n        } else {\r\n            Err(crate::error::Error::SessionNotFound(session.id.to_string()))\r\n        }\r\n    }\r\n\r\n    pub async fn delete(\u0026self, id: \u0026Uuid) -\u003e Result\u003c()\u003e {\r\n        let mut sessions = self.sessions.write().await;\r\n        if sessions.remove(id).is_some() {\r\n            drop(sessions);\r\n\r\n            // 清理相关的 checkpoints\r\n            if let Some(checkpoint_manager) = \u0026self.checkpoint_manager {\r\n                match checkpoint_manager\r\n                    .delete_all_checkpoints_for_session(id)\r\n                    .await\r\n                {\r\n                    Ok(count) =\u003e {\r\n                        info!(\r\n                            session_id = %id,\r\n                            checkpoint_count = %count,\r\n                            \"Cleaned up checkpoints for deleted session\"\r\n                        );\r\n                    }\r\n                    Err(e) =\u003e {\r\n                        warn!(\r\n                            session_id = %id,\r\n                            error = %e,\r\n                            \"Failed to clean up checkpoints for deleted session\"\r\n                        );\r\n                    }\r\n                }\r\n            }\r\n\r\n            self.delete_session_from_agentfs(id).await;\r\n\r\n            Ok(())\r\n        } else {\r\n            Err(crate::error::Error::SessionNotFound(id.to_string()))\r\n        }\r\n    }\r\n}\r\n\r\nimpl Default for SessionRepository {\r\n    fn default() -\u003e Self {\r\n        Self::new()\r\n    }\r\n}\r\n","traces":[{"line":30,"address":[],"length":0,"stats":{"Line":0}},{"line":31,"address":[],"length":0,"stats":{"Line":0}},{"line":32,"address":[],"length":0,"stats":{"Line":0}},{"line":33,"address":[],"length":0,"stats":{"Line":0}},{"line":40,"address":[],"length":0,"stats":{"Line":0}},{"line":42,"address":[],"length":0,"stats":{"Line":0}},{"line":49,"address":[],"length":0,"stats":{"Line":0}},{"line":51,"address":[],"length":0,"stats":{"Line":0}},{"line":52,"address":[],"length":0,"stats":{"Line":0}},{"line":56,"address":[],"length":0,"stats":{"Line":0}},{"line":58,"address":[],"length":0,"stats":{"Line":0}},{"line":62,"address":[],"length":0,"stats":{"Line":0}}, r\n\r\n    pub fn insert_metadata\u003cK, V\u003e(\u0026mut self, key: K, value: V)\r\n    where\r\n        K: Into\u003cString\u003e,\r\n        V: Into\u003cserde_json::Value\u003e,\r\n    {\r\n        self.metadata.insert(key.into(), value.into());\r\n        self.updated_at = Utc::now();\r\n    }\r\n}\r\n\r\nimpl Default for Session {\r\n    fn default() -\u003e Self {\r\n        Self::new()\r\n    }\r\n}\r\n\r\n#[derive(Debug, Serialize)]\r\npub struct SessionInfo {\r\n    pub id: Uuid,\r\n    pub created_at: DateTime\u003cUtc\u003e,\r\n    pub updated_at: DateTime\u003cUtc\u003e,\r\n    pub message_count: usize,\r\n}\r\n\r\nimpl From\u003c\u0026Session\u003e for SessionInfo {\r\n    fn from(session: \u0026Session) -\u003e Self {\r\n        Self {\r\n            id: session.id,\r\n            created_at: session.created_at,\r\n            updated_at: session.updated_at,\r\n            message_count: session.messages.len(),\r\n        }\r\n    }\r\n}\r\n\r\n#[derive(Debug, Serialize)]\r\npub struct ListSessionsResponse {\r\n    pub sessions: Vec\u003cSessionInfo\u003e,\r\n}\r\n","traces":[{"line":18,"address":[],"length":0,"stats":{"Line":6269010681299730432}},{"line":19,"address":[],"length":0,"stats":{"Line":12538021362599460864}},{"line":21,"address":[],"length":0,"stats":{"Line":12538021362599460864}},{"line":24,"address":[],"length":0,"stats":{"Line":6269010681299730432}},{"line":25,"address":[],"length":0,"stats":{"Line":6269010681299730432}},{"line":29,"address":[],"length":0,"stats":{"Line":0}},{"line":30,"address":[],"length":0,"stats":{"Line":0}},{"line":31,"address":[],"length":0,"stats":{"Line":0}},{"line":34,"address":[],"length":0,"stats":{"Line":0}},{"line":39,"address":[],"length":0,"stats":{"Line":0}},{"line":40,"address":[],"length":0,"stats":{"Line":0}},{"line":45,"address":[],"length":0,"stats":{"Line":6}},{"line":46,"address":[],"length":0,"stats":{"Line":6}},{"line":59,"address":[],"length":0,"stats":{"Line":0}},{"line":61,"address":[],"len
